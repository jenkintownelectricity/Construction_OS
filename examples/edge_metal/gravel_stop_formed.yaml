# =============================================================================
# PatternVariant: Gravel Stop — Formed Metal
# =============================================================================
# Gravel stop brake-formed from sheet metal stock, allowing custom
# profiles, gauges, and material selections.
# =============================================================================

id: "CHEM-CONSTR-VAR-FORMED-202-R1"
name: "Gravel Stop — Formed Metal"
description: >
  Gravel stop variant fabricated by brake-forming flat sheet metal stock
  into the required L-shaped profile with a nailing hem. Brake-forming
  allows custom profile dimensions, variable leg heights, and a wide
  selection of base metals including galvanized steel, stainless steel,
  copper, and zinc. Formed gravel stops are typically fabricated in 8 to
  10 foot lengths and joined with 6-inch overlap splices sealed with
  roofing cement or butyl tape. The horizontal flange is mechanically
  fastened to the roof deck and stripped in with the roof membrane. This
  is the most cost-effective gravel stop option for standard commercial
  applications and is readily available from local sheet metal shops.

schema_version: "1.0.0"
pattern_language_version: "1.0.0"
entity_revision: 1
created_at: "2026-03-22T00:00:00Z"

pattern_id: "DNA-CONSTR-PAT-EDGE-GRAVELSTOP-002-R1"

method: "brake_forming"

materials:
  - name: "24-gauge galvanized steel sheet"
    specification: "ASTM A653/A653M, G90 coating designation"
    role: "edge_flashing"
  - name: "12-gauge galvanized roofing nails"
    specification: "ASTM F1667, Type I"
    role: "fastener"
  - name: "Roofing cement"
    specification: "ASTM D4586, Type I"
    role: "sealant"
  - name: "Peel-and-stick membrane strip"
    specification: "ASTM D1970"
    role: "stripping_membrane"

dimensional_constraints:
  min_height: "3 in"
  max_height: "6 in"
  min_width: "4 in"
  min_thickness: "0.024 in"
  tolerance: "+/- 1/8 in"

manufacturer_refs:
  - "Local sheet metal fabrication shop"
  - "Exceptional Metals"
  - "Metal Era"

notes: >
  Formed gravel stops should have a 3/8 in hemmed edge on the exposed
  vertical leg to provide stiffness and a safe finished edge. Overlap
  splices must be a minimum of 6 in with sealant between lapped surfaces.
  Install with the lap direction opposing the prevailing wind. Nail spacing
  is 8 in o.c. along the horizontal flange in field zones and 4 in o.c.
  in perimeter and corner zones per the roof system manufacturer
  requirements. Flash-in the horizontal flange with a minimum 4 in wide
  strip of self-adhering modified bitumen membrane lapping from the deck
  onto the flange.
