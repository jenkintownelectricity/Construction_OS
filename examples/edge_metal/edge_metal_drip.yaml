# =============================================================================
# Pattern: Drip Edge
# =============================================================================
# Angled metal flashing installed at eaves and rakes to direct water away
# from fascia and into gutters. Classified under ANSI/SPRI ES-1 RE-1.
# =============================================================================

id: "DNA-CONSTR-PAT-EDGE-DRIP-001-R1"
name: "Drip Edge"
description: >
  Angled sheet metal flashing installed at the eave and rake edges of a
  roof system. The drip edge extends beyond the roof deck edge to direct
  water runoff away from the fascia board and into the gutter. Typically
  an L-shaped or T-shaped profile with a kick-out hem at the lower edge
  to break surface tension and promote clean water shedding. Required by
  most building codes on steep-slope roofs (IBC/IRC) and recommended on
  low-slope systems where a gravel stop is not used. Tested per ANSI/SPRI
  ES-1 RE-1 for wind resistance at the roof perimeter.

