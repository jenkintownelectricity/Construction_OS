# =============================================================================
# Pattern: Gravel Stop
# =============================================================================
# L-shaped perimeter edge metal that retains aggregate or ballast on
# built-up and ballasted roof systems. Classified under ANSI/SPRI ES-1 RE-2.
# =============================================================================

id: "DNA-CONSTR-PAT-EDGE-GRAVELSTOP-002-R1"
name: "Gravel Stop"
description: >
  L-shaped sheet metal edge flashing installed at the perimeter of built-up
  roofing (BUR), modified bitumen, and ballasted single-ply roof systems.
  The vertical leg retains aggregate, gravel, or ballast pavers while the
  horizontal flange is secured to the roof deck and stripped in with the
  roof membrane. Provides a finished edge appearance and prevents aggregate
  migration off the roof edge. Must resist wind uplift forces per ANSI/SPRI
  ES-1 RE-2 test protocol. Vertical leg height is typically 3 to 6 inches
  depending on aggregate depth and wind exposure.

