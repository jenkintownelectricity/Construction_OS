# =============================================================================
# PatternVariant: Drip Edge — Mechanical Fastening
# =============================================================================
# Drip edge secured with exposed or concealed fasteners through a nailing
# hem to the roof deck or fascia board.
# =============================================================================

id: "CHEM-CONSTR-VAR-MECHANICAL-101-R1"
name: "Drip Edge — Mechanical Fastening"
description: >
  Drip edge variant installed using mechanical fasteners (roofing nails or
  screws) driven through a nailing hem or flange into the roof deck
  substrate. The nailing hem is positioned on the deck side and concealed
  by the roof membrane or underlayment. Fasteners are typically 12-gauge
  galvanized roofing nails at 6 inches on center along the nailing hem,
  with additional fasteners at 3 inches on center in high-wind perimeter
  and corner zones. This is the most common drip edge installation method
  for steep-slope residential and commercial roofing.

schema_version: "1.0.0"
pattern_language_version: "1.0.0"
entity_revision: 1
created_at: "2026-03-22T00:00:00Z"

pattern_id: "DNA-CONSTR-PAT-EDGE-DRIP-001-R1"

method: "mechanical_fastening"

materials:
  - name: "26-gauge galvanized steel drip edge"
    specification: "ASTM A653/A653M, G90 coating designation"
    role: "edge_flashing"
  - name: "12-gauge galvanized roofing nails"
    specification: "ASTM F1667, Type I"
    role: "fastener"
  - name: "Roofing cement"
    specification: "ASTM D4586, Type I"
    role: "sealant"

dimensional_constraints:
  min_width: "2 in"
  max_width: "4 in"
  min_thickness: "0.019 in"
  tolerance: "+/- 1/16 in"

manufacturer_refs:
  - "Metal Era"
  - "Exceptional Metals"
  - "Carlisle Construction Materials"

notes: >
  Standard nailing pattern is 6 in o.c. in field-of-roof perimeter zones
  and 3 in o.c. in corner zones per ANSI/SPRI ES-1. Nails must penetrate
  a minimum of 3/4 in into wood deck or be clinched if deck thickness is
  less than 3/4 in. End laps should be a minimum of 2 in with sealant
  between lapped surfaces.
