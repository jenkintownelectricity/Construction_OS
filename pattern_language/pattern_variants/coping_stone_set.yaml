id: CHEM-CONSTR-VAR-COPSET-107-R1
name: Mortar-Set Stone Coping
description: >
  Cast stone coping units set in a full mortar bed on top of the
  parapet wall.  Through-wall flashing below the mortar bed directs
  moisture to the exterior.  Joints are raked and sealed to prevent
  water infiltration.
schema_version: "1.0.0"
pattern_language_version: "1.0.0"
entity_revision: 1
created_at: "2026-03-22T00:00:00Z"
pattern_id: DNA-CONSTR-PAT-PARAPET-STONECOP-021-R1
method: mortar_bed_setting
materials:
  - name: cast stone
    specification: per ASTM C1364, Class A, minimum 6000 psi compressive strength
  - name: type S mortar
    specification: per ASTM C270, proportion specification
  - name: through-wall flashing
    specification: self-adhering modified bitumen or copper, full width of wall
dimensional_constraints:
  min_overhang_inches: 1.5
  min_slope_degrees: 3
notes: >
  Provide drip kerfs on the underside of all overhanging edges.
  Mortar bed thickness shall be 3/8" to 3/4".  Tool all joints
  with a concave jointer for weather tightness.
