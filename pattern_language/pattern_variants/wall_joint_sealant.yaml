id: "CHEM-CONSTR-VAR-WALLJSEAL-120-R1"
name: "Sealant-Only Wall Expansion Joint"
description: >
  A wall expansion joint variant relying on an exposed elastomeric sealant joint
  as the primary weatherproofing element without a surface-mounted cover plate.
  The joint consists of a compressible filler, backer rod, and a high-performance
  sealant capable of accommodating the full range of expected movement. This is
  the simplest and most economical wall joint treatment but exposes the sealant
  to UV degradation, requiring periodic inspection and eventual replacement.
pattern_id: "DNA-CONSTR-PAT-JOINT-WALL-051-R1"
method: "Exposed elastomeric sealant joint with backer rod and compressible filler"
materials:
  - name: "Compressible filler"
    specification: "Pre-compressed impregnated foam filler (PCIF) or closed-cell polyethylene foam board"
  - name: "Backer rod"
    specification: "Closed-cell polyethylene backer rod, diameter 25% larger than joint width"
  - name: "Primary sealant"
    specification: "High-modulus silicone sealant per ASTM C920, Type S, Grade NS, Class 50, Use M and A"
  - name: "Bond breaker tape"
    specification: "Polyethylene bond breaker tape over backer rod to prevent three-sided adhesion"
  - name: "Primer"
    specification: "Sealant manufacturer-recommended primer for substrate, applied to joint sidewalls"
dimensional_constraints:
  joint_width: "3/4 in to 2 in typical"
  sealant_depth: "1/2 of joint width, minimum 1/4 in, maximum 1/2 in"
  backer_rod_depth: "Set to achieve proper sealant depth ratio"
  movement_capacity: "Plus or minus 50% of joint width for Class 50 sealant"
notes:
  - "Sealant-only joints require replacement every 10 to 20 years depending on exposure."
  - "Joint width-to-depth ratio of 2:1 is critical for sealant performance."
  - "Three-sided adhesion must be prevented using bond breaker tape over backer rod."
  - "Substrate must be clean, dry, and primed per sealant manufacturer requirements."
