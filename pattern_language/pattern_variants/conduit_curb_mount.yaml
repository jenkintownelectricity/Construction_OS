id: "CHEM-CONSTR-VAR-CONDCURB-115-R1"
name: "Curb-Mounted Conduit Penetration"
description: >
  A conduit penetration variant where multiple conduits are grouped through a
  raised sheet metal curb built on the roof deck. The curb elevates the
  penetration point above the roof surface, and the roofing membrane is flashed
  up and over the curb similar to a mechanical equipment curb. Conduits pass
  through a sealed top plate on the curb. This method is preferred for clusters
  of conduits serving rooftop equipment.
pattern_id: "DNA-CONSTR-PAT-PIPE-CONDUIT-041-R1"
method: "Raised sheet metal curb with flashed membrane and sealed top plate for conduit pass-through"
materials:
  - name: "Curb frame"
    specification: "18 ga galvanized steel, shop-fabricated, minimum 8 in height, with wood nailer top"
  - name: "Top plate"
    specification: "16 ga galvanized steel plate with pre-punched and grommeted conduit holes"
  - name: "Membrane flashing"
    specification: "Roofing membrane flashed up curb face and terminated at wood nailer with termination bar"
  - name: "Conduit seal"
    specification: "Modular rubber sealing system (e.g., Roxtec or Link-Seal) at each conduit penetration through top plate"
  - name: "Sealant"
    specification: "Polyurethane sealant at all conduit-to-seal and plate-to-curb interfaces"
dimensional_constraints:
  curb_height: "8 in minimum above finished roof surface"
  curb_size: "Sized to accommodate all conduits with 3 in clearance between conduits"
  top_plate_thickness: "16 ga minimum"
  conduit_spacing: "3 in minimum on center between penetrations"
notes:
  - "Curb mounting is the preferred method for 3 or more conduits in proximity."
  - "Curb must have cant strips at base for proper membrane transition."
  - "Fire-stop sealant required at conduits penetrating fire-rated assemblies."
