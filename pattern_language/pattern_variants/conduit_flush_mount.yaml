id: "CHEM-CONSTR-VAR-CONDFLUSH-116-R1"
name: "Flush-Mounted Conduit Penetration"
description: >
  A conduit penetration variant where individual conduits pass directly through
  the roof membrane at deck level without a raised curb. Each conduit receives
  an individual prefabricated pipe boot or is flashed with a field-fabricated
  membrane collar. Flush mounting is used for single isolated conduits where a
  curb would be unnecessarily complex. The penetration location must be in a
  positive drainage area to prevent ponding around the base.
pattern_id: "DNA-CONSTR-PAT-PIPE-CONDUIT-041-R1"
method: "Individual pipe boot or membrane collar at each conduit at deck level"
materials:
  - name: "Pipe boot"
    specification: "Prefabricated EPDM, TPO, or PVC boot sized to conduit OD, matching membrane type"
  - name: "Compression clamp"
    specification: "Stainless steel worm-drive clamp at conduit-to-boot interface"
  - name: "Membrane adhesive"
    specification: "Membrane-compatible bonding adhesive or hot-air weld for boot flange to field sheet"
  - name: "Pipe sealant"
    specification: "Polyurethane sealant at clamp-to-conduit interface"
dimensional_constraints:
  boot_base_flange: "6 in minimum from conduit center to flange edge"
  conduit_diameter_range: "3/4 in to 4 in typical"
  minimum_spacing: "12 in on center between adjacent flush-mounted penetrations"
  boot_height: "6 in minimum above membrane surface"
notes:
  - "Flush mounting is limited to single isolated conduits; use curb mounting for clusters."
  - "Ensure positive drainage away from each penetration to prevent ponding."
  - "UV-resistant boots required for all exposed conduit flashing."
