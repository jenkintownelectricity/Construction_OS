id: CHEM-CONSTR-VAR-DRIPMECH-101-R1
name: Mechanically Fastened Drip Edge
description: >
  Drip edge profile secured to the roof deck and fascia using mechanical
  fasteners.  Hot-dip galvanized roofing nails are driven through the top
  flange at 8-inch centers, providing positive attachment that resists wind
  uplift loads at the roof perimeter.
schema_version: "1.0.0"
pattern_language_version: "1.0.0"
entity_revision: 1
created_at: "2026-03-22T00:00:00Z"
pattern_id: DNA-CONSTR-PAT-EDGE-DRIP-010-R1
method: mechanical_fastening
materials:
  - name: galvanized steel
    specification: 24 gauge minimum, G90 coating per ASTM A653
  - name: roofing nails
    specification: hot-dip galvanized, 12-gauge shank, 8" OC spacing
dimensional_constraints:
  drip_leg_min_inches: 2
  top_flange_min_inches: 4
notes: >
  Nails shall be placed in a staggered pattern along the top flange.
  Overlap end joints a minimum of 3 inches and seal with compatible
  roof cement.
