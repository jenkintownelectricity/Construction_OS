id: CHEM-CONSTR-VAR-COPADH-108-R1
name: Adhesive-Set Stone Coping
description: >
  Natural stone coping units bonded to the parapet substrate using
  structural polyurethane adhesive.  Stainless steel alignment pins
  maintain joint spacing during cure.  Eliminates the wet-trade
  mortar process.
schema_version: "1.0.0"
pattern_language_version: "1.0.0"
entity_revision: 1
created_at: "2026-03-22T00:00:00Z"
pattern_id: DNA-CONSTR-PAT-PARAPET-STONECOP-021-R1
method: structural_adhesive_setting
materials:
  - name: natural stone
    specification: granite or limestone, minimum 160 pcf density, thermal-finish top
  - name: polyurethane adhesive
    specification: structural grade, per manufacturer, ASTM C1382 tested
  - name: stainless pins
    specification: 316 stainless steel dowel pins, 1/4" diameter
dimensional_constraints:
  max_unit_length_inches: 36
  min_thickness_inches: 3
notes: >
  Surface must be clean, dry, and free of laitance before adhesive
  application.  Set pins at each joint to maintain alignment.
  Allow 3/8" minimum joints filled with compatible sealant.
