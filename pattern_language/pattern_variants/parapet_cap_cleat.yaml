id: CHEM-CONSTR-VAR-CAPCLEAT-106-R1
name: Cleat-Mounted Parapet Cap
description: >
  Parapet cap secured with continuous cleats on both sides of the
  wall.  The cap hooks over the cleats for a mechanically locked
  connection that allows longitudinal thermal movement.
schema_version: "1.0.0"
pattern_language_version: "1.0.0"
entity_revision: 1
created_at: "2026-03-22T00:00:00Z"
pattern_id: DNA-CONSTR-PAT-PARAPET-METALCAP-020-R1
method: cleat_mount_installation
materials:
  - name: sheet metal
    specification: 22 gauge galvanized steel minimum, factory primed
  - name: continuous cleat
    specification: same material as cap, fastened at 6" OC
dimensional_constraints:
  min_overhang_inches: 1.5
  max_joint_spacing_feet: 10
notes: >
  Hem all exposed drip edges.  Install expansion joints at intervals
  not exceeding the maximum joint spacing.  Apply sealant to all
  transverse joints.
