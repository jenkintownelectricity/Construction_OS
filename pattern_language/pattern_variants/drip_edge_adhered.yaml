id: CHEM-CONSTR-VAR-DRIPADH-102-R1
name: Adhered Drip Edge
description: >
  Drip edge installed using membrane adhesive rather than mechanical
  fasteners.  Suitable for systems where puncturing the membrane is
  undesirable.  The aluminum substrate provides corrosion resistance
  and light weight for adhesive-only attachment.
schema_version: "1.0.0"
pattern_language_version: "1.0.0"
entity_revision: 1
created_at: "2026-03-22T00:00:00Z"
pattern_id: DNA-CONSTR-PAT-EDGE-DRIP-010-R1
method: adhesive_application
materials:
  - name: aluminum
    specification: 0.032" minimum thickness, mill finish or factory coated
  - name: membrane adhesive
    specification: per membrane manufacturer requirements, VOC-compliant
dimensional_constraints:
  drip_leg_min_inches: 2
  adhesion_width_min_inches: 3
notes: >
  Adhesive application requires clean, primed substrate.  Surface
  temperature must be above 40°F at time of installation.  Provide
  temporary weighting or clamping until adhesive cures.
