id: CHEM-CONSTR-VAR-DRAINSIP-110-R1
name: Siphonic Roof Drain
description: >
  Siphonic roof drainage system using anti-vortex baffles to eliminate
  air entrainment and generate full-bore flow in horizontal piping.
  Allows smaller pipe diameters and longer horizontal runs compared
  to gravity systems.
schema_version: "1.0.0"
pattern_language_version: "1.0.0"
entity_revision: 1
created_at: "2026-03-22T00:00:00Z"
pattern_id: DNA-CONSTR-PAT-DRAIN-INTERIOR-030-R1
method: siphonic_drain_installation
materials:
  - name: siphonic drain insert
    specification: anti-vortex baffle, engineered for design rainfall intensity
  - name: HDPE piping
    specification: per ASTM F714, butt-fused joints, SDR 17 minimum
dimensional_constraints:
  min_head_inches: 2.5
  max_horizontal_run_feet: 300
notes: >
  System must be engineered by the siphonic drain manufacturer.
  Do not mix siphonic and gravity drains on the same piping
  system.  Provide full-flow test at commissioning.
