id: "DNA-CONSTR-PAT-DRAIN-OVERFLOW-031-R1"
name: "Overflow / Scupper Drain"
description: >
  A secondary drainage element installed at a predetermined elevation above the
  primary drain inlet to provide emergency overflow capacity when the primary
  system is blocked or overwhelmed. Overflow drains may take the form of
  through-wall scuppers in parapet walls, secondary roof drain bodies set at a
  higher elevation, or overflow pipes connected to an independent storm system.
  Building codes require secondary drainage on all roofs where ponding water
  could exceed the structural design load.
family_id: "DNA-CONSTR-FAM-DRAIN-003-R1"
