id: "DNA-CONSTR-PAT-EDGE-GRAVELSTOP-011-R1"
name: "Gravel Stop"
description: >
  A raised-lip metal edge flashing designed to retain aggregate ballast or flood
  coat gravel on built-up and modified bitumen roofing systems while providing a
  finished roof edge termination. The vertical face acts as a dam to contain loose
  surfacing materials, while the outward-projecting drip lip sheds water clear of
  the building fascia. Gravel stops are typically taller than standard drip edges
  and must resist both wind uplift and the lateral pressure of roof ballast.
