id: "DNA-CONSTR-PAT-PARAPET-STONECOP-021-R1"
name: "Stone Coping"
description: >
  A natural or cast stone cap installed on top of a parapet wall to provide a
  durable and architecturally finished weatherproofing termination. Stone copings
  are set on a waterproof membrane over the wall substrate, with joints sealed
  using flexible sealant to accommodate thermal and structural movement. The
  coping profile includes a kerf-cut drip groove on both the interior and exterior
  faces to prevent water from tracking back along the underside of the stone.
