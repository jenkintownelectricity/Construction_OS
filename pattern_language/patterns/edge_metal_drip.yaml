id: "DNA-CONSTR-PAT-EDGE-DRIP-010-R1"
name: "Drip Edge"
description: >
  A formed metal flashing installed at the roof perimeter to direct water runoff
  away from the fascia board and into the gutter system. The drip edge provides a
  clean termination point for the roofing membrane, prevents wind-driven rain from
  entering beneath the roof assembly, and protects the underlying deck edge from
  moisture damage. Drip edges are the most fundamental roof edge detail and are
  code-required in most jurisdictions.
