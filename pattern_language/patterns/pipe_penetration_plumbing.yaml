id: "DNA-CONSTR-PAT-PIPE-PLUMBING-040-R1"
name: "Plumbing Vent Penetration"
description: >
  A roof penetration detail for plumbing vent stacks and sanitary vent pipes that
  extend through the roof assembly. Plumbing vents are among the most common roof
  penetrations and typically range from 1.5 to 4 inches in diameter. The flashing
  detail must seal the membrane to the pipe while accommodating differential
  thermal movement between the pipe and the roof deck, and must remain watertight
  under ponding conditions if located in a low area of the roof.
family_id: "DNA-CONSTR-FAM-PIPE-004-R1"
