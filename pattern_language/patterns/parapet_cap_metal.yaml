id: "DNA-CONSTR-PAT-PARAPET-METALCAP-020-R1"
name: "Metal Parapet Cap"
description: >
  A sheet metal capping system that covers the top of a parapet wall to prevent
  water infiltration into the wall assembly from above. Metal parapet caps are
  formed to slope toward the roof side, overlap the wall flashing on both faces,
  and incorporate drip edges to shed water clear of the wall surfaces. Joints
  between cap sections must be lapped and sealed to maintain weathertightness
  while allowing for thermal expansion of the metal.
family_id: "DNA-CONSTR-FAM-PARAPET-002-R1"
