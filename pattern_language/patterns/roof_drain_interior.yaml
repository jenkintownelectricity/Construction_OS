id: "DNA-CONSTR-PAT-DRAIN-INTERIOR-030-R1"
name: "Interior Roof Drain"
description: >
  A drain assembly installed through the roof deck at low points in the roof to
  convey stormwater into the interior storm piping system. The drain body is set
  into a sump or recessed area of the structural deck, and the roofing membrane
  is clamped between the drain flange and a clamping ring to create a watertight
  seal. A strainer dome prevents debris from entering the piping system. Interior
  drains are the primary drainage method for large commercial flat roofs.
family_id: "DNA-CONSTR-FAM-DRAIN-003-R1"
