id: "DNA-CONSTR-PAT-JOINT-WALL-051-R1"
name: "Wall Expansion Joint"
description: >
  A construction detail that maintains the weatherproofing continuity of the
  building wall envelope at structural expansion joints. Wall expansion joints
  must accommodate horizontal and vertical movement while preventing water and
  air infiltration. The detail typically involves a compressible filler, a
  backer rod, exterior sealant, and often a surface-mounted cover plate that
  conceals the joint while permitting movement. Integration with flashing at
  floor lines and the roof-to-wall transition is critical.
