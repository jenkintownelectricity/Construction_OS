id: "DNA-CONSTR-PAT-JOINT-ROOF-050-R1"
name: "Roof Expansion Joint"
description: >
  A construction detail that bridges a structural expansion joint where it
  crosses the roof plane. The joint assembly is raised above the roof surface on
  curbs to prevent water damming, and a flexible cover or bellows spans the gap
  between the curbs to maintain weatherproofing while allowing the expected range
  of structural movement. Roof expansion joints must accommodate multi-directional
  movement including longitudinal, transverse, and vertical displacement.
