id: "DNA-CONSTR-PAT-PIPE-CONDUIT-041-R1"
name: "Electrical Conduit Penetration"
description: >
  A roof penetration detail for electrical conduits, communication cables, and
  similar small-diameter rigid or flexible conduits that pass through the roofing
  assembly to serve rooftop equipment. Conduit penetrations are frequently
  clustered near mechanical equipment and may involve multiple pipes in close
  proximity. The flashing detail must group and seal multiple conduits efficiently
  while providing a durable, maintainable, and code-compliant termination that
  preserves the fire rating of the roof assembly.
family_id: "DNA-CONSTR-FAM-PIPE-004-R1"
variants:
