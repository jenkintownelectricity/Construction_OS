  - "CHEM-CONSTR-VAR-CONDFLUSH-116-R1"
detail_intents:
  - "Seal roofing membrane around electrical conduit penetrations"
  - "Group multiple conduits within a single flashing assembly"
  - "Maintain fire rating of roof assembly at penetration"
