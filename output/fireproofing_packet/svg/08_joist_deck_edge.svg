<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <style>
      .title { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: bold; fill: #FF4444; }
      .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #B0B7BD; }
      .dim { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
      .callout-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: bold; fill: #0A0D11; }
      .bar-text { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1056" height="816" fill="#0A0D11"/>

  <!-- DRAFT Watermark -->
  <text x="528" y="450" font-family="JetBrains Mono, monospace" font-size="60" fill="#FF4444" opacity="0.08" text-anchor="middle" transform="rotate(-30, 528, 450)">DRAFT</text>

  <!-- Title -->
  <text x="40" y="45" class="title">Fireproofing — Joist / Deck Edge Condition</text>
  <line x1="40" y1="55" x2="530" y2="55" stroke="#FF4444" stroke-width="1" opacity="0.4"/>

  <!-- Fire Rating Badge -->
  <rect x="880" y="25" width="140" height="35" rx="3" fill="none" stroke="#FF4444" stroke-width="2"/>
  <text x="950" y="42" font-family="JetBrains Mono, monospace" font-size="11" fill="#FF4444" text-anchor="middle" font-weight="bold">FIRE RATING</text>
  <text x="950" y="54" font-family="JetBrains Mono, monospace" font-size="10" fill="#FF4444" text-anchor="middle">2-HR</text>

  <!-- Concrete fill on deck -->
  <rect x="350" y="140" width="600" height="40" fill="#1A1D21" stroke="#4A657D" stroke-width="1.5"/>
  <!-- Concrete hatch pattern -->
  <line x1="370" y1="145" x2="380" y2="175" stroke="#4A657D" stroke-width="0.3" opacity="0.5"/>
  <line x1="410" y1="145" x2="420" y2="175" stroke="#4A657D" stroke-width="0.3" opacity="0.5"/>
  <line x1="450" y1="145" x2="460" y2="175" stroke="#4A657D" stroke-width="0.3" opacity="0.5"/>
  <line x1="490" y1="145" x2="500" y2="175" stroke="#4A657D" stroke-width="0.3" opacity="0.5"/>
  <line x1="530" y1="145" x2="540" y2="175" stroke="#4A657D" stroke-width="0.3" opacity="0.5"/>

  <!-- Metal Deck (fluted) -->
  <path d="M350,180 L350,210 L390,210 L390,180 L430,180 L430,210 L470,210 L470,180 L510,180 L510,210 L550,210 L550,180 L590,180 L590,210 L630,210 L630,180 L670,180 L670,210 L710,210 L710,180 L750,180 L750,210 L790,210 L790,180 L830,180 L830,210 L870,210 L870,180 L910,180 L910,210 L950,210 L950,180"
        fill="none" stroke="#4A657D" stroke-width="2"/>
  <rect x="350" y="175" width="600" height="5" fill="#1A1D21" stroke="#4A657D" stroke-width="1"/>

  <!-- Pour Stop at edge (left side) -->
  <rect x="340" y="140" width="10" height="75" fill="#8B959E" stroke="#B0B7BD" stroke-width="1.5"/>

  <!-- Spandrel Beam (at edge) -->
  <!-- Top Flange -->
  <rect x="160" y="210" width="200" height="20" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Web -->
  <rect x="235" y="230" width="50" height="250" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Bottom Flange -->
  <rect x="160" y="480" width="200" height="20" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>

  <!-- Joist Seat (angle on top of beam) -->
  <path d="M350,210 L350,230 L380,230 L380,215 L365,215 L365,210 Z" fill="#8B959E" stroke="#B0B7BD" stroke-width="1.5"/>
  <!-- Joist representation (diagonal members going right) -->
  <line x1="380" y1="215" x2="430" y2="210" stroke="#8B959E" stroke-width="2"/>
  <line x1="380" y1="225" x2="430" y2="210" stroke="#8B959E" stroke-width="1.5"/>
  <!-- Joist top chord extending right -->
  <rect x="380" y="208" width="570" height="5" fill="#8B959E" stroke="#B0B7BD" stroke-width="1"/>
  <!-- Joist bottom chord -->
  <rect x="410" y="225" width="540" height="4" fill="#8B959E" stroke="#B0B7BD" stroke-width="0.8"/>
  <!-- Joist web members (diagonal) -->
  <line x1="440" y1="213" x2="470" y2="225" stroke="#8B959E" stroke-width="1.2"/>
  <line x1="470" y1="225" x2="500" y2="213" stroke="#8B959E" stroke-width="1.2"/>
  <line x1="500" y1="213" x2="530" y2="225" stroke="#8B959E" stroke-width="1.2"/>
  <line x1="530" y1="225" x2="560" y2="213" stroke="#8B959E" stroke-width="1.2"/>
  <line x1="560" y1="213" x2="590" y2="225" stroke="#8B959E" stroke-width="1.2"/>

  <!-- SFRM on Spandrel Beam -->
  <!-- Left side -->
  <rect x="145" y="195" width="15" height="320" rx="2" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <!-- Bottom -->
  <rect x="145" y="500" width="230" height="15" rx="2" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <!-- Right side below deck -->
  <rect x="360" y="230" width="15" height="270" rx="2" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <!-- Under top flange left -->
  <rect x="160" y="230" width="75" height="10" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <!-- Under bottom flange (left inner) -->
  <rect x="160" y="480" width="75" height="5" fill="#D4A574" opacity="0.5" stroke="#E8C39E" stroke-width="1"/>
  <rect x="285" y="480" width="75" height="5" fill="#D4A574" opacity="0.5" stroke="#E8C39E" stroke-width="1"/>

  <!-- SFRM on underside of deck (extending right) -->
  <rect x="375" y="210" width="575" height="12" rx="1" fill="#D4A574" opacity="0.45" stroke="#E8C39E" stroke-width="1"/>

  <!-- Callout 1: Spandrel Beam -->
  <circle cx="260" cy="360" r="8" fill="#00E5FF"/>
  <text x="260" y="364" class="callout-num" text-anchor="middle">1</text>
  <line x1="252" y1="360" x2="60" y2="360" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="40" y="350" class="label">Spandrel</text>
  <text x="40" y="364" class="label">Beam</text>

  <!-- Callout 2: Joist Seat -->
  <circle cx="365" cy="220" r="8" fill="#00E5FF"/>
  <text x="365" y="224" class="callout-num" text-anchor="middle">2</text>
  <line x1="365" y1="228" x2="365" y2="310" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="365" y1="310" x2="440" y2="310" stroke="#00E5FF" stroke-width="1"/>
  <text x="445" y="314" class="label">Joist Seat</text>

  <!-- Callout 3: Metal Deck -->
  <circle cx="700" cy="190" r="8" fill="#00E5FF"/>
  <text x="700" y="194" class="callout-num" text-anchor="middle">3</text>
  <line x1="700" y1="182" x2="700" y2="120" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="700" y1="120" x2="770" y2="120" stroke="#00E5FF" stroke-width="1"/>
  <text x="775" y="124" class="label">Metal Deck</text>

  <!-- Callout 4: Pour Stop -->
  <circle cx="345" cy="165" r="8" fill="#00E5FF"/>
  <text x="345" y="169" class="callout-num" text-anchor="middle">4</text>
  <line x1="345" y1="157" x2="345" y2="110" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="345" y1="110" x2="440" y2="110" stroke="#00E5FF" stroke-width="1"/>
  <text x="445" y="114" class="label">Pour Stop</text>

  <!-- Callout 5: Concrete Fill -->
  <circle cx="550" cy="160" r="8" fill="#00E5FF"/>
  <text x="550" y="164" class="callout-num" text-anchor="middle">5</text>
  <line x1="558" y1="160" x2="770" y2="160" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="775" y="164" class="label">Concrete Fill</text>

  <!-- Callout 6: SFRM Coverage -->
  <circle cx="155" cy="450" r="8" fill="#00E5FF"/>
  <text x="155" y="454" class="callout-num" text-anchor="middle">6</text>
  <line x1="147" y1="450" x2="60" y2="450" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="40" y="440" class="label">SFRM</text>
  <text x="40" y="454" class="label">Coverage</text>

  <!-- Building edge indicator -->
  <line x1="140" y1="100" x2="140" y2="600" stroke="#FF4444" stroke-width="1" stroke-dasharray="8,4" opacity="0.3"/>
  <text x="115" y="95" class="dim" fill="#FF4444" text-anchor="middle">EDGE</text>

  <!-- Section note -->
  <text x="40" y="600" class="label" opacity="0.6">SECTION VIEW — Floor edge condition at spandrel beam</text>
  <text x="40" y="620" class="label" opacity="0.6">Joist bears on spandrel beam, deck terminates at pour stop</text>

  <!-- Legend -->
  <rect x="40" y="690" width="16" height="10" fill="#5C6670" stroke="#8B959E" stroke-width="1"/>
  <text x="62" y="699" class="label">Steel</text>
  <rect x="130" y="690" width="16" height="10" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1"/>
  <text x="152" y="699" class="label">SFRM</text>
  <rect x="220" y="690" width="16" height="10" fill="#1A1D21" stroke="#4A657D" stroke-width="1"/>
  <text x="242" y="699" class="label">Concrete / Deck</text>
  <rect x="370" y="690" width="16" height="10" fill="#8B959E" stroke="#B0B7BD" stroke-width="1"/>
  <text x="392" y="699" class="label">Joist / Pour Stop</text>

  <!-- Bottom Bar -->
  <rect x="0" y="790" width="1056" height="26" fill="#0D1117"/>
  <line x1="0" y1="790" x2="1056" y2="790" stroke="#1A1D21" stroke-width="1"/>
  <text x="528" y="806" class="bar-text" text-anchor="middle">DETAIL ATLAS | CONSTRUCTION INTELLIGENCE | Fireproofing Starter Packet | 2026-04-16</text>
</svg>