  <line x1="741" y1="450" x2="741" y2="470" stroke="#00E5FF" stroke-width="0.5"/>
  <line x1="315" y1="465" x2="741" y2="465" stroke="#00E5FF" stroke-width="0.5"/>
  <polygon points="315,465 322,462 322,468" fill="#00E5FF"/>
  <polygon points="741,465 734,462 734,468" fill="#00E5FF"/>
