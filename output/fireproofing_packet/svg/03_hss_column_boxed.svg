  <rect x="350" y="140" width="12" height="250" fill="#8B959E" stroke="#B0B7BD" stroke-width="1"/>
  <!-- Metal Stud Track - Right -->
  <rect x="694" y="140" width="12" height="250" fill="#8B959E" stroke="#B0B7BD" stroke-width="1"/>

