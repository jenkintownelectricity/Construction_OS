<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <style>
      .title { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: bold; fill: #FF4444; }
      .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #B0B7BD; }
      .dim { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
      .callout-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: bold; fill: #0A0D11; }
      .bar-text { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
    </style>
  </defs>

  <!-- Background -->
