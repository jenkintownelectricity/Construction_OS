  <line x1="735" y1="105" x2="850" y2="105" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="858" cy="105" r="8" fill="#00E5FF"/>
  <text x="858" y="109" class="callout-num" text-anchor="middle">6</text>
