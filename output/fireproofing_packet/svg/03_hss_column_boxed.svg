  <!-- Section note -->
  <text x="40" y="620" class="label" opacity="0.6">PLAN SECTION — HSS column with gypsum board enclosure</text>
  <text x="40" y="640" class="label" opacity="0.6">2-layer Type X gypsum board on metal stud framing</text>

  <!-- Legend -->
  <rect x="40" y="690" width="16" height="10" fill="#5C6670" stroke="#8B959E" stroke-width="1"/>
  <text x="62" y="699" class="label">Steel HSS</text>
  <rect x="170" y="690" width="16" height="10" fill="#E8E0D4" stroke="#C8C0B4" stroke-width="1"/>
  <text x="192" y="699" class="label">Gypsum Board</text>
  <rect x="330" y="690" width="16" height="10" fill="#8B959E" stroke="#B0B7BD" stroke-width="1"/>
