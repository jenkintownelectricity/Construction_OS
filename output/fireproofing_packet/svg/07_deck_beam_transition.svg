<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <style>
      .title { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: bold; fill: #FF4444; }
      .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #B0B7BD; }
      .dim { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
      .callout-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: bold; fill: #0A0D11; }
      .bar-text { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1056" height="816" fill="#0A0D11"/>

  <!-- DRAFT Watermark -->
  <text x="528" y="450" font-family="JetBrains Mono, monospace" font-size="60" fill="#FF4444" opacity="0.08" text-anchor="middle" transform="rotate(-30, 528, 450)">DRAFT</text>

  <!-- Title -->
  <text x="40" y="45" class="title">Fireproofing — Deck-to-Beam Transition</text>
  <line x1="40" y1="55" x2="520" y2="55" stroke="#FF4444" stroke-width="1" opacity="0.4"/>

  <!-- Fire Rating Badge -->
  <rect x="880" y="25" width="140" height="35" rx="3" fill="none" stroke="#FF4444" stroke-width="2"/>
  <text x="950" y="42" font-family="JetBrains Mono, monospace" font-size="11" fill="#FF4444" text-anchor="middle" font-weight="bold">FIRE RATING</text>
  <text x="950" y="54" font-family="JetBrains Mono, monospace" font-size="10" fill="#FF4444" text-anchor="middle">1-HR / 2-HR</text>

  <!-- Concrete slab on top of deck -->
  <rect x="100" y="150" width="856" height="30" fill="#1A1D21" stroke="#4A657D" stroke-width="1.5"/>
  <text x="528" y="170" class="dim" text-anchor="middle" fill="#4A657D">CONCRETE FILL</text>

  <!-- Fluted Deck -->
  <path d="M100,180 L100,210 L140,210 L140,180 L180,180 L180,210 L220,210 L220,180 L260,180 L260,210 L300,210 L300,180 L340,180 L340,210 L380,210 L380,180 L420,180 L420,210 L460,210 L460,180"
        fill="#1A1D21" stroke="#4A657D" stroke-width="2"/>
  <!-- Deck continues on right side -->
  <path d="M596,180 L596,210 L636,210 L636,180 L676,180 L676,210 L716,210 L716,180 L756,180 L756,210 L796,210 L796,180 L836,180 L836,210 L876,210 L876,180 L916,180 L916,210 L956,210 L956,180"
        fill="#1A1D21" stroke="#4A657D" stroke-width="2"/>

  <!-- SFRM on underside of deck (left) -->
  <path d="M100,210 L100,230 L140,230 L140,210 L180,210 L180,230 L220,230 L220,210 L260,210 L260,230 L300,230 L300,210 L340,210 L340,230 L380,230 L380,210 L420,210 L420,230 L460,230 L460,210"
        fill="#D4A574" opacity="0.5" stroke="#E8C39E" stroke-width="1"/>
  <!-- Simplified deck SFRM band -->
  <rect x="100" y="210" width="360" height="18" rx="2" fill="#D4A574" opacity="0.5" stroke="#E8C39E" stroke-width="1"/>

  <!-- SFRM on underside of deck (right) -->
  <rect x="596" y="210" width="360" height="18" rx="2" fill="#D4A574" opacity="0.5" stroke="#E8C39E" stroke-width="1"/>

  <!-- Beam - Top Flange -->
  <rect x="430" y="180" width="196" height="22" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Beam - Web -->
  <rect x="503" y="202" width="50" height="250" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Beam - Bottom Flange -->
  <rect x="430" y="452" width="196" height="22" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>

  <!-- SFRM on Beam (3 exposed sides) -->
  <!-- Left web -->
  <rect x="483" y="202" width="20" height="250" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <!-- Right web -->
  <rect x="553" y="202" width="20" height="250" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <!-- Bottom flange bottom -->
  <rect x="418" y="474" width="220" height="18" rx="2" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <!-- Bottom flange sides -->
  <rect x="418" y="452" width="12" height="40" rx="2" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <rect x="626" y="452" width="12" height="40" rx="2" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <!-- Top flange underside (between web and edge) -->
  <rect x="430" y="202" width="53" height="12" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>
  <rect x="573" y="202" width="53" height="12" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1.5"/>

  <!-- Transition Zone Highlight -->
  <rect x="448" y="210" width="40" height="20" fill="none" stroke="#FF4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="568" y="210" width="40" height="20" fill="none" stroke="#FF4444" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Transition detail arrows -->
  <path d="M460,228 Q460,235 470,235" fill="none" stroke="#FF4444" stroke-width="1" opacity="0.6"/>
  <path d="M588,228 Q596,235 596,228" fill="none" stroke="#FF4444" stroke-width="1" opacity="0.6"/>

  <!-- Callout 1: Fluted Deck -->
  <circle cx="300" cy="195" r="8" fill="#00E5FF"/>
  <text x="300" y="199" class="callout-num" text-anchor="middle">1</text>
  <line x1="300" y1="187" x2="300" y2="120" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="300" y1="120" x2="200" y2="120" stroke="#00E5FF" stroke-width="1"/>
  <text x="80" y="124" class="label">Fluted Deck</text>

  <!-- Callout 2: Deck SFRM -->
  <circle cx="250" cy="220" r="8" fill="#00E5FF"/>
  <text x="250" y="224" class="callout-num" text-anchor="middle">2</text>
  <line x1="250" y1="228" x2="250" y2="310" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="250" y1="310" x2="160" y2="310" stroke="#00E5FF" stroke-width="1"/>
  <text x="65" y="314" class="label">Deck SFRM</text>

  <!-- Callout 3: Beam Top Flange -->
  <circle cx="528" cy="191" r="8" fill="#00E5FF"/>
  <text x="528" y="195" class="callout-num" text-anchor="middle">3</text>
  <line x1="528" y1="183" x2="528" y2="110" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="528" y1="110" x2="650" y2="110" stroke="#00E5FF" stroke-width="1"/>
  <text x="655" y="114" class="label">Beam Top Flange</text>

  <!-- Callout 4: Beam SFRM -->
  <circle cx="490" cy="380" r="8" fill="#00E5FF"/>
  <text x="490" y="384" class="callout-num" text-anchor="middle">4</text>
  <line x1="482" y1="380" x2="160" y2="380" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="65" y="384" class="label">Beam SFRM</text>

  <!-- Callout 5: Transition Zone -->
  <circle cx="468" cy="220" r="8" fill="#00E5FF"/>
  <text x="468" y="224" class="callout-num" text-anchor="middle">5</text>
  <line x1="468" y1="228" x2="468" y2="560" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="468" y1="560" x2="560" y2="560" stroke="#00E5FF" stroke-width="1"/>
  <text x="565" y="564" class="label">Transition Zone</text>

  <!-- Important note -->
  <rect x="40" y="610" width="500" height="50" rx="3" fill="none" stroke="#FF4444" stroke-width="1" opacity="0.5"/>
  <text x="55" y="630" class="label" fill="#FF4444">CONTINUITY REQUIRED: Deck SFRM must transition seamlessly</text>
  <text x="55" y="648" class="label" fill="#FF4444">to beam SFRM without gaps at the top flange interface.</text>

  <!-- Legend -->
  <rect x="40" y="690" width="16" height="10" fill="#5C6670" stroke="#8B959E" stroke-width="1"/>
  <text x="62" y="699" class="label">Steel</text>
  <rect x="130" y="690" width="16" height="10" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1"/>
  <text x="152" y="699" class="label">SFRM</text>
  <rect x="220" y="690" width="16" height="10" fill="#1A1D21" stroke="#4A657D" stroke-width="1"/>
  <text x="242" y="699" class="label">Concrete / Deck</text>

  <!-- Bottom Bar -->
  <rect x="0" y="790" width="1056" height="26" fill="#0D1117"/>
  <line x1="0" y1="790" x2="1056" y2="790" stroke="#1A1D21" stroke-width="1"/>
  <text x="528" y="806" class="bar-text" text-anchor="middle">DETAIL ATLAS | CONSTRUCTION INTELLIGENCE | Fireproofing Starter Packet | 2026-04-16</text>
</svg>