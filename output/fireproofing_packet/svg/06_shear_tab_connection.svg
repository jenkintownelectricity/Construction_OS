<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <style>
      .title { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: bold; fill: #FF4444; }
      .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #B0B7BD; }
      .dim { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
      .callout-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: bold; fill: #0A0D11; }
      .bar-text { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1056" height="816" fill="#0A0D11"/>

  <!-- DRAFT Watermark -->
  <text x="528" y="450" font-family="JetBrains Mono, monospace" font-size="60" fill="#FF4444" opacity="0.08" text-anchor="middle" transform="rotate(-30, 528, 450)">DRAFT</text>

  <!-- Title -->
  <text x="40" y="45" class="title">Fireproofing — Shear Tab Connection</text>
  <line x1="40" y1="55" x2="500" y2="55" stroke="#FF4444" stroke-width="1" opacity="0.4"/>

  <!-- Fire Rating Badge -->
  <rect x="880" y="25" width="140" height="35" rx="3" fill="none" stroke="#FF4444" stroke-width="2"/>
  <text x="950" y="42" font-family="JetBrains Mono, monospace" font-size="11" fill="#FF4444" text-anchor="middle" font-weight="bold">FIRE RATING</text>
  <text x="950" y="54" font-family="JetBrains Mono, monospace" font-size="10" fill="#FF4444" text-anchor="middle">2-HR</text>

  <!-- SFRM encapsulation (background layer) -->
  <path d="M300,170 L300,570 L370,570 L370,520 L900,520 L900,210 L370,210 L370,170 Z"
        fill="#D4A574" opacity="0.35" stroke="#E8C39E" stroke-width="1.5" rx="5"/>

  <!-- Column - elevation view (left side) -->
  <!-- Column left flange -->
  <rect x="320" y="100" width="18" height="620" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Column web -->
  <rect x="338" y="100" width="70" height="620" fill="#5C6670" stroke="#8B959E" stroke-width="1.5" opacity="0.0"/>
  <rect x="338" y="100" width="70" height="135" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <rect x="338" y="500" width="70" height="220" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Column right flange -->
  <rect x="408" y="100" width="18" height="620" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>

  <!-- Shear Tab Plate (welded to column flange) -->
  <rect x="426" y="275" width="12" height="180" fill="#8B959E" stroke="#B0B7BD" stroke-width="1.5"/>

  <!-- Weld symbols -->
  <path d="M423,280 L429,275 L423,270" fill="none" stroke="#FF4444" stroke-width="1.2"/>
  <path d="M423,455 L429,450 L423,445" fill="none" stroke="#FF4444" stroke-width="1.2"/>
  <line x1="426" y1="275" x2="426" y2="455" stroke="#FF4444" stroke-width="1" opacity="0.4"/>

  <!-- Beam approaching from right -->
  <!-- Beam top flange -->
  <rect x="450" y="235" width="480" height="18" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Beam web -->
  <rect x="450" y="253" width="480" height="224" fill="#0A0D11"/>
  <rect x="450" y="330" width="480" height="70" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Beam bottom flange -->
  <rect x="450" y="477" width="480" height="18" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>

  <!-- Beam web visible portion near connection -->
  <rect x="450" y="275" width="480" height="180" fill="#5C6670" stroke="#8B959E" stroke-width="1" opacity="0.0"/>
  <!-- Show beam web as thin plate at connection -->
  <rect x="450" y="275" width="8" height="180" fill="#5C6670" stroke="#8B959E" stroke-width="1"/>

  <!-- Bolts through shear tab and beam web -->
  <circle cx="442" cy="310" r="6" fill="#8B959E" stroke="#B0B7BD" stroke-width="1.5"/>
  <circle cx="442" cy="345" r="6" fill="#8B959E" stroke="#B0B7BD" stroke-width="1.5"/>
  <circle cx="442" cy="380" r="6" fill="#8B959E" stroke="#B0B7BD" stroke-width="1.5"/>
  <circle cx="442" cy="415" r="6" fill="#8B959E" stroke="#B0B7BD" stroke-width="1.5"/>

  <!-- Gap between beam end and column -->
  <rect x="438" y="253" width="12" height="224" fill="#0A0D11" opacity="0.5"/>

  <!-- Callout 1: Column Flange -->
  <circle cx="415" cy="150" r="8" fill="#00E5FF"/>
  <text x="415" y="154" class="callout-num" text-anchor="middle">1</text>
  <line x1="415" y1="142" x2="415" y2="115" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="415" y1="115" x2="500" y2="115" stroke="#00E5FF" stroke-width="1"/>
  <text x="505" y="119" class="label">Column Flange</text>

  <!-- Callout 2: Shear Tab Plate -->
  <circle cx="432" cy="460" r="8" fill="#00E5FF"/>
  <text x="432" y="464" class="callout-num" text-anchor="middle">2</text>
  <line x1="432" y1="468" x2="432" y2="560" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="432" y1="560" x2="500" y2="560" stroke="#00E5FF" stroke-width="1"/>
  <text x="505" y="564" class="label">Shear Tab Plate</text>

  <!-- Callout 3: Beam Web -->
  <circle cx="500" cy="365" r="8" fill="#00E5FF"/>
  <text x="500" y="369" class="callout-num" text-anchor="middle">3</text>
  <line x1="508" y1="365" x2="580" y2="365" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="585" y="369" class="label">Beam Web</text>

  <!-- Callout 4: Bolts -->
  <circle cx="442" cy="345" r="14" fill="none" stroke="#00E5FF" stroke-width="1"/>
  <line x1="455" y1="335" x2="190" y2="300" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="182" cy="298" r="8" fill="#00E5FF"/>
  <text x="182" y="302" class="callout-num" text-anchor="middle">4</text>
  <text x="100" y="302" class="label">Bolts</text>

  <!-- Callout 5: SFRM Encapsulation -->
  <circle cx="340" cy="540" r="8" fill="#00E5FF"/>
  <text x="340" y="544" class="callout-num" text-anchor="middle">5</text>
  <line x1="332" y1="540" x2="190" y2="540" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="48" y="544" class="label">SFRM Encapsulation</text>

  <!-- Callout 6: Weld -->
  <circle cx="426" cy="280" r="14" fill="none" stroke="#00E5FF" stroke-width="1"/>
  <line x1="415" y1="268" x2="190" y2="200" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="182" cy="197" r="8" fill="#00E5FF"/>
  <text x="182" y="201" class="callout-num" text-anchor="middle">6</text>
  <text x="100" y="201" class="label">Weld</text>

  <!-- Note -->
  <rect x="40" y="620" width="480" height="45" rx="3" fill="none" stroke="#FF4444" stroke-width="1" opacity="0.5"/>
  <text x="55" y="638" class="label" fill="#FF4444">SFRM encapsulation must fully enclose connection hardware.</text>
  <text x="55" y="655" class="label" fill="#FF4444">Shear tab, bolts, and welds covered without voids.</text>

  <!-- Legend -->
  <rect x="40" y="690" width="16" height="10" fill="#5C6670" stroke="#8B959E" stroke-width="1"/>
  <text x="62" y="699" class="label">Steel</text>
  <rect x="130" y="690" width="16" height="10" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1"/>
  <text x="152" y="699" class="label">SFRM</text>
  <rect x="220" y="690" width="16" height="10" fill="#8B959E" stroke="#B0B7BD" stroke-width="1"/>
  <text x="242" y="699" class="label">Shear Tab / Hardware</text>
  <path d="M400,695 L406,690 L400,685" fill="none" stroke="#FF4444" stroke-width="1.2"/>
  <text x="415" y="699" class="label">Weld Symbol</text>

  <!-- Bottom Bar -->
  <rect x="0" y="790" width="1056" height="26" fill="#0D1117"/>
  <line x1="0" y1="790" x2="1056" y2="790" stroke="#1A1D21" stroke-width="1"/>
  <text x="528" y="806" class="bar-text" text-anchor="middle">DETAIL ATLAS | CONSTRUCTION INTELLIGENCE | Fireproofing Starter Packet | 2026-04-16</text>
</svg>