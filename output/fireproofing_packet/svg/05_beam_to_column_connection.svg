<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <style>
      .title { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: bold; fill: #FF4444; }
      .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #B0B7BD; }
      .dim { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
      .callout-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: bold; fill: #0A0D11; }
      .bar-text { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1056" height="816" fill="#0A0D11"/>

  <!-- DRAFT Watermark -->
  <text x="528" y="450" font-family="JetBrains Mono, monospace" font-size="60" fill="#FF4444" opacity="0.08" text-anchor="middle" transform="rotate(-30, 528, 450)">DRAFT</text>

  <!-- Title -->
  <text x="40" y="45" class="title">Fireproofing — Beam-to-Column Connection</text>
  <line x1="40" y1="55" x2="540" y2="55" stroke="#FF4444" stroke-width="1" opacity="0.4"/>

  <!-- Fire Rating Badge -->
  <rect x="880" y="25" width="140" height="35" rx="3" fill="none" stroke="#FF4444" stroke-width="2"/>
  <text x="950" y="42" font-family="JetBrains Mono, monospace" font-size="11" fill="#FF4444" text-anchor="middle" font-weight="bold">FIRE RATING</text>
  <text x="950" y="54" font-family="JetBrains Mono, monospace" font-size="10" fill="#FF4444" text-anchor="middle">2-HR</text>

  <!-- SFRM on Column (behind steel, rendered first) -->
  <rect x="414" y="90" width="172" height="620" rx="3" fill="#D4A574" opacity="0.45" stroke="#E8C39E" stroke-width="1.5"/>

  <!-- SFRM on Beam (continuous wrap) -->
  <rect x="570" y="280" width="400" height="170" rx="3" fill="#D4A574" opacity="0.45" stroke="#E8C39E" stroke-width="1.5"/>

  <!-- SFRM Transition zone highlight -->
  <path d="M570,280 Q560,280 555,285 L555,445 Q560,450 570,450 Z" fill="#D4A574" opacity="0.6" stroke="#E8C39E" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Column - Left Flange -->
  <rect x="430" y="90" width="20" height="620" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Column - Right Flange -->
  <rect x="550" y="90" width="20" height="620" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Column - Web -->
  <rect x="450" y="90" width="100" height="620" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>

  <!-- Connection Plate -->
  <rect x="570" y="310" width="15" height="110" fill="#8B959E" stroke="#B0B7BD" stroke-width="1.5"/>

  <!-- Beam - Top Flange -->
  <rect x="585" y="300" width="380" height="18" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Beam - Web -->
  <rect x="585" y="318" width="380" height="94" fill="#5C6670" stroke="#8B959E" stroke-width="1.5" opacity="0.0"/>
  <rect x="623" y="318" width="342" height="94" fill="#0A0D11"/>
  <rect x="585" y="340" width="380" height="50" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>
  <!-- Beam - Bottom Flange -->
  <rect x="585" y="412" width="380" height="18" fill="#5C6670" stroke="#8B959E" stroke-width="2"/>

  <!-- Bolts on connection plate -->
  <circle cx="578" cy="330" r="5" fill="#8B959E" stroke="#B0B7BD" stroke-width="1.5"/>
  <circle cx="578" cy="355" r="5" fill="#8B959E" stroke="#B0B7BD" stroke-width="1.5"/>
  <circle cx="578" cy="380" r="5" fill="#8B959E" stroke="#B0B7BD" stroke-width="1.5"/>
  <circle cx="578" cy="400" r="5" fill="#8B959E" stroke="#B0B7BD" stroke-width="1.5"/>

  <!-- Weld symbols at plate-to-column -->
  <path d="M567,315 L573,310 L567,305" fill="none" stroke="#FF4444" stroke-width="1" opacity="0.6"/>
  <path d="M567,420 L573,415 L567,410" fill="none" stroke="#FF4444" stroke-width="1" opacity="0.6"/>

  <!-- Callout 1: Column -->
  <circle cx="500" cy="160" r="8" fill="#00E5FF"/>
  <text x="500" y="164" class="callout-num" text-anchor="middle">1</text>
  <line x1="500" y1="152" x2="500" y2="120" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="500" y1="120" x2="600" y2="120" stroke="#00E5FF" stroke-width="1"/>
  <text x="605" y="124" class="label">Column (W14)</text>

  <!-- Callout 2: Beam -->
  <circle cx="800" cy="365" r="8" fill="#00E5FF"/>
  <text x="800" y="369" class="callout-num" text-anchor="middle">2</text>
  <line x1="808" y1="365" x2="900" y2="365" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="905" y="369" class="label">Beam (W18)</text>

  <!-- Callout 3: Connection Plate -->
  <circle cx="577" cy="450" r="8" fill="#00E5FF"/>
  <text x="577" y="454" class="callout-num" text-anchor="middle">3</text>
  <line x1="577" y1="458" x2="577" y2="510" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="577" y1="510" x2="650" y2="510" stroke="#00E5FF" stroke-width="1"/>
  <text x="655" y="514" class="label">Connection Plate</text>

  <!-- Callout 4: Bolts -->
  <circle cx="578" cy="330" r="12" fill="none" stroke="#00E5FF" stroke-width="1"/>
  <line x1="590" y1="322" x2="680" y2="260" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="688" cy="255" r="8" fill="#00E5FF"/>
  <text x="688" y="259" class="callout-num" text-anchor="middle">4</text>
  <text x="703" y="259" class="label">Bolts (typ.)</text>

  <!-- Callout 5: Continuous SFRM -->
  <circle cx="430" cy="400" r="8" fill="#00E5FF"/>
  <text x="430" y="404" class="callout-num" text-anchor="middle">5</text>
  <line x1="422" y1="400" x2="170" y2="400" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="45" y="404" class="label">Continuous SFRM</text>

  <!-- Callout 6: Transition Zone -->
  <circle cx="562" cy="470" r="8" fill="#00E5FF"/>
  <text x="562" y="474" class="callout-num" text-anchor="middle">6</text>
  <line x1="562" y1="478" x2="562" y2="555" stroke="#00E5FF" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="562" y1="555" x2="150" y2="555" stroke="#00E5FF" stroke-width="1"/>
  <text x="40" y="559" class="label">Transition Zone — No Gaps</text>

  <!-- Important note -->
  <rect x="40" y="610" width="430" height="50" rx="3" fill="none" stroke="#FF4444" stroke-width="1" opacity="0.5"/>
  <text x="55" y="630" class="label" fill="#FF4444">CRITICAL: SFRM must be continuous through connection.</text>
  <text x="55" y="648" class="label" fill="#FF4444">No gaps permitted at beam-to-column transition zone.</text>

  <!-- Legend -->
  <rect x="40" y="690" width="16" height="10" fill="#5C6670" stroke="#8B959E" stroke-width="1"/>
  <text x="62" y="699" class="label">Steel</text>
  <rect x="130" y="690" width="16" height="10" fill="#D4A574" opacity="0.7" stroke="#E8C39E" stroke-width="1"/>
  <text x="152" y="699" class="label">SFRM</text>
  <rect x="220" y="690" width="16" height="10" fill="#8B959E" stroke="#B0B7BD" stroke-width="1"/>
  <text x="242" y="699" class="label">Connection Hardware</text>

  <!-- Bottom Bar -->
  <rect x="0" y="790" width="1056" height="26" fill="#0D1117"/>
  <line x1="0" y1="790" x2="1056" y2="790" stroke="#1A1D21" stroke-width="1"/>
  <text x="528" y="806" class="bar-text" text-anchor="middle">DETAIL ATLAS | CONSTRUCTION INTELLIGENCE | Fireproofing Starter Packet | 2026-04-16</text>
</svg>