<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <pattern id="stipple" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#D8D8D8"/>
      <circle cx="1" cy="1" r="0.6" fill="#999"/>
      <circle cx="4" cy="4" r="0.6" fill="#999"/>
    </pattern>
    <pattern id="stipple-lg" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#D8D8D8"/>
      <circle cx="2" cy="2" r="0.7" fill="#999"/>
      <circle cx="6" cy="6" r="0.7" fill="#999"/>
      <circle cx="6" cy="2" r="0.5" fill="#aaa"/>
      <circle cx="2" cy="6" r="0.5" fill="#aaa"/>
    </pattern>
    <pattern id="concrete-hatch" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#F0F0F0"/>
      <circle cx="3" cy="3" r="1" fill="#ccc"/>
      <circle cx="8" cy="7" r="0.8" fill="#ccc"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1056" height="816" fill="#FFFFFF"/>

  <!-- DRAFT Watermark -->
  <text x="528" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" fill="#CCCCCC" opacity="0.3" transform="rotate(-25,528,400)">DRAFT</text>

  <!-- Title -->
  <text x="528" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#000000">Fireproofing — W-Beam at Fluted Deck</text>
  <text x="528" y="68" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333333">Section Through Wide Flange Beam with Metal Deck — SFRM on Three Exposed Sides</text>

  <!-- Fire Rating Badge -->
  <rect x="900" y="32" width="100" height="28" rx="3" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="950" y="51" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#000000">2-HR RATED</text>

  <!-- === FLUTED DECK at top === -->
  <!-- Concrete fill on deck -->
  <path d="M280,175 L280,155 L680,155 L680,175" fill="url(#concrete-hatch)" stroke="#000000" stroke-width="1"/>

  <!-- Fluted deck profile -->
  <path d="M280,175 L300,175 L305,200 L335,200 L340,175 L380,175 L385,200 L415,200 L420,175 L460,175 L465,200 L495,200 L500,175 L540,175 L545,200 L575,200 L580,175 L620,175 L625,200 L655,200 L660,175 L680,175" fill="#F0F0F0" stroke="#000000" stroke-width="1"/>
  <!-- Deck bottom line -->
  <path d="M280,175 L300,175 L305,200 L335,200 L340,175 L380,175 L385,200 L415,200 L420,175 L460,175 L465,200 L495,200 L500,175 L540,175 L545,200 L575,200 L580,175 L620,175 L625,200 L655,200 L660,175 L680,175" fill="none" stroke="#000000" stroke-width="1"/>

  <!-- Steel W-Beam -->
  <!-- Top Flange (in contact with deck) -->
  <rect x="390" y="200" width="180" height="32" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>
  <!-- Web -->
  <rect x="472" y="232" width="18" height="210" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>
  <!-- Bottom Flange -->
  <rect x="390" y="442" width="180" height="32" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>

  <!-- Fillets -->
  <polygon points="472,232 465,232 472,240" fill="#E0E0E0" stroke="#000000" stroke-width="0.75"/>
  <polygon points="490,232 497,232 490,240" fill="#E0E0E0" stroke="#000000" stroke-width="0.75"/>
  <polygon points="472,442 465,442 472,434" fill="#E0E0E0" stroke="#000000" stroke-width="0.75"/>
  <polygon points="490,442 497,442 490,434" fill="#E0E0E0" stroke="#000000" stroke-width="0.75"/>

  <!-- SFRM on 3 sides (not top - deck is there) -->
  <!-- Left web SFRM -->
  <rect x="445" y="232" width="27" height="210" fill="url(#stipple-lg)" stroke="#666666" stroke-width="1"/>
  <!-- Right web SFRM -->
  <rect x="490" y="232" width="27" height="210" fill="url(#stipple-lg)" stroke="#666666" stroke-width="1"/>
  <!-- Bottom flange SFRM underside -->
  <rect x="370" y="474" width="220" height="26" rx="2" fill="url(#stipple-lg)" stroke="#666666" stroke-width="1"/>
  <!-- SFRM inner bottom flange left -->
  <rect x="370" y="420" width="102" height="22" rx="1" fill="url(#stipple-lg)" stroke="#666666" stroke-width="1"/>
  <!-- SFRM inner bottom flange right -->
  <rect x="490" y="420" width="100" height="22" rx="1" fill="url(#stipple-lg)" stroke="#666666" stroke-width="1"/>

  <!-- === DIMENSION LINES === -->
  <!-- SFRM thickness bottom -->
  <line x1="600" y1="474" x2="660" y2="474" stroke="#666666" stroke-width="0.5" stroke-dasharray="4,2"/>
  <line x1="600" y1="500" x2="660" y2="500" stroke="#666666" stroke-width="0.5" stroke-dasharray="4,2"/>
  <line x1="650" y1="474" x2="650" y2="500" stroke="#666666" stroke-width="0.5"/>
  <line x1="645" y1="474" x2="655" y2="474" stroke="#666666" stroke-width="0.75"/>
  <line x1="645" y1="500" x2="655" y2="500" stroke="#666666" stroke-width="0.75"/>
  <text x="665" y="491" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">7/8"</text>

  <!-- Beam depth -->
  <line x1="590" y1="200" x2="730" y2="200" stroke="#666666" stroke-width="0.5" stroke-dasharray="4,2"/>
  <line x1="590" y1="474" x2="730" y2="474" stroke="#666666" stroke-width="0.5" stroke-dasharray="4,2"/>
  <line x1="720" y1="200" x2="720" y2="474" stroke="#666666" stroke-width="0.5"/>
  <line x1="715" y1="200" x2="725" y2="200" stroke="#666666" stroke-width="0.75"/>
  <line x1="715" y1="474" x2="725" y2="474" stroke="#666666" stroke-width="0.75"/>
  <text x="730" y="340" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">W16x31</text>

  <!-- === CALLOUTS === -->
  <!-- Fluted Deck -->
  <line x1="350" y1="185" x2="130" y2="120" stroke="#000000" stroke-width="0.5"/>
  <circle cx="350" cy="185" r="2" fill="#000000"/>
  <text x="60" y="114" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">FLUTED METAL DECK</text>
  <text x="60" y="128" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">20 Ga. Composite Deck</text>

  <!-- Top Flange -->
  <line x1="480" y1="216" x2="800" y2="160" stroke="#000000" stroke-width="0.5"/>
  <circle cx="480" cy="216" r="2" fill="#000000"/>
  <text x="805" y="158" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">TOP FLANGE</text>
  <text x="805" y="172" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">(bearing on deck)</text>

  <!-- Web -->
  <line x1="480" y1="340" x2="800" y2="290" stroke="#000000" stroke-width="0.5"/>
  <circle cx="480" cy="340" r="2" fill="#000000"/>
  <text x="805" y="288" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">WEB</text>

  <!-- Bottom Flange -->
  <line x1="480" y1="458" x2="800" y2="410" stroke="#000000" stroke-width="0.5"/>
  <circle cx="480" cy="458" r="2" fill="#000000"/>
  <text x="805" y="408" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">BOTTOM FLANGE</text>

  <!-- SFRM (3 sides) -->
  <line x1="430" y1="490" x2="130" y2="480" stroke="#000000" stroke-width="0.5"/>
  <circle cx="430" cy="490" r="2" fill="#000000"/>
  <text x="60" y="474" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">SFRM (3 SIDES)</text>
  <text x="60" y="488" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">Spray-Applied Fire-Resistive Material</text>
  <text x="60" y="502" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">Both sides of web + bottom flange</text>

  <!-- Concrete Fill -->
  <line x1="500" y1="165" x2="800" y2="120" stroke="#000000" stroke-width="0.5"/>
  <circle cx="500" cy="165" r="2" fill="#000000"/>
  <text x="805" y="118" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">CONCRETE FILL</text>
  <text x="805" y="132" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">Lightweight concrete topping</text>

  <!-- Notes -->
  <text x="80" y="600" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#000000">NOTES:</text>
  <text x="80" y="616" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">1. Top flange protected by composite deck and concrete fill — SFRM not required on top.</text>
  <text x="80" y="630" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">2. SFRM applied to both sides of web and underside of bottom flange (3-sided protection).</text>
  <text x="80" y="644" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">3. Verify deck attachment to top flange per structural drawings.</text>
  <text x="80" y="658" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">4. Deck flute orientation and concrete fill depth per structural requirements.</text>

  <text x="80" y="690" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">SCALE: NOT TO SCALE</text>

  <!-- === TITLE BLOCK === -->
  <line x1="40" y1="760" x2="1016" y2="760" stroke="#000000" stroke-width="0.75"/>
  <text x="60" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">DETAIL ATLAS | CONSTRUCTION INTELLIGENCE</text>
  <text x="528" y="778" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">Fireproofing — SFRM / Enclosure</text>
  <text x="996" y="778" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">DRAFT | 2026-04-16</text>
  <text x="528" y="796" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#333333">CSI 07 81 00 | Generic SFRM | Starter Packet</text>
  <text x="996" y="796" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#333333">Sheet 02 of 10</text>
</svg>