<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <pattern id="stipple" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#D8D8D8"/>
      <circle cx="1" cy="1" r="0.6" fill="#999"/>
      <circle cx="4" cy="4" r="0.6" fill="#999"/>
    </pattern>
    <pattern id="stipple-lg" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#D8D8D8"/>
      <circle cx="2" cy="2" r="0.7" fill="#999"/>
      <circle cx="6" cy="6" r="0.7" fill="#999"/>
      <circle cx="6" cy="2" r="0.5" fill="#aaa"/>
      <circle cx="2" cy="6" r="0.5" fill="#aaa"/>
    </pattern>
    <pattern id="conc-fill" patternUnits="userSpaceOnUse" width="12" height="12">
      <rect width="12" height="12" fill="#F0F0F0"/>
      <circle cx="3" cy="4" r="1.2" fill="#ccc"/>
      <circle cx="9" cy="9" r="1" fill="#ccc"/>
      <circle cx="7" cy="2" r="0.8" fill="#ddd"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1056" height="816" fill="#FFFFFF"/>

  <!-- DRAFT Watermark -->
  <text x="528" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" fill="#CCCCCC" opacity="0.3" transform="rotate(-25,528,400)">DRAFT</text>

  <!-- Title -->
  <text x="528" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#000000">Fireproofing — Deck-to-Beam Transition</text>
  <text x="528" y="68" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333333">Section Detail — Continuity of SFRM at Deck-to-Beam Interface</text>

  <!-- Fire Rating Badge -->
  <rect x="900" y="32" width="100" height="28" rx="3" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="950" y="51" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#000000">2-HR RATED</text>

  <!-- === MAIN DRAWING === -->

  <!-- Concrete topping on deck -->
  <rect x="120" y="180" width="820" height="30" fill="url(#conc-fill)" stroke="#000000" stroke-width="1"/>

  <!-- Fluted deck profile (left side over beam, right side span) -->
  <!-- Left portion - over beam area -->
  <path d="M120,210 L160,210 L165,240 L195,240 L200,210 L240,210 L245,240 L275,240 L280,210 L320,210 L325,240 L355,240 L360,210 L400,210" fill="#F0F0F0" stroke="#000000" stroke-width="1"/>
  <!-- Right portion - free span -->
  <path d="M560,210 L600,210 L605,240 L635,240 L640,210 L680,210 L685,240 L715,240 L720,210 L760,210 L765,240 L795,240 L800,210 L840,210 L845,240 L875,240 L880,210 L940,210" fill="#F0F0F0" stroke="#000000" stroke-width="1"/>

  <!-- Deck SFRM (underside of deck in free span area) -->
  <path d="M560,210 L600,210 L605,240 L635,240 L640,210 L680,210 L685,240 L715,240 L720,210 L760,210 L765,240 L795,240 L800,210 L840,210 L845,240 L875,240 L880,210 L940,210 L940,255 L560,255 Z" fill="url(#stipple)" stroke="#666666" stroke-width="0.75"/>
  <!-- Deck SFRM undercoat line -->
  <line x1="560" y1="255" x2="940" y2="255" stroke="#666666" stroke-width="1"/>

  <!-- Beam SFRM envelope -->
  <!-- Bottom of beam SFRM -->
  <rect x="350" y="480" width="260" height="28" rx="3" fill="url(#stipple-lg)" stroke="#666666" stroke-width="1"/>
  <!-- Left web SFRM -->
  <rect x="420" y="250" width="25" height="230" fill="url(#stipple-lg)" stroke="#666666" stroke-width="1"/>
  <!-- Right web SFRM -->
  <rect x="515" y="250" width="25" height="230" fill="url(#stipple-lg)" stroke="#666666" stroke-width="1"/>
  <!-- Inner bottom flange SFRM left -->
  <rect x="370" y="450" width="75" height="20" rx="1" fill="url(#stipple-lg)" stroke="#666666" stroke-width="1"/>
  <!-- Inner bottom flange SFRM right -->
  <rect x="515" y="450" width="75" height="20" rx="1" fill="url(#stipple-lg)" stroke="#666666" stroke-width="1"/>

  <!-- Transition zone SFRM (deck SFRM merging into beam SFRM) -->
  <!-- Left transition -->
  <path d="M400,210 L420,210 L420,250 L400,250 Z" fill="url(#stipple)" stroke="#666666" stroke-width="0.75"/>
  <!-- Right transition -->
  <path d="M540,210 L560,210 L560,255 L540,250 Z" fill="url(#stipple)" stroke="#666666" stroke-width="0.75"/>

  <!-- Transition zone highlight -->
  <rect x="395" y="205" width="30" height="55" fill="none" stroke="#000000" stroke-width="0.75" stroke-dasharray="4,2"/>
  <rect x="535" y="205" width="30" height="55" fill="none" stroke="#000000" stroke-width="0.75" stroke-dasharray="4,2"/>

  <!-- Steel beam -->
  <!-- Top flange -->
  <rect x="400" y="210" width="160" height="24" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>
  <!-- Web -->
  <rect x="470" y="234" width="20" height="236" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>
  <!-- Bottom flange -->
  <rect x="400" y="470" width="160" height="24" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>

  <!-- Fillets -->
  <polygon points="470,234 463,234 470,242" fill="#E0E0E0" stroke="#000000" stroke-width="0.5"/>
  <polygon points="490,234 497,234 490,242" fill="#E0E0E0" stroke="#000000" stroke-width="0.5"/>
  <polygon points="470,470 463,470 470,462" fill="#E0E0E0" stroke="#000000" stroke-width="0.5"/>
  <polygon points="490,470 497,470 490,462" fill="#E0E0E0" stroke="#000000" stroke-width="0.5"/>

  <!-- Deck bearing on beam top flange -->
  <line x1="400" y1="210" x2="560" y2="210" stroke="#000000" stroke-width="0.75" stroke-dasharray="2,2"/>

  <!-- === CALLOUTS === -->
  <!-- Fluted Deck -->
  <line x1="700" y1="220" x2="850" y2="120" stroke="#000000" stroke-width="0.5"/>
  <circle cx="700" cy="220" r="2" fill="#000000"/>
  <text x="855" y="118" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">FLUTED DECK</text>
  <text x="855" y="132" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">20 Ga. composite metal deck</text>

  <!-- Deck SFRM -->
  <line x1="750" y1="250" x2="850" y2="300" stroke="#000000" stroke-width="0.5"/>
  <circle cx="750" cy="250" r="2" fill="#000000"/>
  <text x="855" y="298" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">DECK SFRM</text>
  <text x="855" y="312" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">Underside of deck spray coating</text>

  <!-- Beam Top Flange -->
  <line x1="480" y1="222" x2="180" y2="140" stroke="#000000" stroke-width="0.5"/>
  <circle cx="480" cy="222" r="2" fill="#000000"/>
  <text x="60" y="134" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">BEAM TOP FLANGE</text>

  <!-- Beam SFRM -->
  <line x1="430" y1="490" x2="180" y2="560" stroke="#000000" stroke-width="0.5"/>
  <circle cx="430" cy="490" r="2" fill="#000000"/>
  <text x="60" y="554" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">BEAM SFRM</text>
  <text x="60" y="568" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">3-sided SFRM on beam</text>

  <!-- Transition Zone (left) -->
  <line x1="410" y1="230" x2="180" y2="350" stroke="#000000" stroke-width="0.5"/>
  <circle cx="410" cy="230" r="2" fill="#000000"/>
  <text x="60" y="344" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">TRANSITION ZONE</text>
  <text x="60" y="358" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">Deck SFRM meets beam SFRM</text>
  <text x="60" y="372" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">Continuous coverage required</text>
  <text x="60" y="386" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">No gaps at transition</text>

  <!-- Concrete fill -->
  <line x1="300" y1="195" x2="180" y2="220" stroke="#000000" stroke-width="0.5"/>
  <circle cx="300" cy="195" r="2" fill="#000000"/>
  <text x="60" y="220" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">CONCRETE TOPPING</text>

  <!-- Notes -->
  <text x="80" y="620" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#000000">NOTES:</text>
  <text x="80" y="636" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">1. Deck SFRM and beam SFRM must transition continuously — no gaps or voids.</text>
  <text x="80" y="650" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">2. Transition zone to maintain minimum required thickness of both assemblies.</text>
  <text x="80" y="664" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">3. Deck SFRM applied to underside of deck flutes in free-span areas.</text>
  <text x="80" y="678" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">4. Beam SFRM on 3 sides where deck provides top protection.</text>

  <text x="80" y="710" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">SCALE: NOT TO SCALE | VIEW: SECTION</text>

  <!-- === TITLE BLOCK === -->
  <line x1="40" y1="760" x2="1016" y2="760" stroke="#000000" stroke-width="0.75"/>
  <text x="60" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">DETAIL ATLAS | CONSTRUCTION INTELLIGENCE</text>
  <text x="528" y="778" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">Fireproofing — SFRM / Enclosure</text>
  <text x="996" y="778" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">DRAFT | 2026-04-16</text>
  <text x="528" y="796" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#333333">CSI 07 81 00 | Generic SFRM | Starter Packet</text>
  <text x="996" y="796" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#333333">Sheet 07 of 10</text>
</svg>