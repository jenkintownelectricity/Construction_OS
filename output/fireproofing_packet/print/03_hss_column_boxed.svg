<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <pattern id="gypsum-hatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#F5F5F5"/>
      <line x1="0" y1="4" x2="4" y2="0" stroke="#ddd" stroke-width="0.3"/>
    </pattern>
    <pattern id="gypsum-hatch2" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#EBEBEB"/>
      <line x1="0" y1="4" x2="4" y2="0" stroke="#ccc" stroke-width="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1056" height="816" fill="#FFFFFF"/>

  <!-- DRAFT Watermark -->
  <text x="528" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" fill="#CCCCCC" opacity="0.3" transform="rotate(-25,528,400)">DRAFT</text>

  <!-- Title -->
  <text x="528" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#000000">Fireproofing — HSS Column Boxed Enclosure</text>
  <text x="528" y="68" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333333">Plan Section Through HSS Column with Metal Stud Framing and Gypsum Board Layers</text>

  <!-- Fire Rating Badge -->
  <rect x="900" y="32" width="100" height="28" rx="3" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="950" y="51" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#000000">2-HR RATED</text>

  <!-- === MAIN DRAWING (plan view) === -->
  <!-- Center at 480, 370 -->

  <!-- Outer Gypsum Layer 2 (outermost) -->
  <rect x="340" y="230" width="280" height="280" fill="url(#gypsum-hatch)" stroke="#000000" stroke-width="1"/>

  <!-- Gypsum Layer 1 (inner layer) -->
  <rect x="352" y="242" width="256" height="256" fill="url(#gypsum-hatch2)" stroke="#000000" stroke-width="1"/>

  <!-- Air space (white gap) -->
  <rect x="364" y="254" width="232" height="232" fill="#FFFFFF" stroke="none"/>

  <!-- Metal stud tracks (shown as C-shapes on each side) -->
  <!-- Left stud -->
  <rect x="364" y="310" width="12" height="120" fill="#E0E0E0" stroke="#000000" stroke-width="0.75"/>
  <rect x="364" y="310" width="3" height="120" fill="#ccc" stroke="#000000" stroke-width="0.5"/>
  <!-- Right stud -->
  <rect x="584" y="310" width="12" height="120" fill="#E0E0E0" stroke="#000000" stroke-width="0.75"/>
  <rect x="593" y="310" width="3" height="120" fill="#ccc" stroke="#000000" stroke-width="0.5"/>
  <!-- Top stud -->
  <rect x="430" y="254" width="100" height="12" fill="#E0E0E0" stroke="#000000" stroke-width="0.75"/>
  <rect x="430" y="254" width="100" height="3" fill="#ccc" stroke="#000000" stroke-width="0.5"/>
  <!-- Bottom stud -->
  <rect x="430" y="474" width="100" height="12" fill="#E0E0E0" stroke="#000000" stroke-width="0.75"/>
  <rect x="430" y="483" width="100" height="3" fill="#ccc" stroke="#000000" stroke-width="0.5"/>

  <!-- HSS Column (center) -->
  <rect x="440" y="330" width="80" height="80" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>
  <!-- HSS hollow interior -->
  <rect x="448" y="338" width="64" height="64" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>

  <!-- Corner beads at outer gypsum corners (small L shapes) -->
  <!-- Top-Left corner -->
  <line x1="336" y1="226" x2="336" y2="240" stroke="#000000" stroke-width="1.5"/>
  <line x1="336" y1="226" x2="350" y2="226" stroke="#000000" stroke-width="1.5"/>
  <!-- Top-Right corner -->
  <line x1="624" y1="226" x2="624" y2="240" stroke="#000000" stroke-width="1.5"/>
  <line x1="610" y1="226" x2="624" y2="226" stroke="#000000" stroke-width="1.5"/>
  <!-- Bottom-Left corner -->
  <line x1="336" y1="500" x2="336" y2="514" stroke="#000000" stroke-width="1.5"/>
  <line x1="336" y1="514" x2="350" y2="514" stroke="#000000" stroke-width="1.5"/>
  <!-- Bottom-Right corner -->
  <line x1="624" y1="500" x2="624" y2="514" stroke="#000000" stroke-width="1.5"/>
  <line x1="610" y1="514" x2="624" y2="514" stroke="#000000" stroke-width="1.5"/>

  <!-- === DIMENSION LINES === -->
  <!-- Airspace dimension -->
  <line x1="376" y1="370" x2="440" y2="370" stroke="#666666" stroke-width="0.5" stroke-dasharray="4,2"/>
  <line x1="376" y1="365" x2="376" y2="375" stroke="#666666" stroke-width="0.75"/>
  <line x1="440" y1="365" x2="440" y2="375" stroke="#666666" stroke-width="0.75"/>
  <text x="395" y="363" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">AIR</text>

  <!-- Gypsum layer thickness -->
  <line x1="340" y1="540" x2="340" y2="580" stroke="#666666" stroke-width="0.5" stroke-dasharray="4,2"/>
  <line x1="352" y1="540" x2="352" y2="580" stroke="#666666" stroke-width="0.5" stroke-dasharray="4,2"/>
  <line x1="340" y1="570" x2="352" y2="570" stroke="#666666" stroke-width="0.5"/>
  <text x="346" y="590" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#000000">5/8"</text>

  <line x1="352" y1="540" x2="352" y2="605" stroke="#666666" stroke-width="0.5" stroke-dasharray="4,2"/>
  <line x1="364" y1="540" x2="364" y2="605" stroke="#666666" stroke-width="0.5" stroke-dasharray="4,2"/>
  <line x1="352" y1="600" x2="364" y2="600" stroke="#666666" stroke-width="0.5"/>
  <text x="358" y="615" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#000000">5/8"</text>

  <!-- HSS size -->
  <line x1="440" y1="520" x2="440" y2="560" stroke="#666666" stroke-width="0.5" stroke-dasharray="4,2"/>
  <line x1="520" y1="520" x2="520" y2="560" stroke="#666666" stroke-width="0.5" stroke-dasharray="4,2"/>
  <line x1="440" y1="550" x2="520" y2="550" stroke="#666666" stroke-width="0.5"/>
  <line x1="440" y1="545" x2="440" y2="555" stroke="#666666" stroke-width="0.75"/>
  <line x1="520" y1="545" x2="520" y2="555" stroke="#666666" stroke-width="0.75"/>
  <text x="480" y="545" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">HSS 6x6</text>

  <!-- === CALLOUTS === -->
  <!-- HSS Column -->
  <line x1="480" y1="370" x2="780" y2="200" stroke="#000000" stroke-width="0.5"/>
  <circle cx="480" cy="370" r="2" fill="#000000"/>
  <text x="785" y="198" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">HSS COLUMN</text>
  <text x="785" y="212" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">HSS 6x6x3/8</text>

  <!-- Metal Stud Track -->
  <line x1="376" y1="370" x2="130" y2="300" stroke="#000000" stroke-width="0.5"/>
  <circle cx="376" cy="370" r="2" fill="#000000"/>
  <text x="60" y="294" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">METAL STUD TRACK</text>
  <text x="60" y="308" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">20 Ga. (min.) steel track</text>

  <!-- Gypsum Layer 1 -->
  <line x1="358" y1="280" x2="130" y2="200" stroke="#000000" stroke-width="0.5"/>
  <circle cx="358" cy="280" r="2" fill="#000000"/>
  <text x="60" y="194" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">GYPSUM LAYER 1</text>
  <text x="60" y="208" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">5/8" Type X Gypsum Board</text>

  <!-- Gypsum Layer 2 -->
  <line x1="346" y1="260" x2="130" y2="145" stroke="#000000" stroke-width="0.5"/>
  <circle cx="346" cy="260" r="2" fill="#000000"/>
  <text x="60" y="139" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">GYPSUM LAYER 2</text>
  <text x="60" y="153" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">5/8" Type X Gypsum Board</text>

  <!-- Corner Bead -->
  <line x1="336" y1="230" x2="130" y2="400" stroke="#000000" stroke-width="0.5"/>
  <circle cx="336" cy="230" r="2" fill="#000000"/>
  <text x="60" y="394" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">CORNER BEAD</text>
  <text x="60" y="408" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">Metal corner bead, typ. all corners</text>

  <!-- Airspace callout -->
  <line x1="410" y1="300" x2="780" y2="300" stroke="#000000" stroke-width="0.5"/>
  <circle cx="410" cy="300" r="2" fill="#000000"/>
  <text x="785" y="298" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#000000">AIR SPACE</text>
  <text x="785" y="312" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">Min. 1" clearance (typ.)</text>

  <!-- Notes -->
  <text x="80" y="630" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#000000">NOTES:</text>
  <text x="80" y="646" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">1. Two (2) layers 5/8" Type X gypsum board each side of column enclosure.</text>
  <text x="80" y="660" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">2. Stagger joints between layers. Fasten per UL assembly requirements.</text>
  <text x="80" y="674" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">3. Maintain minimum 1" air space between column face and inner gypsum layer.</text>
  <text x="80" y="688" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">4. Metal corner bead at all exposed corners. Tape and finish all joints.</text>

  <text x="80" y="715" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333333">SCALE: NOT TO SCALE | VIEW: PLAN SECTION</text>

  <!-- === TITLE BLOCK === -->
  <line x1="40" y1="760" x2="1016" y2="760" stroke="#000000" stroke-width="0.75"/>
  <text x="60" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">DETAIL ATLAS | CONSTRUCTION INTELLIGENCE</text>
  <text x="528" y="778" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">Fireproofing — SFRM / Enclosure</text>
  <text x="996" y="778" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">DRAFT | 2026-04-16</text>
  <text x="528" y="796" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#333333">CSI 07 81 00 | Generic SFRM | Starter Packet</text>
  <text x="996" y="796" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#333333">Sheet 03 of 10</text>
</svg>