  <text x="790" y="612" class="label" fill="#FF6B35" font-size="9">INSTALLATION NOTES:</text>
  <text x="790" y="630" class="label" font-size="8">1. Terminate PMMA at each side of joint.</text>
  <text x="790" y="644" class="label" font-size="8">2. Fleece must remain unbonded at center.</text>
