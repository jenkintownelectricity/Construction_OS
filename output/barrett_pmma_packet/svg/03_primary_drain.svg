  <!-- Deck hatch left -->
  <g stroke="#3A3F44" stroke-width="0.5" opacity="0.6">
    <line x1="90" y1="420" x2="115" y2="470"/><line x1="130" y1="420" x2="155" y2="470"/>
    <line x1="170" y1="420" x2="195" y2="470"/><line x1="210" y1="420" x2="235" y2="470"/>
