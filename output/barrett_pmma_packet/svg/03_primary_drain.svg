<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" font-family="'JetBrains Mono', monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="none" stroke="#4A657D" stroke-width="1"/></marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill="none" stroke="#4A657D" stroke-width="1"/></marker>
  </defs>

  <rect width="1056" height="816" fill="#0A0D11"/>
  <text x="528" y="450" text-anchor="middle" font-size="110" font-weight="bold" fill="#1A1D21" opacity="0.35" transform="rotate(-35,528,450)">DRAFT FOR REVIEW</text>

  <!-- Title Block -->
  <text x="40" y="45" font-size="14" font-weight="bold" fill="#00E5FF">Barrett PMMA — Primary Drain Detail</text>
  <text x="40" y="65" font-size="10" fill="#B0B7BD">Detail 03 | DWG-PMMA-03 Rev A | Section Cut — Roof Drain Assembly</text>
  <line x1="40" y1="78" x2="1016" y2="78" stroke="#4A657D" stroke-width="1"/>

  <!-- ============ DRAWING AREA ============ -->

