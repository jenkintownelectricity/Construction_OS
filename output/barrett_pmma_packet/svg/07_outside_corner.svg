<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <style>
      .title { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: bold; fill: #00E5FF; }
      .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #B0B7BD; }
      .dim { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
      .callout-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: bold; fill: #0A0D11; }
      .step-num { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: bold; fill: #00E5FF; }
      .step-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: bold; fill: #B0B7BD; }
      .watermark { font-family: 'JetBrains Mono', monospace; font-size: 60px; fill: #FF4444; opacity: 0.08; }
      .bottom-bar { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4A657D; }
      .bottom-bar-title { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #00E5FF; }
      .note { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #FF6B35; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1056" height="816" fill="#0A0D11"/>

  <!-- DRAFT Watermark -->
  <text x="528" y="450" class="watermark" text-anchor="middle" transform="rotate(-30, 528, 450)">DRAFT</text>

  <!-- Title Block -->
  <text x="40" y="40" class="title">Barrett PMMA — Outside Corner Reinforcement</text>
  <line x1="40" y1="50" x2="500" y2="50" stroke="#00E5FF" stroke-width="1" opacity="0.4"/>
  <text x="40" y="68" class="label" opacity="0.6">3-STEP REINFORCEMENT AT EXTERIOR ANGLE WITH RELIEF CUTS</text>

  <!-- Vertical wall going up -->
  <rect x="300" y="150" width="40" height="300" fill="#1A1D21" stroke="#4A657D" stroke-width="1"/>
  <line x1="305" y1="160" x2="335" y2="160" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="180" x2="335" y2="180" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="200" x2="335" y2="200" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="220" x2="335" y2="220" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="240" x2="335" y2="240" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="260" x2="335" y2="260" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="280" x2="335" y2="280" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="300" x2="335" y2="300" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="320" x2="335" y2="320" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="340" x2="335" y2="340" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="360" x2="335" y2="360" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="380" x2="335" y2="380" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="400" x2="335" y2="400" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="420" x2="335" y2="420" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="305" y1="440" x2="335" y2="440" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>

  <!-- Horizontal surface extending right -->
  <rect x="340" y="450" width="250" height="40" fill="#1A1D21" stroke="#4A657D" stroke-width="1"/>
  <line x1="360" y1="455" x2="360" y2="485" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="380" y1="455" x2="380" y2="485" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="400" y1="455" x2="400" y2="485" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="420" y1="455" x2="420" y2="485" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="440" y1="455" x2="440" y2="485" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="460" y1="455" x2="460" y2="485" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="480" y1="455" x2="480" y2="485" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="500" y1="455" x2="500" y2="485" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="520" y1="455" x2="520" y2="485" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="540" y1="455" x2="540" y2="485" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="560" y1="455" x2="560" y2="485" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>
  <line x1="580" y1="455" x2="580" y2="485" stroke="#4A657D" stroke-width="0.3" opacity="0.3"/>

  <!-- Outside corner point -->
  <circle cx="340" cy="450" r="3" fill="#4A657D" opacity="0.5"/>

  <!-- STEP 1: PMMA PRIMER (cyan, inner) -->
  <line x1="297" y1="310" x2="297" y2="450" stroke="#00E5FF" stroke-width="3" opacity="0.6"/>
  <line x1="297" y1="450" x2="340" y2="450" stroke="#00E5FF" stroke-width="3" opacity="0.6"/>
  <line x1="340" y1="447" x2="490" y2="447" stroke="#00E5FF" stroke-width="3" opacity="0.6"/>

  <!-- STEP 2: FLEECE IN RESIN (orange) with relief cuts -->
  <line x1="293" y1="315" x2="293" y2="445" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="293" y1="445" x2="310" y2="445" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="320" y1="445" x2="335" y2="445" stroke="#FF6B35" stroke-width="2" opacity="0.3"/>
  <line x1="345" y1="443" x2="485" y2="443" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Relief cut lines (dotted) -->
  <line x1="315" y1="435" x2="315" y2="455" stroke="#FF6B35" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="335" y1="435" x2="335" y2="455" stroke="#FF6B35" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="325" y1="430" x2="325" y2="400" stroke="#FF6B35" stroke-width="0.5"/>
  <text x="330" y="398" class="note">RELIEF CUT</text>

  <!-- STEP 3: SEAL COAT (cyan, outer) -->
  <line x1="289" y1="310" x2="289" y2="448" stroke="#00E5FF" stroke-width="3"/>
  <line x1="289" y1="448" x2="340" y2="448" stroke="#00E5FF" stroke-width="3"/>
  <line x1="340" y1="440" x2="490" y2="440" stroke="#00E5FF" stroke-width="3"/>

  <!-- Relief Cut Detail Inset -->
  <rect x="80" y="530" width="250" height="180" fill="#0A0D11" stroke="#4A657D" stroke-width="1" rx="2"/>
  <text x="100" y="555" class="title" font-size="11">RELIEF CUT DETAIL</text>
  <line x1="100" y1="562" x2="310" y2="562" stroke="#4A657D" stroke-width="0.5" opacity="0.4"/>

  <!-- Zoomed corner substrate -->
  <line x1="180" y1="580" x2="180" y2="680" stroke="#4A657D" stroke-width="2"/>
  <line x1="180" y1="680" x2="280" y2="680" stroke="#4A657D" stroke-width="2"/>

  <!-- Fleece with V-cut notches -->
  <line x1="170" y1="590" x2="170" y2="665" stroke="#FF6B35" stroke-width="2"/>
  <line x1="170" y1="665" x2="175" y2="670" stroke="#FF6B35" stroke-width="2"/>
  <line x1="175" y1="670" x2="180" y2="675" stroke="#FF6B35" stroke-width="2" opacity="0.3"/>
  <line x1="185" y1="675" x2="190" y2="670" stroke="#FF6B35" stroke-width="2"/>
  <line x1="190" y1="670" x2="270" y2="670" stroke="#FF6B35" stroke-width="2"/>

  <path d="M172,662 L180,675 L188,662" fill="none" stroke="#FF6B35" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="175" y="658" class="note" font-size="7">V-CUT</text>

  <text x="100" y="700" class="label" font-size="8">Cut fleece at corners to allow</text>
  <text x="100" y="712" class="label" font-size="8">flat lay without bunching.</text>

  <!-- 4 IN. MIN vertical dimension -->
  <line x1="280" y1="450" x2="270" y2="450" stroke="#4A657D" stroke-width="0.5" stroke-dasharray="3,2"/>
  <line x1="280" y1="315" x2="270" y2="315" stroke="#4A657D" stroke-width="0.5" stroke-dasharray="3,2"/>
  <line x1="275" y1="320" x2="275" y2="445" stroke="#4A657D" stroke-width="0.8" stroke-dasharray="4,2"/>
  <line x1="270" y1="450" x2="280" y2="450" stroke="#4A657D" stroke-width="1"/>
  <line x1="270" y1="315" x2="280" y2="315" stroke="#4A657D" stroke-width="1"/>
  <polygon points="275,323 272,331 278,331" fill="#4A657D"/>
  <polygon points="275,442 272,434 278,434" fill="#4A657D"/>
  <text x="265" y="386" class="dim" transform="rotate(-90, 265, 386)" text-anchor="middle">4 IN. MIN</text>

  <!-- 4 IN. MIN horizontal dimension -->
  <line x1="340" y1="500" x2="340" y2="510" stroke="#4A657D" stroke-width="0.5" stroke-dasharray="3,2"/>
  <line x1="490" y1="500" x2="490" y2="510" stroke="#4A657D" stroke-width="0.5" stroke-dasharray="3,2"/>
  <line x1="345" y1="505" x2="485" y2="505" stroke="#4A657D" stroke-width="0.8" stroke-dasharray="4,2"/>
  <line x1="340" y1="500" x2="340" y2="510" stroke="#4A657D" stroke-width="1"/>
  <line x1="490" y1="500" x2="490" y2="510" stroke="#4A657D" stroke-width="1"/>
  <polygon points="348,505 356,502 356,508" fill="#4A657D"/>
  <polygon points="482,505 474,502 474,508" fill="#4A657D"/>
  <text x="415" y="520" class="dim" text-anchor="middle">4 IN. MIN</text>

  <!-- Step Callouts -->
  <rect x="620" y="180" width="380" height="70" fill="#0A0D11" stroke="#00E5FF" stroke-width="1" rx="3" opacity="0.9"/>
  <text x="640" y="205" class="step-num">STEP 1</text>
  <text x="745" y="205" class="step-label">PMMA PRIMER</text>
  <text x="640" y="225" class="label">Apply Barrett PMMA primer to all</text>
  <text x="640" y="240" class="label">surfaces at outside corner.</text>
  <line x1="620" y1="220" x2="490" y2="447" stroke="#00E5FF" stroke-width="0.5" stroke-dasharray="4,3"/>

  <rect x="620" y="275" width="380" height="70" fill="#0A0D11" stroke="#FF6B35" stroke-width="1" rx="3" opacity="0.9"/>
  <text x="640" y="300" class="step-num" fill="#FF6B35">STEP 2</text>
  <text x="745" y="300" class="step-label">FLEECE + RELIEF CUTS</text>
  <text x="640" y="320" class="label">Cut fleece at corner apex. Embed</text>
  <text x="640" y="335" class="label">into wet resin with overlap.</text>
  <line x1="620" y1="315" x2="485" y2="443" stroke="#FF6B35" stroke-width="0.5" stroke-dasharray="4,3"/>

  <rect x="620" y="370" width="380" height="70" fill="#0A0D11" stroke="#00E5FF" stroke-width="1" rx="3" opacity="0.9"/>
  <text x="640" y="395" class="step-num">STEP 3</text>
  <text x="745" y="395" class="step-label">SEAL COAT</text>
  <text x="640" y="415" class="label">Apply PMMA seal coat over cured</text>
  <text x="640" y="430" class="label">reinforcement. Full encapsulation.</text>
  <line x1="620" y1="410" x2="490" y2="440" stroke="#00E5FF" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Material Key -->
  <rect x="620" y="480" width="380" height="100" fill="#0A0D11" stroke="#4A657D" stroke-width="0.5" rx="2"/>
  <text x="640" y="505" class="title" font-size="11">MATERIAL KEY</text>
  <line x1="640" y1="512" x2="980" y2="512" stroke="#4A657D" stroke-width="0.5" opacity="0.4"/>
  <line x1="640" y1="530" x2="670" y2="530" stroke="#00E5FF" stroke-width="3"/>
  <text x="680" y="534" class="label">PMMA System (Primer / Seal Coat)</text>
  <line x1="640" y1="550" x2="670" y2="550" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="680" y="554" class="label">Fleece Reinforcement</text>
  <line x1="640" y1="570" x2="670" y2="570" stroke="#FF6B35" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="680" y="574" class="label">Relief Cut Location</text>

  <!-- Bottom Bar -->
  <rect x="0" y="786" width="1056" height="30" fill="#0A0D11" stroke="#4A657D" stroke-width="0.5"/>
  <text x="40" y="805" class="bottom-bar-title">DETAIL ATLAS | CONSTRUCTION INTELLIGENCE</text>
  <text x="1016" y="805" class="bottom-bar" text-anchor="end">Barrett PMMA Emergency Packet | 2026-04-16</text>
  <text x="528" y="805" class="dim" text-anchor="middle">CONDITION 07 — OUTSIDE CORNER REINFORCEMENT</text>
</svg>
