  <polygon points="520,376 530,380 520,384" fill="#000000"/>
  <text x="320" y="375" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#000000" text-anchor="middle">SLOPE TO DRAIN</text>
  <!-- Slope percentage -->
  <text x="320" y="365" font-family="Arial, Helvetica, sans-serif" font-size="7px" fill="#666666" text-anchor="middle">1/4 IN. PER FT MIN</text>

