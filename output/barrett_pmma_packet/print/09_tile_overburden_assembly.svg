<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <pattern id="concrete-stipple" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="2" cy="3" r="0.5" fill="#CCCCCC"/>
      <circle cx="7" cy="8" r="0.5" fill="#CCCCCC"/>
      <circle cx="5" cy="1" r="0.5" fill="#CCCCCC"/>
    </pattern>
    <pattern id="tile-hatch" patternUnits="userSpaceOnUse" width="30" height="15">
      <rect x="0" y="0" width="14" height="14" fill="#E0E0E0" stroke="#AAAAAA" stroke-width="0.5"/>
      <rect x="15" y="0" width="14" height="14" fill="#E0E0E0" stroke="#AAAAAA" stroke-width="0.5"/>
    </pattern>
    <pattern id="mortar-dots" patternUnits="userSpaceOnUse" width="8" height="8">
      <circle cx="2" cy="2" r="0.7" fill="#BBBBBB"/>
      <circle cx="6" cy="6" r="0.7" fill="#BBBBBB"/>
    </pattern>
    <pattern id="insulation-hatch" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,8 L8,0" stroke="#999999" stroke-width="0.5" fill="none"/>
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="1056" height="816" fill="#FFFFFF"/>

  <!-- DRAFT watermark -->
  <text x="528" y="400" font-family="Arial, Helvetica, sans-serif" font-size="48px" fill="#CCCCCC" opacity="0.3" text-anchor="middle" transform="rotate(-25, 528, 400)">DRAFT FOR REVIEW</text>

  <!-- Title -->
  <text x="60" y="50" font-family="Arial, Helvetica, sans-serif" font-size="16px" font-weight="bold" fill="#000000">Barrett PMMA — Tile / Overburden Assembly</text>
  <text x="60" y="68" font-family="Arial, Helvetica, sans-serif" font-size="11px" fill="#333333">Section Detail — Full assembly stack with PMMA waterproofing below tile/paver overburden</text>

  <!-- ============ MAIN DETAIL — LAYERED STACK ============ -->
  <!-- Layer positions (bottom to top): -->
  <!-- Structural slab: y=520 to y=590 (70px) -->
  <!-- PMMA system: y=505 to y=520 (15px) -->
  <!-- Protection board: y=485 to y=505 (20px) -->
  <!-- Insulation/drainage: y=450 to y=485 (35px) -->
  <!-- Mortar bed: y=420 to y=450 (30px) -->
  <!-- Tile/Pavers: y=395 to y=420 (25px) -->

  <!-- 1. Structural slab -->
  <rect x="120" y="520" width="460" height="70" fill="#F0F0F0" stroke="#000000" stroke-width="1.5"/>
  <rect x="120" y="520" width="460" height="70" fill="url(#concrete-stipple)" opacity="0.5"/>

  <!-- 2. PMMA Primer (thin line at interface) -->
  <line x1="120" y1="518" x2="580" y2="518" stroke="#333333" stroke-width="0.75" stroke-dasharray="2 1"/>

  <!-- 3. PMMA Membrane system -->
  <rect x="120" y="505" width="460" height="15" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>
  <!-- Fleece inside PMMA -->
  <line x1="125" y1="512" x2="575" y2="512" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- 4. Protection board -->
  <rect x="120" y="485" width="460" height="20" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <!-- Cross-hatch for protection board -->
  <line x1="120" y1="485" x2="580" y2="505" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="120" y1="505" x2="580" y2="485" stroke="#CCCCCC" stroke-width="0.5"/>

  <!-- 5. Insulation / Drainage mat -->
  <rect x="120" y="450" width="460" height="35" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <rect x="120" y="450" width="460" height="35" fill="url(#insulation-hatch)"/>

  <!-- 6. Mortar bed -->
  <rect x="120" y="420" width="460" height="30" fill="#ECECEC" stroke="#000000" stroke-width="1"/>
  <rect x="120" y="420" width="460" height="30" fill="url(#mortar-dots)"/>

  <!-- 7. Tile/Pavers -->
  <rect x="120" y="395" width="460" height="25" fill="url(#tile-hatch)" stroke="#000000" stroke-width="1.5"/>
  <!-- Individual tile lines -->
  <line x1="180" y1="395" x2="180" y2="420" stroke="#999999" stroke-width="0.5"/>
  <line x1="240" y1="395" x2="240" y2="420" stroke="#999999" stroke-width="0.5"/>
  <line x1="300" y1="395" x2="300" y2="420" stroke="#999999" stroke-width="0.5"/>
  <line x1="360" y1="395" x2="360" y2="420" stroke="#999999" stroke-width="0.5"/>
  <line x1="420" y1="395" x2="420" y2="420" stroke="#999999" stroke-width="0.5"/>
  <line x1="480" y1="395" x2="480" y2="420" stroke="#999999" stroke-width="0.5"/>
  <line x1="540" y1="395" x2="540" y2="420" stroke="#999999" stroke-width="0.5"/>

  <!-- Slope arrow pointing to drain (right side) -->
