  <text x="605" y="493" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">4</text>

  <!-- 5. Protection Board -->
  <circle cx="350" cy="495" r="3" fill="#000000"/>
  <line x1="350" y1="495" x2="600" y2="470" stroke="#000000" stroke-width="0.5"/>
  <text x="605" y="473" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">5</text>

