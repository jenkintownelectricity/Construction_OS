  <!-- Layer bracket lines -->
  <!-- Structural slab -->
  <line x1="105" y1="522" x2="105" y2="588" stroke="#000000" stroke-width="0.5"/>
  <line x1="105" y1="522" x2="115" y2="522" stroke="#000000" stroke-width="0.5"/>
  <line x1="105" y1="588" x2="115" y2="588" stroke="#000000" stroke-width="0.5"/>

  <!-- PMMA system -->
  <line x1="105" y1="507" x2="105" y2="518" stroke="#000000" stroke-width="0.5"/>
  <line x1="105" y1="507" x2="115" y2="507" stroke="#000000" stroke-width="0.5"/>
  <line x1="105" y1="518" x2="115" y2="518" stroke="#000000" stroke-width="0.5"/>

  <!-- ============ NOTE: HYPPOCOAT 250 ============ -->
