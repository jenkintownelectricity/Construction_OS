  <rect x="255" y="328" width="180" height="4" fill="url(#fleece-diagonal)" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- PMMA Seal coat on top -->
  <rect x="200" y="322" width="290" height="4" fill="#D8D8D8" stroke="#333333" stroke-width="1" opacity="0.6"/>

