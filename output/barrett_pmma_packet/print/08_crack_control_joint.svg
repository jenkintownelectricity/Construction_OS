  <line x1="345" y1="420" x2="345" y2="550" stroke="#000000" stroke-width="0.5"/>
  <line x1="345" y1="550" x2="290" y2="550" stroke="#000000" stroke-width="0.5"/>
  <text x="275" y="553" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">2</text>

