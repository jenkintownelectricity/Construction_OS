  <line x1="200" y1="300" x2="490" y2="300" stroke="#666666" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="200" y1="295" x2="200" y2="305" stroke="#666666" stroke-width="0.75"/>
  <line x1="490" y1="295" x2="490" y2="305" stroke="#666666" stroke-width="0.75"/>
  <!-- Center tick -->
  <line x1="345" y1="295" x2="345" y2="305" stroke="#666666" stroke-width="0.75"/>
  <!-- Extension lines -->
  <line x1="200" y1="322" x2="200" y2="303" stroke="#666666" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="490" y1="322" x2="490" y2="303" stroke="#666666" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="345" y1="322" x2="345" y2="303" stroke="#666666" stroke-width="0.3" stroke-dasharray="2 2"/>
  <text x="238" y="292" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">3 IN.</text>
  <text x="393" y="292" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">3 IN.</text>
  <text x="290" y="278" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" font-weight="bold">6 IN. TOTAL WIDTH</text>

