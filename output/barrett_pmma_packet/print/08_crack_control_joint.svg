  <line x1="380" y1="335" x2="530" y2="520" stroke="#000000" stroke-width="0.5"/>

  <!-- Enlarged inset box -->
  <rect x="510" y="490" width="150" height="130" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <text x="585" y="508" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#000000" text-anchor="middle" font-weight="bold">ENLARGED JOINT DETAIL</text>

  <!-- Enlarged content -->
  <rect x="520" y="545" width="50" height="60" fill="#F0F0F0" stroke="#000000" stroke-width="1"/>
  <rect x="590" y="545" width="50" height="60" fill="#F0F0F0" stroke="#000000" stroke-width="1"/>
  <rect x="570" y="545" width="20" height="60" fill="#FAFAFA" stroke="#000000" stroke-width="0.5"/>
  <circle cx="580" cy="560" r="7" fill="#E8E8E8" stroke="#000000" stroke-width="0.75"/>
  <rect x="530" y="533" width="100" height="6" fill="#D8D8D8" stroke="#333333" stroke-width="1"/>
  <line x1="545" y1="536" x2="615" y2="536" stroke="#333333" stroke-width="1.5" stroke-dasharray="3 1.5"/>
  <text x="635" y="540" font-family="Arial, Helvetica, sans-serif" font-size="7px" fill="#000000">PMMA</text>
  <text x="635" y="565" font-family="Arial, Helvetica, sans-serif" font-size="7px" fill="#000000">BACKER</text>
  <text x="635" y="573" font-family="Arial, Helvetica, sans-serif" font-size="7px" fill="#000000">ROD</text>

  <!-- ============ CALLOUT LEGEND ============ -->
  <text x="720" y="130" font-family="Arial, Helvetica, sans-serif" font-size="10px" font-weight="bold" fill="#000000">CALLOUT KEY</text>
  <line x1="720" y1="135" x2="870" y2="135" stroke="#000000" stroke-width="0.5"/>

  <circle cx="730" cy="158" r="4" fill="#000000"/>
  <text x="740" y="162" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">1</tspan> — Substrate</text>

  <circle cx="730" cy="182" r="4" fill="#000000"/>
  <text x="740" y="186" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">2</tspan> — Joint / Crack</text>

  <circle cx="730" cy="206" r="4" fill="#000000"/>
  <text x="740" y="210" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">3</tspan> — Backer Rod</text>

  <circle cx="730" cy="230" r="4" fill="#000000"/>
  <text x="740" y="234" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">4</tspan> — PMMA Primer</text>

  <circle cx="730" cy="254" r="4" fill="#000000"/>
  <text x="740" y="258" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">5</tspan> — Fleece Strip</text>

  <circle cx="730" cy="278" r="4" fill="#000000"/>
  <text x="740" y="282" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">6</tspan> — PMMA Membrane</text>

  <!-- ============ TITLE BLOCK ============ -->
  <line x1="40" y1="760" x2="1016" y2="760" stroke="#000000" stroke-width="0.75"/>
  <text x="50" y="778" font-family="Arial, Helvetica, sans-serif" font-size="11px" font-weight="bold" fill="#000000">DETAIL ATLAS</text>
  <text x="50" y="792" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">CONSTRUCTION INTELLIGENCE</text>
  <text x="440" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="middle">Barrett Company — RamFlash PMMA</text>
  <text x="1010" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="end">DRAFT | 2026-04-16</text>
  <text x="528" y="805" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#666666" text-anchor="middle">CSI 07 62 00 | FAM-BARRETT-PMMA | Emergency Detail Delivery</text>
</svg>