  <!-- 1. Substrate -->
  <circle cx="180" cy="400" r="3" fill="#000000"/>
  <line x1="180" y1="400" x2="120" y2="540" stroke="#000000" stroke-width="0.5"/>
  <text x="105" y="555" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">1</text>

