<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <pattern id="concrete-stipple" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="2" cy="3" r="0.5" fill="#CCCCCC"/>
      <circle cx="7" cy="8" r="0.5" fill="#CCCCCC"/>
      <circle cx="5" cy="1" r="0.5" fill="#CCCCCC"/>
    </pattern>
    <pattern id="fleece-diagonal" patternUnits="userSpaceOnUse" width="6" height="6">
      <path d="M0,6 L6,0" stroke="#333333" stroke-width="0.75" fill="none"/>
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="1056" height="816" fill="#FFFFFF"/>

  <!-- DRAFT watermark -->
  <text x="528" y="400" font-family="Arial, Helvetica, sans-serif" font-size="48px" fill="#CCCCCC" opacity="0.3" text-anchor="middle" transform="rotate(-25, 528, 400)">DRAFT FOR REVIEW</text>

  <!-- Title -->
  <text x="60" y="50" font-family="Arial, Helvetica, sans-serif" font-size="16px" font-weight="bold" fill="#000000">Barrett PMMA — Crack / Control Joint</text>
  <text x="60" y="68" font-family="Arial, Helvetica, sans-serif" font-size="11px" fill="#333333">Section Detail — PMMA membrane bridging substrate joint with fleece reinforcement</text>

  <!-- ============ MAIN DETAIL ============ -->
  <!-- Left substrate block -->
  <rect x="100" y="340" width="240" height="140" fill="#F0F0F0" stroke="#000000" stroke-width="1.5"/>
  <rect x="100" y="340" width="240" height="140" fill="url(#concrete-stipple)" opacity="0.4"/>

  <!-- Right substrate block -->
  <rect x="350" y="340" width="240" height="140" fill="#F0F0F0" stroke="#000000" stroke-width="1.5"/>
  <rect x="350" y="340" width="240" height="140" fill="url(#concrete-stipple)" opacity="0.4"/>

  <!-- Joint/crack gap between blocks -->
  <rect x="340" y="340" width="10" height="140" fill="#FAFAFA" stroke="#000000" stroke-width="0.75"/>
  <!-- Joint line -->
  <line x1="345" y1="340" x2="345" y2="480" stroke="#000000" stroke-width="0.5" stroke-dasharray="2 2"/>

  <!-- Backer rod in joint -->
  <circle cx="345" cy="360" r="6" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <line x1="340" y1="356" x2="350" y2="364" stroke="#555555" stroke-width="0.5"/>
  <line x1="340" y1="364" x2="350" y2="356" stroke="#555555" stroke-width="0.5"/>

