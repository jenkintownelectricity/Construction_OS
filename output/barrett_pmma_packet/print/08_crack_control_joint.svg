  <line x1="360" y1="360" x2="420" y2="540" stroke="#000000" stroke-width="0.5"/>
  <text x="425" y="555" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">3</text>

  <!-- 4. PMMA Primer -->
