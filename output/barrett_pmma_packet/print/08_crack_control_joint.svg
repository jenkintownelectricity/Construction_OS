  <line x1="220" y1="336" x2="130" y2="230" stroke="#000000" stroke-width="0.5"/>
  <text x="115" y="226" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">4</text>

  <!-- 5. Fleece Strip -->
