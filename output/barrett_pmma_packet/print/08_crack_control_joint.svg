  <line x1="200" y1="338" x2="340" y2="338" stroke="#333333" stroke-width="0.75" stroke-dasharray="2 1"/>
  <line x1="350" y1="338" x2="490" y2="338" stroke="#333333" stroke-width="0.75" stroke-dasharray="2 1"/>

  <!-- PMMA membrane — bridging the joint -->
  <rect x="200" y="326" width="290" height="8" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

