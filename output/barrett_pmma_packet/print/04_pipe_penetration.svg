<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <pattern id="insulation-hatch" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,8 L8,0" stroke="#999999" stroke-width="0.5" fill="none"/>
    </pattern>
    <pattern id="concrete-stipple" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="2" cy="3" r="0.5" fill="#CCCCCC"/>
      <circle cx="7" cy="8" r="0.5" fill="#CCCCCC"/>
      <circle cx="5" cy="1" r="0.5" fill="#CCCCCC"/>
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="1056" height="816" fill="#FFFFFF"/>

  <!-- DRAFT watermark -->
  <text x="528" y="400" font-family="Arial, Helvetica, sans-serif" font-size="48px" fill="#CCCCCC" opacity="0.3" text-anchor="middle" transform="rotate(-25, 528, 400)">DRAFT FOR REVIEW</text>

  <!-- Title -->
  <text x="60" y="50" font-family="Arial, Helvetica, sans-serif" font-size="16px" font-weight="bold" fill="#000000">Barrett PMMA — Pipe Penetration</text>
  <text x="60" y="68" font-family="Arial, Helvetica, sans-serif" font-size="11px" fill="#333333">Section Detail — Pipe through roof with PMMA boot and storm collar</text>

  <!-- ============ MAIN DETAIL ============ -->
  <!-- Concrete deck -->
  <rect x="100" y="440" width="480" height="70" fill="#F0F0F0" stroke="#000000" stroke-width="1.5"/>
  <rect x="100" y="440" width="480" height="70" fill="url(#concrete-stipple)" opacity="0.4"/>

  <!-- Insulation layer -->
  <rect x="100" y="390" width="480" height="50" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <rect x="100" y="390" width="480" height="50" fill="url(#insulation-hatch)"/>

  <!-- Pipe sleeve — vertical through all layers -->
  <rect x="320" y="140" width="40" height="370" fill="#FAFAFA" stroke="#000000" stroke-width="1.5"/>
  <!-- Pipe inner wall lines -->
  <line x1="325" y1="140" x2="325" y2="510" stroke="#555555" stroke-width="0.5"/>
  <line x1="355" y1="140" x2="355" y2="510" stroke="#555555" stroke-width="0.5"/>

  <!-- PMMA membrane — field on roof -->
  <rect x="100" y="382" width="220" height="8" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>
  <rect x="360" y="382" width="220" height="8" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

  <!-- PMMA boot — wrapping up pipe from roof surface -->
  <!-- Left side boot -->
  <path d="M300,382 L300,390 L315,390 L315,280 L320,280 L320,382" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>
  <!-- Right side boot -->
  <path d="M360,382 L360,280 L365,280 L365,390 L380,390 L380,382" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

  <!-- Fleece boot (dashed inside PMMA boot) -->
  <line x1="105" y1="386" x2="302" y2="386" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="378" y1="386" x2="575" y2="386" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="317" y1="386" x2="317" y2="284" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="363" y1="386" x2="363" y2="284" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- Storm collar at top of boot -->
  <path d="M308,278 L308,270 L312,265 L368,265 L372,270 L372,278 Z" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>
  <!-- Sealant bead above storm collar -->
  <ellipse cx="340" cy="263" rx="18" ry="4" fill="#D8D8D8" stroke="#000000" stroke-width="0.75"/>

  <!-- Pipe cap/opening at top -->
  <line x1="315" y1="140" x2="365" y2="140" stroke="#000000" stroke-width="1.5"/>

  <!-- ============ DIMENSION: 4 IN. MIN above roof ============ -->
  <line x1="400" y1="280" x2="400" y2="382" stroke="#666666" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="395" y1="280" x2="405" y2="280" stroke="#666666" stroke-width="0.75"/>
  <line x1="395" y1="382" x2="405" y2="382" stroke="#666666" stroke-width="0.75"/>
  <!-- Extension lines -->
  <line x1="373" y1="280" x2="398" y2="280" stroke="#666666" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="381" y1="382" x2="398" y2="382" stroke="#666666" stroke-width="0.3" stroke-dasharray="2 2"/>
  <text x="410" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">4 IN. MIN</text>

  <!-- ============ CALLOUT LEADERS ============ -->
  <!-- 1. Substrate -->
  <circle cx="200" cy="475" r="3" fill="#000000"/>
  <line x1="200" y1="475" x2="160" y2="580" stroke="#000000" stroke-width="0.5"/>
  <text x="145" y="595" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">1</text>

  <!-- 2. Insulation -->
  <circle cx="200" cy="415" r="3" fill="#000000"/>
  <line x1="200" y1="415" x2="160" y2="560" stroke="#000000" stroke-width="0.5"/>
  <text x="145" y="575" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">2</text>

  <!-- 3. Pipe Sleeve -->
  <circle cx="340" cy="200" r="3" fill="#000000"/>
  <line x1="340" y1="200" x2="470" y2="200" stroke="#000000" stroke-width="0.5"/>
  <text x="475" y="203" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">3</text>

  <!-- 4. PMMA Primer -->
  <circle cx="450" cy="386" r="3" fill="#000000"/>
  <line x1="450" y1="386" x2="480" y2="320" stroke="#000000" stroke-width="0.5"/>
  <text x="485" y="323" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">4</text>

  <!-- 5. Fleece Boot -->
  <circle cx="317" cy="340" r="3" fill="#000000"/>
  <line x1="317" y1="340" x2="220" y2="290" stroke="#000000" stroke-width="0.5"/>
  <text x="195" y="286" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">5</text>

  <!-- 6. PMMA Membrane -->
  <circle cx="250" cy="384" r="3" fill="#000000"/>
  <line x1="250" y1="384" x2="220" y2="310" stroke="#000000" stroke-width="0.5"/>
  <text x="195" y="306" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">6</text>

  <!-- 7. Storm Collar -->
  <circle cx="372" cy="273" r="3" fill="#000000"/>
  <line x1="375" y1="273" x2="470" y2="240" stroke="#000000" stroke-width="0.5"/>
  <text x="475" y="243" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">7</text>

  <!-- 8. Sealant -->
  <circle cx="340" cy="258" r="3" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <line x1="340" y1="255" x2="470" y2="170" stroke="#000000" stroke-width="0.5"/>
  <text x="475" y="173" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">8</text>

  <!-- ============ CALLOUT LEGEND ============ -->
  <text x="720" y="130" font-family="Arial, Helvetica, sans-serif" font-size="10px" font-weight="bold" fill="#000000">CALLOUT KEY</text>
  <line x1="720" y1="135" x2="870" y2="135" stroke="#000000" stroke-width="0.5"/>

  <circle cx="730" cy="158" r="4" fill="#000000"/>
  <text x="740" y="162" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">1</tspan> — Substrate (Concrete Deck)</text>

  <circle cx="730" cy="182" r="4" fill="#000000"/>
  <text x="740" y="186" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">2</tspan> — Insulation</text>

  <circle cx="730" cy="206" r="4" fill="#000000"/>
  <text x="740" y="210" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">3</tspan> — Pipe Sleeve</text>

  <circle cx="730" cy="230" r="4" fill="#000000"/>
  <text x="740" y="234" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">4</tspan> — PMMA Primer</text>

  <circle cx="730" cy="254" r="4" fill="#000000"/>
  <text x="740" y="258" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">5</tspan> — Fleece Boot</text>

  <circle cx="730" cy="278" r="4" fill="#000000"/>
  <text x="740" y="282" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">6</tspan> — PMMA Membrane</text>

  <circle cx="730" cy="302" r="4" fill="#000000"/>
  <text x="740" y="306" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">7</tspan> — Storm Collar</text>

  <circle cx="730" cy="326" r="4" fill="#000000"/>
  <text x="740" y="330" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">8</tspan> — Sealant</text>

  <!-- ============ TITLE BLOCK ============ -->
  <line x1="40" y1="760" x2="1016" y2="760" stroke="#000000" stroke-width="0.75"/>
  <text x="50" y="778" font-family="Arial, Helvetica, sans-serif" font-size="11px" font-weight="bold" fill="#000000">DETAIL ATLAS</text>
  <text x="50" y="792" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">CONSTRUCTION INTELLIGENCE</text>
  <text x="440" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="middle">Barrett Company — RamFlash PMMA</text>
  <text x="1010" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="end">DRAFT | 2026-04-16</text>
  <text x="528" y="805" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#666666" text-anchor="middle">CSI 07 62 00 | FAM-BARRETT-PMMA | Emergency Detail Delivery</text>
</svg>