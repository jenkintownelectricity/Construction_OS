<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <pattern id="concrete-stipple" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="2" cy="3" r="0.5" fill="#CCCCCC"/>
      <circle cx="7" cy="8" r="0.5" fill="#CCCCCC"/>
      <circle cx="5" cy="1" r="0.5" fill="#CCCCCC"/>
    </pattern>
    <pattern id="fleece-diagonal" patternUnits="userSpaceOnUse" width="6" height="6">
      <path d="M0,6 L6,0" stroke="#333333" stroke-width="0.75" fill="none"/>
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="1056" height="816" fill="#FFFFFF"/>

  <!-- DRAFT watermark -->
  <text x="528" y="400" font-family="Arial, Helvetica, sans-serif" font-size="48px" fill="#CCCCCC" opacity="0.3" text-anchor="middle" transform="rotate(-25, 528, 400)">DRAFT FOR REVIEW</text>

  <!-- Title -->
  <text x="60" y="50" font-family="Arial, Helvetica, sans-serif" font-size="16px" font-weight="bold" fill="#000000">Barrett PMMA — Outside Corner Reinforcement</text>
  <text x="60" y="68" font-family="Arial, Helvetica, sans-serif" font-size="11px" fill="#333333">Detail — Three-step outside corner reinforcement with relief cuts</text>

  <!-- ============ MAIN DETAIL (left side — section view) ============ -->
  <!-- Vertical surface going up -->
  <rect x="200" y="160" width="60" height="280" fill="#F0F0F0" stroke="#000000" stroke-width="1.5"/>
  <rect x="200" y="160" width="60" height="280" fill="url(#concrete-stipple)" opacity="0.4"/>

  <!-- Horizontal surface extending right from corner -->
  <rect x="260" y="380" width="200" height="60" fill="#F0F0F0" stroke="#000000" stroke-width="1.5"/>
  <rect x="260" y="380" width="200" height="60" fill="url(#concrete-stipple)" opacity="0.4"/>

  <!-- Outside corner point at x=260, y=380 -->

  <!-- PMMA on vertical face -->
  <rect x="256" y="240" width="8" height="140" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

  <!-- PMMA on horizontal face -->
  <rect x="260" y="372" width="160" height="8" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

  <!-- PMMA at corner wrap -->
  <path d="M264,380 L264,372 L260,372 L260,380 Z" fill="#D8D8D8" stroke="#333333" stroke-width="1.5"/>

  <!-- Fleece on vertical (dashed) -->
  <line x1="260" y1="250" x2="260" y2="376" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>
  <!-- Fleece on horizontal (dashed) -->
  <line x1="264" y1="376" x2="410" y2="376" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- Relief cut marks (dashed lines showing where fleece is cut for wrapping) -->
  <line x1="258" y1="375" x2="272" y2="365" stroke="#000000" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="262" y1="378" x2="275" y2="370" stroke="#000000" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- Relief cut label -->
  <text x="280" y="360" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#000000">RELIEF CUT</text>
  <text x="280" y="370" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#000000">(TYP.)</text>

  <!-- ============ DIMENSIONS ============ -->
  <!-- Vertical: 4 IN. MIN from corner up wall -->
  <line x1="185" y1="280" x2="185" y2="380" stroke="#666666" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="180" y1="280" x2="190" y2="280" stroke="#666666" stroke-width="0.75"/>
  <line x1="180" y1="380" x2="190" y2="380" stroke="#666666" stroke-width="0.75"/>
  <text x="145" y="334" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">4 IN.</text>
  <text x="145" y="346" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">MIN</text>

  <!-- Horizontal: 4 IN. MIN from corner along surface -->
  <line x1="260" y1="455" x2="380" y2="455" stroke="#666666" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="260" y1="450" x2="260" y2="460" stroke="#666666" stroke-width="0.75"/>
  <line x1="380" y1="450" x2="380" y2="460" stroke="#666666" stroke-width="0.75"/>
  <text x="293" y="470" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">4 IN. MIN</text>

  <!-- ============ THREE-STEP SEQUENCE DIAGRAM ============ -->
  <!-- Step 1 -->
  <rect x="500" y="120" width="200" height="150" rx="4" fill="#FAFAFA" stroke="#000000" stroke-width="1"/>
  <rect x="500" y="120" width="200" height="24" rx="4" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <text x="600" y="137" font-family="Arial, Helvetica, sans-serif" font-size="11px" font-weight="bold" fill="#000000" text-anchor="middle">STEP 1: Apply Primer</text>

  <!-- Step 1 mini-diagram: outside corner with primer -->
  <line x1="560" y1="165" x2="560" y2="240" stroke="#000000" stroke-width="1.5"/>
  <line x1="560" y1="240" x2="660" y2="240" stroke="#000000" stroke-width="1.5"/>
  <line x1="564" y1="185" x2="564" y2="240" stroke="#333333" stroke-width="3" opacity="0.4"/>
  <line x1="560" y1="236" x2="640" y2="236" stroke="#333333" stroke-width="3" opacity="0.4"/>
  <text x="575" y="215" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#000000">PRIMER</text>

  <!-- Arrow -->
  <line x1="600" y1="270" x2="600" y2="286" stroke="#000000" stroke-width="1"/>
  <polygon points="595,286 600,294 605,286" fill="#000000"/>

  <!-- Step 2 -->
  <rect x="500" y="295" width="200" height="150" rx="4" fill="#FAFAFA" stroke="#000000" stroke-width="1"/>
  <rect x="500" y="295" width="200" height="24" rx="4" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <text x="600" y="312" font-family="Arial, Helvetica, sans-serif" font-size="11px" font-weight="bold" fill="#000000" text-anchor="middle">STEP 2: Embed Fleece</text>

  <!-- Step 2 mini-diagram: fleece with relief cuts -->
  <line x1="560" y1="340" x2="560" y2="415" stroke="#000000" stroke-width="1.5"/>
  <line x1="560" y1="415" x2="660" y2="415" stroke="#000000" stroke-width="1.5"/>
  <line x1="564" y1="360" x2="564" y2="415" stroke="#333333" stroke-width="2.5" stroke-dasharray="4 2"/>
  <line x1="560" y1="411" x2="640" y2="411" stroke="#333333" stroke-width="2.5" stroke-dasharray="4 2"/>
  <!-- Relief cut marks -->
  <line x1="562" y1="413" x2="570" y2="405" stroke="#000000" stroke-width="0.75" stroke-dasharray="2 1"/>
  <text x="575" y="395" font-family="Arial, Helvetica, sans-serif" font-size="7px" fill="#000000">RELIEF</text>
  <text x="575" y="403" font-family="Arial, Helvetica, sans-serif" font-size="7px" fill="#000000">CUT</text>

  <!-- Arrow -->
  <line x1="600" y1="445" x2="600" y2="461" stroke="#000000" stroke-width="1"/>
  <polygon points="595,461 600,469 605,461" fill="#000000"/>

  <!-- Step 3 -->
  <rect x="500" y="470" width="200" height="150" rx="4" fill="#FAFAFA" stroke="#000000" stroke-width="1"/>
  <rect x="500" y="470" width="200" height="24" rx="4" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <text x="600" y="487" font-family="Arial, Helvetica, sans-serif" font-size="11px" font-weight="bold" fill="#000000" text-anchor="middle">STEP 3: Seal Coat</text>

  <!-- Step 3 mini-diagram: complete system -->
  <line x1="560" y1="515" x2="560" y2="590" stroke="#000000" stroke-width="1.5"/>
  <line x1="560" y1="590" x2="660" y2="590" stroke="#000000" stroke-width="1.5"/>
  <rect x="563" y="535" width="5" height="55" fill="#D8D8D8" stroke="#333333" stroke-width="1"/>
  <rect x="560" y="585" width="80" height="5" fill="#D8D8D8" stroke="#333333" stroke-width="1"/>
  <text x="575" y="570" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#000000">SEAL COAT</text>

  <!-- ============ CALLOUT LEGEND ============ -->
  <text x="720" y="130" font-family="Arial, Helvetica, sans-serif" font-size="10px" font-weight="bold" fill="#000000">CALLOUT KEY</text>
  <line x1="720" y1="135" x2="870" y2="135" stroke="#000000" stroke-width="0.5"/>

  <circle cx="730" cy="158" r="4" fill="#000000"/>
  <text x="740" y="162" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">1</tspan> — Substrate (Vertical Face)</text>

  <circle cx="730" cy="182" r="4" fill="#000000"/>
  <text x="740" y="186" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">2</tspan> — Substrate (Horizontal Face)</text>

  <circle cx="730" cy="206" r="4" fill="#000000"/>
  <text x="740" y="210" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">3</tspan> — PMMA Primer</text>

  <circle cx="730" cy="230" r="4" fill="#000000"/>
  <text x="740" y="234" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">4</tspan> — Fleece w/ Relief Cuts</text>

  <circle cx="730" cy="254" r="4" fill="#000000"/>
  <text x="740" y="258" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">5</tspan> — PMMA Base Coat</text>

  <circle cx="730" cy="278" r="4" fill="#000000"/>
  <text x="740" y="282" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">6</tspan> — PMMA Seal Coat</text>

  <!-- Callout leaders on main detail -->
  <circle cx="230" cy="300" r="3" fill="#000000"/>
  <line x1="230" y1="300" x2="140" y2="280" stroke="#000000" stroke-width="0.5"/>
  <text x="125" y="276" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">1</text>

  <circle cx="350" cy="410" r="3" fill="#000000"/>
  <line x1="350" y1="410" x2="380" y2="530" stroke="#000000" stroke-width="0.5"/>
  <text x="385" y="533" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">2</text>

  <circle cx="262" cy="310" r="3" fill="#000000"/>
  <line x1="262" y1="310" x2="140" y2="310" stroke="#000000" stroke-width="0.5"/>
  <text x="125" y="313" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">3</text>

  <circle cx="260" cy="350" r="3" fill="#000000"/>
  <line x1="260" y1="350" x2="140" y2="350" stroke="#000000" stroke-width="0.5"/>
  <text x="125" y="353" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">4</text>

  <circle cx="262" cy="330" r="3" fill="#000000"/>
  <line x1="262" y1="330" x2="140" y2="330" stroke="#000000" stroke-width="0.5"/>
  <text x="125" y="333" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">5</text>

  <circle cx="264" cy="374" r="3" fill="#000000"/>
  <line x1="264" y1="374" x2="140" y2="400" stroke="#000000" stroke-width="0.5"/>
  <text x="125" y="403" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">6</text>

  <!-- ============ TITLE BLOCK ============ -->
  <line x1="40" y1="760" x2="1016" y2="760" stroke="#000000" stroke-width="0.75"/>
  <text x="50" y="778" font-family="Arial, Helvetica, sans-serif" font-size="11px" font-weight="bold" fill="#000000">DETAIL ATLAS</text>
  <text x="50" y="792" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">CONSTRUCTION INTELLIGENCE</text>
  <text x="440" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="middle">Barrett Company — RamFlash PMMA</text>
  <text x="1010" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="end">DRAFT | 2026-04-16</text>
  <text x="528" y="805" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#666666" text-anchor="middle">CSI 07 62 00 | FAM-BARRETT-PMMA | Emergency Detail Delivery</text>
</svg>