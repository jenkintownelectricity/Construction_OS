<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <pattern id="insulation-hatch" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,8 L8,0" stroke="#999999" stroke-width="0.5" fill="none"/>
    </pattern>
    <pattern id="concrete-stipple" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="2" cy="3" r="0.5" fill="#CCCCCC"/>
      <circle cx="7" cy="8" r="0.5" fill="#CCCCCC"/>
      <circle cx="5" cy="1" r="0.5" fill="#CCCCCC"/>
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="1056" height="816" fill="#FFFFFF"/>

  <!-- DRAFT watermark -->
  <text x="528" y="400" font-family="Arial, Helvetica, sans-serif" font-size="48px" fill="#CCCCCC" opacity="0.3" text-anchor="middle" transform="rotate(-25, 528, 400)">DRAFT FOR REVIEW</text>

  <!-- Title -->
  <text x="60" y="50" font-family="Arial, Helvetica, sans-serif" font-size="16px" font-weight="bold" fill="#000000">Barrett PMMA — Edge / Drip Edge</text>
  <text x="60" y="68" font-family="Arial, Helvetica, sans-serif" font-size="11px" fill="#333333">Section Detail — Roof edge with drip edge metal termination</text>

  <!-- ============ MAIN DETAIL ============ -->
  <!-- Concrete deck -->
  <rect x="100" y="360" width="420" height="70" fill="#F0F0F0" stroke="#000000" stroke-width="1.5"/>
  <rect x="100" y="360" width="420" height="70" fill="url(#concrete-stipple)" opacity="0.5"/>

  <!-- Insulation layer -->
  <rect x="100" y="310" width="400" height="50" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <rect x="100" y="310" width="400" height="50" fill="url(#insulation-hatch)"/>

  <!-- Edge of deck — vertical face -->
  <line x1="520" y1="360" x2="520" y2="430" stroke="#000000" stroke-width="1.5"/>

  <!-- Edge nailer/blocking at edge -->
  <rect x="480" y="340" width="40" height="20" fill="#F0F0F0" stroke="#000000" stroke-width="1"/>

  <!-- PMMA membrane — field on roof surface -->
  <rect x="100" y="302" width="400" height="8" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

  <!-- PMMA wrapping over edge -->
  <path d="M500,302 L520,302 L520,310 L528,310 L528,302 L528,430 L520,430 L520,310" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

  <!-- PMMA on vertical face of edge -->
  <rect x="520" y="310" width="8" height="120" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

  <!-- Fleece reinforcement (dashed inside membrane) -->
  <line x1="105" y1="306" x2="500" y2="306" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="524" y1="314" x2="524" y2="425" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- Drip edge metal -->
  <path d="M528,360 L560,360 L560,365 L545,380 L540,380 L540,440 L535,445 L530,445 L528,440 L528,360" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>
  <!-- Drip edge kick-out -->
  <path d="M530,445 L525,455 L520,455" stroke="#000000" stroke-width="1.5" fill="none"/>

  <!-- ============ DIMENSION: 2 IN. MIN OVERHANG ============ -->
  <line x1="528" y1="470" x2="555" y2="470" stroke="#666666" stroke-width="0.5" stroke-dasharray="3 2"/>
  <!-- Tick marks -->
  <line x1="528" y1="465" x2="528" y2="475" stroke="#666666" stroke-width="0.75"/>
  <line x1="555" y1="465" x2="555" y2="475" stroke="#666666" stroke-width="0.75"/>
  <!-- Extension lines -->
  <line x1="528" y1="448" x2="528" y2="468" stroke="#666666" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="555" y1="365" x2="555" y2="468" stroke="#666666" stroke-width="0.3" stroke-dasharray="2 2"/>
  <text x="530" y="488" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">2 IN. MIN OVERHANG</text>

  <!-- ============ CALLOUT LEADERS ============ -->
  <!-- 1. Substrate -->
  <circle cx="300" cy="395" r="3" fill="#000000"/>
  <line x1="300" y1="395" x2="300" y2="530" stroke="#000000" stroke-width="0.5"/>
  <line x1="300" y1="530" x2="200" y2="530" stroke="#000000" stroke-width="0.5"/>
  <text x="205" y="533" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">1</text>

  <!-- 2. Insulation -->
  <circle cx="250" cy="335" r="3" fill="#000000"/>
  <line x1="250" y1="335" x2="250" y2="555" stroke="#000000" stroke-width="0.5"/>
  <line x1="200" y1="555" x2="250" y2="555" stroke="#000000" stroke-width="0.5"/>
  <text x="205" y="558" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">2</text>

  <!-- 3. PMMA Primer -->
  <circle cx="350" cy="308" r="3" fill="#000000"/>
  <line x1="350" y1="308" x2="350" y2="260" stroke="#000000" stroke-width="0.5"/>
  <line x1="350" y1="260" x2="200" y2="260" stroke="#000000" stroke-width="0.5"/>
  <text x="205" y="263" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">3</text>

  <!-- 4. PMMA Membrane -->
  <circle cx="450" cy="304" r="3" fill="#000000"/>
  <line x1="450" y1="304" x2="450" y2="240" stroke="#000000" stroke-width="0.5"/>
  <line x1="200" y1="240" x2="450" y2="240" stroke="#000000" stroke-width="0.5"/>
  <text x="205" y="243" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">4</text>

  <!-- 5. Fleece -->
  <circle cx="400" cy="306" r="3" fill="#000000"/>
  <line x1="400" y1="306" x2="400" y2="220" stroke="#000000" stroke-width="0.5"/>
  <line x1="200" y1="220" x2="400" y2="220" stroke="#000000" stroke-width="0.5"/>
  <text x="205" y="223" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">5</text>

  <!-- 6. Seal Coat -->
  <circle cx="524" cy="380" r="3" fill="#000000"/>
  <line x1="524" y1="380" x2="600" y2="380" stroke="#000000" stroke-width="0.5"/>
  <line x1="600" y1="380" x2="600" y2="260" stroke="#000000" stroke-width="0.5"/>
  <text x="605" y="263" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">6</text>

  <!-- 7. Drip Edge Metal -->
  <circle cx="540" cy="410" r="3" fill="#000000"/>
  <line x1="540" y1="410" x2="600" y2="410" stroke="#000000" stroke-width="0.5"/>
  <line x1="600" y1="410" x2="600" y2="290" stroke="#000000" stroke-width="0.5"/>
  <text x="605" y="293" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">7</text>

  <!-- ============ CALLOUT LEGEND ============ -->
  <text x="720" y="130" font-family="Arial, Helvetica, sans-serif" font-size="10px" font-weight="bold" fill="#000000">CALLOUT KEY</text>
  <line x1="720" y1="135" x2="850" y2="135" stroke="#000000" stroke-width="0.5"/>

  <circle cx="730" cy="158" r="4" fill="#000000"/>
  <text x="740" y="162" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">1</tspan> — Substrate (Concrete Deck)</text>

  <circle cx="730" cy="182" r="4" fill="#000000"/>
  <text x="740" y="186" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">2</tspan> — Insulation</text>

  <circle cx="730" cy="206" r="4" fill="#000000"/>
  <text x="740" y="210" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">3</tspan> — PMMA Primer</text>

  <circle cx="730" cy="230" r="4" fill="#000000"/>
  <text x="740" y="234" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">4</tspan> — PMMA Membrane</text>

  <circle cx="730" cy="254" r="4" fill="#000000"/>
  <text x="740" y="258" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">5</tspan> — Fleece Reinforcement</text>

  <circle cx="730" cy="278" r="4" fill="#000000"/>
  <text x="740" y="282" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">6</tspan> — Seal Coat</text>

  <circle cx="730" cy="302" r="4" fill="#000000"/>
  <text x="740" y="306" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">7</tspan> — Drip Edge Metal</text>

  <!-- ============ TITLE BLOCK ============ -->
  <line x1="40" y1="760" x2="1016" y2="760" stroke="#000000" stroke-width="0.75"/>
  <text x="50" y="778" font-family="Arial, Helvetica, sans-serif" font-size="11px" font-weight="bold" fill="#000000">DETAIL ATLAS</text>
  <text x="50" y="792" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">CONSTRUCTION INTELLIGENCE</text>
  <text x="440" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="middle">Barrett Company — RamFlash PMMA</text>
  <text x="1010" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="end">DRAFT | 2026-04-16</text>
  <text x="528" y="805" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#666666" text-anchor="middle">CSI 07 62 00 | FAM-BARRETT-PMMA | Emergency Detail Delivery</text>
</svg>