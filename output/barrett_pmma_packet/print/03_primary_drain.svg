  <line x1="300" y1="482" x2="300" y2="558" stroke="#666666" stroke-width="0.3" stroke-dasharray="2 2"/>
  <text x="210" y="578" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">4 IN. MIN FLEECE COLLAR</text>

