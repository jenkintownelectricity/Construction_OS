  <line x1="240" y1="396" x2="240" y2="404" stroke="#666666" stroke-width="0.75"/>
  <line x1="255" y1="396" x2="255" y2="404" stroke="#666666" stroke-width="0.75"/>

  <!-- Main dimension line below -->
  <line x1="200" y1="560" x2="300" y2="560" stroke="#666666" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="200" y1="555" x2="200" y2="565" stroke="#666666" stroke-width="0.75"/>
  <line x1="300" y1="555" x2="300" y2="565" stroke="#666666" stroke-width="0.75"/>
  <!-- Extension lines -->
