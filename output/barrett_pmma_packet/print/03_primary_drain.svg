<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <pattern id="insulation-hatch" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,8 L8,0" stroke="#999999" stroke-width="0.5" fill="none"/>
    </pattern>
    <pattern id="concrete-stipple" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="2" cy="3" r="0.5" fill="#CCCCCC"/>
      <circle cx="7" cy="8" r="0.5" fill="#CCCCCC"/>
      <circle cx="5" cy="1" r="0.5" fill="#CCCCCC"/>
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="1056" height="816" fill="#FFFFFF"/>

  <!-- DRAFT watermark -->
  <text x="528" y="400" font-family="Arial, Helvetica, sans-serif" font-size="48px" fill="#CCCCCC" opacity="0.3" text-anchor="middle" transform="rotate(-25, 528, 400)">DRAFT FOR REVIEW</text>

  <!-- Title -->
  <text x="60" y="50" font-family="Arial, Helvetica, sans-serif" font-size="16px" font-weight="bold" fill="#000000">Barrett PMMA — Primary Roof Drain</text>
  <text x="60" y="68" font-family="Arial, Helvetica, sans-serif" font-size="11px" fill="#333333">Section Detail — Drain sump with PMMA collar and clamping ring</text>

  <!-- ============ MAIN DETAIL ============ -->
  <!-- Concrete deck (with sump depression) -->
  <path d="M80,420 L250,420 L250,430 Q260,470 300,480 L300,520 L380,520 L380,480 Q420,470 430,430 L430,420 L600,420 L600,500 L80,500 Z" fill="#F0F0F0" stroke="#000000" stroke-width="1.5"/>
  <path d="M80,420 L250,420 L250,430 Q260,470 300,480 L300,520 L380,520 L380,480 Q420,470 430,430 L430,420 L600,420 L600,500 L80,500 Z" fill="url(#concrete-stipple)" opacity="0.4"/>

  <!-- Tapered insulation — slopes toward drain -->
  <polygon points="80,370 250,395 250,420 80,420" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <polygon points="80,370 250,395 250,420 80,420" fill="url(#insulation-hatch)"/>
  <polygon points="430,420 430,395 600,370 600,420" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <polygon points="430,420 430,395 600,370 600,420" fill="url(#insulation-hatch)"/>

  <!-- Drain body (recessed into sump) -->
  <rect x="310" y="480" width="60" height="55" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>
  <!-- Drain pipe below -->
  <rect x="325" y="535" width="30" height="60" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>

  <!-- PMMA membrane — field across top of insulation -->
  <path d="M80,362 L250,387 L250,395 L80,370 Z" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>
  <path d="M430,395 L430,387 L600,362 L600,370 Z" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

  <!-- PMMA collar around drain (wraps into sump) -->
  <path d="M250,387 L250,428 Q260,465 300,475 L300,480 L310,480 L310,475 Q265,460 255,425 L255,387 Z" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>
  <path d="M430,387 L430,428 Q420,465 380,475 L380,480 L370,480 L370,475 Q415,460 425,425 L425,387 Z" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

