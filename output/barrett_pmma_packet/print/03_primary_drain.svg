  <path d="M240,390 L240,430 Q252,470 298,482" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2" fill="none"/>
  <path d="M440,390 L440,430 Q428,470 382,482" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2" fill="none"/>
