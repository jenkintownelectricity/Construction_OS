<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <pattern id="insulation-hatch" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,8 L8,0" stroke="#999999" stroke-width="0.5" fill="none"/>
    </pattern>
    <pattern id="concrete-stipple" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="2" cy="3" r="0.5" fill="#CCCCCC"/>
      <circle cx="7" cy="8" r="0.5" fill="#CCCCCC"/>
      <circle cx="5" cy="1" r="0.5" fill="#CCCCCC"/>
    </pattern>
    <pattern id="wood-hatch" patternUnits="userSpaceOnUse" width="12" height="12">
      <path d="M0,6 Q3,4 6,6 Q9,8 12,6" stroke="#AAAAAA" stroke-width="0.5" fill="none"/>
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="1056" height="816" fill="#FFFFFF"/>

  <!-- DRAFT watermark -->
  <text x="528" y="400" font-family="Arial, Helvetica, sans-serif" font-size="48px" fill="#CCCCCC" opacity="0.3" text-anchor="middle" transform="rotate(-25, 528, 400)">DRAFT FOR REVIEW</text>

  <!-- Title -->
  <text x="60" y="50" font-family="Arial, Helvetica, sans-serif" font-size="16px" font-weight="bold" fill="#000000">Barrett PMMA — Equipment Curb</text>
  <text x="60" y="68" font-family="Arial, Helvetica, sans-serif" font-size="11px" fill="#333333">Section Detail — Wood curb with PMMA flashing and counter-flashing</text>

  <!-- ============ MAIN DETAIL ============ -->
  <!-- Concrete deck -->
  <rect x="80" y="500" width="520" height="65" fill="#F0F0F0" stroke="#000000" stroke-width="1.5"/>
  <rect x="80" y="500" width="520" height="65" fill="url(#concrete-stipple)" opacity="0.4"/>

  <!-- Insulation layer -->
  <rect x="80" y="460" width="520" height="40" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <rect x="80" y="460" width="520" height="40" fill="url(#insulation-hatch)"/>

  <!-- Wood curb frame (right side) -->
  <rect x="400" y="280" width="60" height="180" fill="#F5ECD7" stroke="#000000" stroke-width="1.5"/>
  <rect x="400" y="280" width="60" height="180" fill="url(#wood-hatch)" opacity="0.6"/>

  <!-- Wood nailer at top of curb -->
  <rect x="395" y="270" width="70" height="16" fill="#F5ECD7" stroke="#000000" stroke-width="1"/>
  <rect x="395" y="270" width="70" height="16" fill="url(#wood-hatch)" opacity="0.6"/>

  <!-- Cant strip at base of curb (45-degree triangle) -->
  <polygon points="360,500 400,500 400,460" fill="#E8E8E8" stroke="#000000" stroke-width="1.5"/>
  <line x1="365" y1="495" x2="395" y2="465" stroke="#999999" stroke-width="0.5"/>
  <line x1="375" y1="495" x2="398" y2="472" stroke="#999999" stroke-width="0.5"/>

  <!-- PMMA membrane — field on roof -->
  <rect x="80" y="452" width="280" height="8" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

  <!-- PMMA over cant -->
  <polygon points="360,460 360,452 354,452 394,412 400,412 400,420 365,455 360,460" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

  <!-- PMMA up curb face -->
  <rect x="392" y="290" width="8" height="122" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

  <!-- Fleece reinforcement (dashed) -->
  <line x1="85" y1="456" x2="356" y2="456" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="358" y1="456" x2="396" y2="416" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="396" y1="414" x2="396" y2="294" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- Counter-flashing (metal) at top of curb -->
  <path d="M388,286 L388,270 L470,270 L470,290 L465,295 L465,286 Z" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>
  <!-- Counter-flashing drip edge -->
  <path d="M388,286 L385,292 L383,292" stroke="#000000" stroke-width="1" fill="none"/>

  <!-- Equipment represented above curb (dashed outline) -->
  <rect x="380" y="200" width="100" height="70" fill="none" stroke="#555555" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="430" y="240" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#555555" text-anchor="middle">EQUIPMENT</text>
  <text x="430" y="252" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#555555" text-anchor="middle">(BY OTHERS)</text>

  <!-- ============ DIMENSION: 8 IN. MIN CURB HEIGHT ============ -->
  <line x1="510" y1="290" x2="510" y2="460" stroke="#666666" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="505" y1="290" x2="515" y2="290" stroke="#666666" stroke-width="0.75"/>
  <line x1="505" y1="460" x2="515" y2="460" stroke="#666666" stroke-width="0.75"/>
  <line x1="466" y1="290" x2="508" y2="290" stroke="#666666" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="466" y1="460" x2="508" y2="460" stroke="#666666" stroke-width="0.3" stroke-dasharray="2 2"/>
  <text x="520" y="380" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">8 IN. MIN</text>
  <text x="520" y="392" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">CURB HEIGHT</text>

  <!-- ============ CALLOUT LEADERS ============ -->
  <!-- 1. Deck -->
  <circle cx="250" cy="530" r="3" fill="#000000"/>
  <line x1="250" y1="530" x2="200" y2="610" stroke="#000000" stroke-width="0.5"/>
  <text x="185" y="625" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">1</text>

  <!-- 2. Insulation -->
  <circle cx="250" cy="480" r="3" fill="#000000"/>
  <line x1="250" y1="480" x2="200" y2="580" stroke="#000000" stroke-width="0.5"/>
  <text x="185" y="595" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">2</text>

  <!-- 3. Curb Frame -->
  <circle cx="430" cy="390" r="3" fill="#000000"/>
  <line x1="430" y1="390" x2="560" y2="390" stroke="#000000" stroke-width="0.5"/>
  <text x="565" y="393" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">3</text>

  <!-- 4. Wood Nailer -->
  <circle cx="430" cy="278" r="3" fill="#000000"/>
  <line x1="430" y1="278" x2="560" y2="350" stroke="#000000" stroke-width="0.5"/>
  <text x="565" y="353" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">4</text>

  <!-- 5. Cant Strip -->
  <circle cx="378" cy="485" r="3" fill="#000000"/>
  <line x1="378" y1="485" x2="350" y2="620" stroke="#000000" stroke-width="0.5"/>
  <text x="335" y="635" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">5</text>

  <!-- 6. PMMA Primer -->
  <circle cx="200" cy="458" r="3" fill="#000000"/>
  <line x1="200" y1="458" x2="120" y2="350" stroke="#000000" stroke-width="0.5"/>
  <text x="105" y="346" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">6</text>

  <!-- 7. Fleece -->
  <circle cx="396" cy="360" r="3" fill="#000000"/>
  <line x1="396" y1="360" x2="560" y2="430" stroke="#000000" stroke-width="0.5"/>
  <text x="565" y="433" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">7</text>

  <!-- 8. PMMA Membrane -->
  <circle cx="300" cy="454" r="3" fill="#000000"/>
  <line x1="300" y1="454" x2="120" y2="320" stroke="#000000" stroke-width="0.5"/>
  <text x="105" y="316" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">8</text>

  <!-- 9. Counter-Flashing -->
  <circle cx="440" cy="280" r="3" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <line x1="440" y1="280" x2="560" y2="310" stroke="#000000" stroke-width="0.5"/>
  <text x="565" y="313" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">9</text>

  <!-- ============ CALLOUT LEGEND ============ -->
  <text x="720" y="130" font-family="Arial, Helvetica, sans-serif" font-size="10px" font-weight="bold" fill="#000000">CALLOUT KEY</text>
  <line x1="720" y1="135" x2="870" y2="135" stroke="#000000" stroke-width="0.5"/>

  <circle cx="730" cy="158" r="4" fill="#000000"/>
  <text x="740" y="162" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">1</tspan> — Deck (Concrete Substrate)</text>

  <circle cx="730" cy="182" r="4" fill="#000000"/>
  <text x="740" y="186" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">2</tspan> — Insulation</text>

  <circle cx="730" cy="206" r="4" fill="#000000"/>
  <text x="740" y="210" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">3</tspan> — Curb Frame (Wood)</text>

  <circle cx="730" cy="230" r="4" fill="#000000"/>
  <text x="740" y="234" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">4</tspan> — Wood Nailer</text>

  <circle cx="730" cy="254" r="4" fill="#000000"/>
  <text x="740" y="258" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">5</tspan> — Cant Strip</text>

  <circle cx="730" cy="278" r="4" fill="#000000"/>
  <text x="740" y="282" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">6</tspan> — PMMA Primer</text>

  <circle cx="730" cy="302" r="4" fill="#000000"/>
  <text x="740" y="306" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">7</tspan> — Fleece Reinforcement</text>

  <circle cx="730" cy="326" r="4" fill="#000000"/>
  <text x="740" y="330" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">8</tspan> — PMMA Membrane</text>

  <circle cx="730" cy="350" r="4" fill="#000000"/>
  <text x="740" y="354" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">9</tspan> — Counter-Flashing</text>

  <!-- ============ TITLE BLOCK ============ -->
  <line x1="40" y1="760" x2="1016" y2="760" stroke="#000000" stroke-width="0.75"/>
  <text x="50" y="778" font-family="Arial, Helvetica, sans-serif" font-size="11px" font-weight="bold" fill="#000000">DETAIL ATLAS</text>
  <text x="50" y="792" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">CONSTRUCTION INTELLIGENCE</text>
  <text x="440" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="middle">Barrett Company — RamFlash PMMA</text>
  <text x="1010" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="end">DRAFT | 2026-04-16</text>
  <text x="528" y="805" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#666666" text-anchor="middle">CSI 07 62 00 | FAM-BARRETT-PMMA | Emergency Detail Delivery</text>
</svg>