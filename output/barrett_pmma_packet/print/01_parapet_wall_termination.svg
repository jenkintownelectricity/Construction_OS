<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 816" width="1056" height="816">
  <defs>
    <pattern id="insulation-hatch" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,8 L8,0" stroke="#999999" stroke-width="0.5" fill="none"/>
    </pattern>
    <pattern id="fleece-hatch" patternUnits="userSpaceOnUse" width="6" height="6">
      <path d="M0,6 L6,0" stroke="#333333" stroke-width="0.75" fill="none"/>
    </pattern>
    <pattern id="concrete-stipple" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="2" cy="3" r="0.5" fill="#CCCCCC"/>
      <circle cx="7" cy="8" r="0.5" fill="#CCCCCC"/>
      <circle cx="5" cy="1" r="0.5" fill="#CCCCCC"/>
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="1056" height="816" fill="#FFFFFF"/>

  <!-- DRAFT watermark -->
  <text x="528" y="400" font-family="Arial, Helvetica, sans-serif" font-size="48px" fill="#CCCCCC" opacity="0.3" text-anchor="middle" transform="rotate(-25, 528, 400)">DRAFT FOR REVIEW</text>

  <!-- Title block -->
  <text x="60" y="50" font-family="Arial, Helvetica, sans-serif" font-size="16px" font-weight="bold" fill="#000000">Barrett PMMA — Parapet Wall Termination</text>
  <text x="60" y="68" font-family="Arial, Helvetica, sans-serif" font-size="11px" fill="#333333">Section Detail — Vertical parapet wall with horizontal roof deck transition</text>

  <!-- ============ MAIN DETAIL GEOMETRY ============ -->
  <!-- Reference coordinates: deck top at y=520, wall left edge at x=380 -->

  <!-- Concrete Deck (structural substrate) -->
  <rect x="80" y="520" width="500" height="60" fill="#F0F0F0" stroke="#000000" stroke-width="1.5"/>
  <rect x="80" y="520" width="500" height="60" fill="url(#concrete-stipple)" opacity="0.5"/>

  <!-- Wall structure (concrete/masonry) -->
  <rect x="380" y="160" width="80" height="420" fill="#F0F0F0" stroke="#000000" stroke-width="1.5"/>
  <rect x="380" y="160" width="80" height="420" fill="url(#concrete-stipple)" opacity="0.5"/>

  <!-- Insulation layer -->
  <rect x="80" y="480" width="300" height="40" fill="#E8E8E8" stroke="#000000" stroke-width="1"/>
  <rect x="80" y="480" width="300" height="40" fill="url(#insulation-hatch)"/>

  <!-- Cant strip (45-degree triangle at wall-deck transition) -->
  <polygon points="340,520 380,520 380,480" fill="#E8E8E8" stroke="#000000" stroke-width="1.5"/>
  <line x1="345" y1="515" x2="375" y2="485" stroke="#999999" stroke-width="0.5"/>
  <line x1="355" y1="515" x2="378" y2="492" stroke="#999999" stroke-width="0.5"/>

  <!-- PMMA System Path — field membrane on roof -->
  <rect x="80" y="472" width="260" height="8" fill="#D8D8D8" stroke="#000000" stroke-width="1"/>

  <!-- PMMA over cant strip (angled section) -->
  <polygon points="340,480 340,472 334,472 374,432 380,432 380,440 345,475 340,480" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

  <!-- PMMA up wall face -->
  <rect x="372" y="280" width="8" height="152" fill="#D8D8D8" stroke="#333333" stroke-width="2"/>

  <!-- Fleece reinforcement (dashed line inside PMMA) -->
  <line x1="85" y1="476" x2="336" y2="476" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="340" y1="476" x2="376" y2="436" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="376" y1="434" x2="376" y2="284" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- Termination bar at top of flashing -->
  <rect x="370" y="278" width="14" height="6" fill="#E0E0E0" stroke="#000000" stroke-width="1"/>
  <!-- Sealant bead -->
  <ellipse cx="377" cy="276" rx="5" ry="3" fill="#D8D8D8" stroke="#000000" stroke-width="0.75"/>

  <!-- Metal coping at parapet top -->
  <path d="M365,160 L365,150 Q365,145 370,145 L470,145 Q475,145 475,150 L475,160 L460,168 L460,160 L380,160 L380,168 Z" fill="#E0E0E0" stroke="#000000" stroke-width="1.5"/>

  <!-- ============ DIMENSION LINES ============ -->
  <!-- Flashing height dimension: 8 IN. MIN -->
  <line x1="500" y1="280" x2="500" y2="432" stroke="#666666" stroke-width="0.5" stroke-dasharray="3 2"/>
  <!-- Tick marks -->
  <line x1="495" y1="280" x2="505" y2="280" stroke="#666666" stroke-width="0.75"/>
  <line x1="495" y1="432" x2="505" y2="432" stroke="#666666" stroke-width="0.75"/>
  <!-- Extension lines -->
  <line x1="384" y1="280" x2="498" y2="280" stroke="#666666" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="384" y1="432" x2="498" y2="432" stroke="#666666" stroke-width="0.3" stroke-dasharray="2 2"/>
  <text x="510" y="360" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">8 IN. MIN</text>

  <!-- ============ CALLOUT LEADERS ============ -->
  <!-- 1. Substrate -->
  <circle cx="200" cy="550" r="3" fill="#000000"/>
  <line x1="200" y1="550" x2="230" y2="590" stroke="#000000" stroke-width="0.5"/>
  <line x1="230" y1="590" x2="280" y2="590" stroke="#000000" stroke-width="0.5"/>
  <text x="285" y="593" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">1</text>

  <!-- 2. Insulation -->
  <circle cx="200" cy="500" r="3" fill="#000000"/>
  <line x1="200" y1="500" x2="200" y2="620" stroke="#000000" stroke-width="0.5"/>
  <line x1="200" y1="620" x2="280" y2="620" stroke="#000000" stroke-width="0.5"/>
  <text x="285" y="623" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">2</text>

  <!-- 3. Cant Strip -->
  <circle cx="360" cy="505" r="3" fill="#000000"/>
  <line x1="360" y1="505" x2="360" y2="640" stroke="#000000" stroke-width="0.5"/>
  <line x1="360" y1="640" x2="280" y2="640" stroke="#000000" stroke-width="0.5"/>
  <text x="285" y="643" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">3</text>

  <!-- 4. PMMA Primer (shown at deck level) -->
  <circle cx="150" cy="476" r="3" fill="#000000"/>
  <line x1="150" y1="476" x2="120" y2="600" stroke="#000000" stroke-width="0.5"/>
  <line x1="60" y1="600" x2="120" y2="600" stroke="#000000" stroke-width="0.5"/>
  <text x="63" y="603" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">4</text>

  <!-- 5. PMMA Base Coat -->
  <circle cx="300" cy="474" r="3" fill="#000000"/>
  <line x1="300" y1="474" x2="300" y2="660" stroke="#000000" stroke-width="0.5"/>
  <line x1="280" y1="660" x2="300" y2="660" stroke="#000000" stroke-width="0.5"/>
  <text x="285" y="663" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">5</text>

  <!-- 6. Fleece -->
  <circle cx="376" cy="370" r="3" fill="#000000"/>
  <line x1="376" y1="370" x2="540" y2="370" stroke="#000000" stroke-width="0.5"/>
  <text x="545" y="373" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">6</text>

  <!-- 7. Seal Coat -->
  <circle cx="374" cy="340" r="3" fill="#000000"/>
  <line x1="374" y1="340" x2="540" y2="340" stroke="#000000" stroke-width="0.5"/>
  <text x="545" y="343" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">7</text>

  <!-- 8. Termination Bar + Sealant -->
  <circle cx="377" cy="278" r="3" fill="#FFFFFF" stroke="#000000" stroke-width="0.75"/>
  <line x1="385" y1="278" x2="540" y2="278" stroke="#000000" stroke-width="0.5"/>
  <text x="545" y="281" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">8</text>

  <!-- 9. Metal Coping -->
  <circle cx="420" cy="155" r="3" fill="#000000"/>
  <line x1="420" y1="155" x2="540" y2="155" stroke="#000000" stroke-width="0.5"/>
  <text x="545" y="158" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">9</text>

  <!-- 10. Catalyst note -->
  <circle cx="120" cy="474" r="3" fill="#000000"/>
  <line x1="120" y1="474" x2="80" y2="440" stroke="#000000" stroke-width="0.5"/>
  <line x1="60" y1="440" x2="80" y2="440" stroke="#000000" stroke-width="0.5"/>
  <text x="63" y="443" font-family="Arial, Helvetica, sans-serif" font-size="10px" fill="#000000">10</text>

  <!-- ============ CALLOUT LEGEND (right side) ============ -->
  <text x="720" y="130" font-family="Arial, Helvetica, sans-serif" font-size="10px" font-weight="bold" fill="#000000">CALLOUT KEY</text>
  <line x1="720" y1="135" x2="850" y2="135" stroke="#000000" stroke-width="0.5"/>

  <circle cx="730" cy="158" r="4" fill="#000000"/>
  <text x="740" y="162" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">1</tspan> — Substrate (Concrete Deck)</text>

  <circle cx="730" cy="182" r="4" fill="#000000"/>
  <text x="740" y="186" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">2</tspan> — Insulation</text>

  <circle cx="730" cy="206" r="4" fill="#000000"/>
  <text x="740" y="210" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">3</tspan> — Cant Strip</text>

  <circle cx="730" cy="230" r="4" fill="#000000"/>
  <text x="740" y="234" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">4</tspan> — PMMA Primer</text>

  <circle cx="730" cy="254" r="4" fill="#000000"/>
  <text x="740" y="258" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">5</tspan> — PMMA Base Coat</text>

  <circle cx="730" cy="278" r="4" fill="#000000"/>
  <text x="740" y="282" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">6</tspan> — Fleece Reinforcement</text>

  <circle cx="730" cy="302" r="4" fill="#000000"/>
  <text x="740" y="306" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">7</tspan> — PMMA Seal Coat</text>

  <circle cx="730" cy="326" r="4" fill="#000000"/>
  <text x="740" y="330" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">8</tspan> — Termination Bar + Sealant</text>

  <circle cx="730" cy="350" r="4" fill="#000000"/>
  <text x="740" y="354" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">9</tspan> — Metal Coping</text>

  <circle cx="730" cy="374" r="4" fill="#000000"/>
  <text x="740" y="378" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000"><tspan font-weight="bold">10</tspan> — Catalyst (field-mixed)</text>

  <!-- ============ TITLE BLOCK ============ -->
  <line x1="40" y1="760" x2="1016" y2="760" stroke="#000000" stroke-width="0.75"/>
  <text x="50" y="778" font-family="Arial, Helvetica, sans-serif" font-size="11px" font-weight="bold" fill="#000000">DETAIL ATLAS</text>
  <text x="50" y="792" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000">CONSTRUCTION INTELLIGENCE</text>
  <text x="440" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="middle">Barrett Company — RamFlash PMMA</text>
  <text x="1010" y="778" font-family="Arial, Helvetica, sans-serif" font-size="9px" fill="#000000" text-anchor="end">DRAFT | 2026-04-16</text>
  <text x="528" y="805" font-family="Arial, Helvetica, sans-serif" font-size="8px" fill="#666666" text-anchor="middle">CSI 07 62 00 | FAM-BARRETT-PMMA | Emergency Detail Delivery</text>
</svg>