<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <title>Mirror Architecture — Parity Drift Loop</title>
  <defs>
    <marker id="pdArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="pdArrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DC2626"/>
    </marker>
    <marker id="pdArrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="pdArrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
      .title { font-size: 20px; font-weight: bold; fill: #1F2937; }
      .subtitle { font-size: 13px; fill: #6B7280; font-style: italic; }
      .node-label { font-size: 14px; fill: #FFFFFF; font-weight: 600; }
      .node-desc { font-size: 11px; fill: #E5E7EB; }
      .flow-label { font-size: 12px; fill: #374151; font-weight: 500; }
      .outcome { font-size: 13px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1000" height="800" fill="#F9FAFB" rx="8"/>

  <text x="500" y="35" text-anchor="middle" class="title">Parity Drift Loop — Continuous Behavioral Comparison</text>
  <text x="500" y="55" text-anchor="middle" class="subtitle">Parity, not trust. We measure continuously. Drift is governed, not punished.</text>

  <!-- Circular flow: 7 nodes arranged in a loop -->

  <!-- Node 1: Fixture Input (top center) -->
  <rect x="400" y="90" width="200" height="70" rx="14" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="500" y="122" text-anchor="middle" class="node-label">Fixture Input</text>
  <text x="500" y="140" text-anchor="middle" class="node-desc">Canonical test data from kernel</text>

  <!-- Node 2: Source Behavior (right top) -->
  <rect x="720" y="200" width="200" height="70" rx="14" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="820" y="232" text-anchor="middle" class="node-label">Source Behavior</text>
  <text x="820" y="250" text-anchor="middle" class="node-desc">Kernel produces expected output</text>

  <!-- Node 3: Mirror Behavior (right bottom) -->
  <rect x="720" y="350" width="200" height="70" rx="14" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="820" y="382" text-anchor="middle" class="node-label">Mirror Behavior</text>
  <text x="820" y="400" text-anchor="middle" class="node-desc">Mirror produces its output</text>

  <!-- Node 4: Compare (center right - diamond) -->
  <polygon points="580,430 650,480 580,530 510,480" fill="#7C3AED" stroke="#6D28D9" stroke-width="2"/>
  <text x="580" y="478" text-anchor="middle" class="node-label">Compare</text>
  <text x="580" y="495" text-anchor="middle" font-size="10" fill="#DDD6FE">Behavioral Diff</text>

  <!-- Node 5: Parity Result (center bottom) -->
  <rect x="350" y="560" width="200" height="70" rx="14" fill="#374151" stroke="#1F2937" stroke-width="2"/>
  <text x="450" y="592" text-anchor="middle" class="node-label">Parity Result</text>
  <text x="450" y="610" text-anchor="middle" class="node-desc">PASS | DRIFT | BREAK</text>

  <!-- Node 6: Drift Record (left bottom) -->
  <rect x="80" y="470" width="200" height="70" rx="14" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
  <text x="180" y="502" text-anchor="middle" font-size="14" fill="#1F2937" font-weight="600">Drift Record</text>
  <text x="180" y="520" text-anchor="middle" font-size="11" fill="#451A03">Logged, measured, reviewed</text>

  <!-- Node 7: Decision (left top - diamond) -->
  <polygon points="180,260 250,310 180,360 110,310" fill="#7C3AED" stroke="#6D28D9" stroke-width="2"/>
  <text x="180" y="308" text-anchor="middle" class="node-label">Decision</text>
  <text x="180" y="325" text-anchor="middle" font-size="10" fill="#DDD6FE">Review</text>

  <!-- Arrows connecting the loop -->

  <!-- 1 -> 2: Fixture to Source -->
  <line x1="600" y1="125" x2="720" y2="210" stroke="#374151" stroke-width="2.5" marker-end="url(#pdArrow)"/>
  <text x="680" y="155" class="flow-label">Feed to kernel</text>

  <!-- 1 -> 3: Fixture to Mirror -->
  <line x1="580" y1="155" x2="720" y2="355" stroke="#374151" stroke-width="2.5" marker-end="url(#pdArrow)"/>
  <text x="690" y="275" class="flow-label">Feed to mirror</text>

  <!-- 2 -> 4: Source to Compare -->
  <line x1="720" y1="260" x2="640" y2="460" stroke="#2563EB" stroke-width="2.5" marker-end="url(#pdArrow)"/>
  <text x="710" y="370" class="flow-label" fill="#2563EB">Expected</text>

  <!-- 3 -> 4: Mirror to Compare -->
  <line x1="720" y1="400" x2="650" y2="470" stroke="#059669" stroke-width="2.5" marker-end="url(#pdArrow)"/>
  <text x="715" y="440" class="flow-label" fill="#059669">Actual</text>

  <!-- 4 -> 5: Compare to Parity Result -->
  <line x1="545" y1="520" x2="480" y2="560" stroke="#374151" stroke-width="2.5" marker-end="url(#pdArrow)"/>
  <text x="530" y="550" class="flow-label">Result</text>

  <!-- 5 -> 6: Parity Result to Drift Record -->
  <line x1="350" y1="600" x2="280" y2="530" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#pdArrowAmber)"/>
  <text x="290" y="575" class="flow-label" fill="#D97706">Record drift</text>

  <!-- 6 -> 7: Drift Record to Decision -->
  <line x1="180" y1="470" x2="180" y2="360" stroke="#374151" stroke-width="2.5" marker-end="url(#pdArrow)"/>
  <text x="210" y="420" class="flow-label">Review</text>

  <!-- 7 -> 1: Decision loops back to Fixture Input (next cycle) -->
  <path d="M 180,260 C 180,160 300,100 400,115" fill="none" stroke="#374151" stroke-width="2.5" marker-end="url(#pdArrow)"/>
  <text x="260" y="130" class="flow-label">Next cycle</text>

  <!-- Outcome paths from Decision -->

  <!-- Promotion path (left, green) -->
  <rect x="20" y="140" width="150" height="60" rx="10" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="95" y="168" text-anchor="middle" class="node-label">Promotion</text>
  <text x="95" y="186" text-anchor="middle" font-size="10" fill="#D1FAE5">Absorb into kernel</text>
  <line x1="130" y1="280" x2="95" y2="200" stroke="#059669" stroke-width="2.5" marker-end="url(#pdArrowGreen)"/>
  <text x="70" y="250" class="flow-label" fill="#059669">Stable</text>

  <!-- Breakaway path (far left, red) -->
  <rect x="20" y="350" width="150" height="60" rx="10" fill="#F43F5E" stroke="#DC2626" stroke-width="2"/>
  <text x="95" y="378" text-anchor="middle" class="node-label">Breakaway</text>
  <text x="95" y="396" text-anchor="middle" font-size="10" fill="#FFE4E6">Freeze and detach</text>
  <line x1="125" y1="335" x2="95" y2="350" stroke="#DC2626" stroke-width="2.5" marker-end="url(#pdArrowRed)"/>
  <text x="70" y="345" class="flow-label" fill="#DC2626">Incompatible</text>

  <!-- Result indicators -->
  <rect x="620" y="580" width="340" height="140" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="790" y="605" text-anchor="middle" font-size="14" fill="#1F2937" font-weight="bold">Parity Outcomes</text>
  <circle cx="650" cy="630" r="8" fill="#059669"/>
  <text x="670" y="635" font-size="13" fill="#059669" font-weight="600">PASS — Behavioral match confirmed</text>
  <circle cx="650" cy="660" r="8" fill="#F59E0B"/>
  <text x="670" y="665" font-size="13" fill="#D97706" font-weight="600">DRIFT — Divergence detected, review</text>
  <circle cx="650" cy="690" r="8" fill="#DC2626"/>
  <text x="670" y="695" font-size="13" fill="#DC2626" font-weight="600">BREAK — Incompatible, action required</text>

  <!-- Cycle indicator -->
  <text x="500" y="780" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">This loop runs continuously for every active mirror reflection</text>
</svg>
