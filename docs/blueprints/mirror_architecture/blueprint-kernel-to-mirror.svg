<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <title>Mirror Architecture — Kernel to Mirror Hierarchy</title>
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="0" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#374151"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="5" refY="0" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#7C3AED"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="5" refY="0" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#059669"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="5" refY="0" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#0D9488"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
      .title { font-size: 20px; font-weight: bold; fill: #1F2937; }
      .subtitle { font-size: 13px; fill: #6B7280; font-style: italic; }
      .label { font-size: 14px; fill: #FFFFFF; font-weight: 600; }
      .label-sm { font-size: 12px; fill: #FFFFFF; }
      .annotation { font-size: 11px; fill: #6B7280; }
      .relation { font-size: 12px; fill: #7C3AED; font-weight: 600; }
    </style>
  </defs>

  <rect width="1000" height="800" fill="#F9FAFB" rx="8"/>

  <text x="500" y="35" text-anchor="middle" class="title">Kernel to Mirror — Hierarchical Relationships</text>
  <text x="500" y="55" text-anchor="middle" class="subtitle">Nucleus governs mirrors. Mirrors expose slices. Slices contain reflections. Registry tracks all.</text>

  <!-- Level 0: Construction OS Core -->
  <rect x="370" y="80" width="260" height="70" rx="16" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="500" y="112" text-anchor="middle" class="label">Construction OS Core</text>
  <text x="500" y="130" text-anchor="middle" font-size="11" fill="#BFDBFE">Canonical capabilities &amp; source of truth</text>

  <!-- Relationship label -->
  <text x="500" y="175" text-anchor="middle" class="relation">CONTAINS &amp; EMPOWERS</text>
  <line x1="500" y1="150" x2="500" y2="190" stroke="#7C3AED" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowPurple)"/>

  <!-- Level 1: Mirror Kernel Nucleus -->
  <rect x="330" y="195" width="340" height="70" rx="16" fill="#7C3AED" stroke="#6D28D9" stroke-width="2"/>
  <text x="500" y="225" text-anchor="middle" class="label">Mirror Kernel Nucleus</text>
  <text x="500" y="245" text-anchor="middle" font-size="11" fill="#DDD6FE">Lifecycle | Parity | Drift | Registry</text>

  <!-- Relationship label -->
  <text x="500" y="292" text-anchor="middle" class="relation">GOVERNS</text>
  <line x1="370" y1="265" x2="220" y2="330" stroke="#7C3AED" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowPurple)"/>
  <line x1="500" y1="265" x2="500" y2="330" stroke="#7C3AED" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowPurple)"/>
  <line x1="630" y1="265" x2="780" y2="330" stroke="#7C3AED" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowPurple)"/>

  <!-- Level 2: Mirror Instances -->
  <rect x="120" y="335" width="200" height="65" rx="12" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="220" y="363" text-anchor="middle" class="label">Mirror Instance A</text>
  <text x="220" y="383" text-anchor="middle" font-size="11" fill="#D1FAE5">GCP Shop Drawing</text>

  <rect x="400" y="335" width="200" height="65" rx="12" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="500" y="363" text-anchor="middle" class="label">Mirror Instance B</text>
  <text x="500" y="383" text-anchor="middle" font-size="11" fill="#D1FAE5">Partner Alpha</text>

  <rect x="680" y="335" width="200" height="65" rx="12" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="780" y="363" text-anchor="middle" class="label">Mirror Instance C</text>
  <text x="780" y="383" text-anchor="middle" font-size="11" fill="#D1FAE5">Internal QA</text>

  <!-- Relationship label -->
  <text x="500" y="425" text-anchor="middle" class="relation">EXPOSES</text>

  <!-- Lines from Mirror A to Slices -->
  <line x1="170" y1="400" x2="110" y2="465" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="220" y1="400" x2="220" y2="465" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="270" y1="400" x2="330" y2="465" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Lines from Mirror B to Slices -->
  <line x1="460" y1="400" x2="440" y2="465" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="540" y1="400" x2="560" y2="465" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Lines from Mirror C to Slices -->
  <line x1="750" y1="400" x2="700" y2="465" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="810" y1="400" x2="810" y2="465" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="850" y1="400" x2="910" y2="465" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Level 3: Slices (hexagonal style via polygons) -->
  <!-- Mirror A slices -->
  <polygon points="110,470 145,470 160,490 145,510 110,510 95,490" fill="#0D9488" stroke="#0F766E" stroke-width="2"/>
  <text x="128" y="494" text-anchor="middle" font-size="10" fill="#FFF" font-weight="600">Valid.</text>

  <polygon points="205,470 240,470 255,490 240,510 205,510 190,490" fill="#0D9488" stroke="#0F766E" stroke-width="2"/>
  <text x="222" y="494" text-anchor="middle" font-size="10" fill="#FFF" font-weight="600">Rules</text>

  <polygon points="315,470 350,470 365,490 350,510 315,510 300,490" fill="#0D9488" stroke="#0F766E" stroke-width="2"/>
  <text x="332" y="494" text-anchor="middle" font-size="10" fill="#FFF" font-weight="600">Gov.</text>

  <!-- Mirror B slices -->
  <polygon points="425,470 460,470 475,490 460,510 425,510 410,490" fill="#0D9488" stroke="#0F766E" stroke-width="2"/>
  <text x="442" y="494" text-anchor="middle" font-size="10" fill="#FFF" font-weight="600">Gen.</text>

  <polygon points="545,470 580,470 595,490 580,510 545,510 530,490" fill="#0D9488" stroke="#0F766E" stroke-width="2"/>
  <text x="562" y="494" text-anchor="middle" font-size="10" fill="#FFF" font-weight="600">Engine</text>

  <!-- Mirror C slices -->
  <polygon points="685,470 720,470 735,490 720,510 685,510 670,490" fill="#0D9488" stroke="#0F766E" stroke-width="2"/>
  <text x="702" y="494" text-anchor="middle" font-size="10" fill="#FFF" font-weight="600">Valid.</text>

  <polygon points="795,470 830,470 845,490 830,510 795,510 780,490" fill="#0D9488" stroke="#0F766E" stroke-width="2"/>
  <text x="812" y="494" text-anchor="middle" font-size="10" fill="#FFF" font-weight="600">Gov.</text>

  <polygon points="895,470 930,470 945,490 930,510 895,510 880,490" fill="#0D9488" stroke="#0F766E" stroke-width="2"/>
  <text x="912" y="494" text-anchor="middle" font-size="10" fill="#FFF" font-weight="600">Lineage</text>

  <!-- Relationship label -->
  <text x="500" y="545" text-anchor="middle" class="relation">CONTAINS</text>

  <!-- Level 4: Reflections -->
  <!-- Under Validation slice of Mirror A -->
  <line x1="128" y1="510" x2="80" y2="575" stroke="#0D9488" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <line x1="128" y1="510" x2="128" y2="575" stroke="#0D9488" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <line x1="128" y1="510" x2="176" y2="575" stroke="#0D9488" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

  <rect x="55" y="580" width="50" height="40" rx="4" fill="#7DD3FC" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="80" y="600" text-anchor="middle" font-size="9" fill="#0C4A6E" font-weight="600">Contract</text>
  <text x="80" y="612" text-anchor="middle" font-size="8" fill="#0C4A6E">v2.1.0</text>

  <rect x="103" y="580" width="50" height="40" rx="4" fill="#7DD3FC" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="128" y="600" text-anchor="middle" font-size="9" fill="#0C4A6E" font-weight="600">Schema</text>
  <text x="128" y="612" text-anchor="middle" font-size="8" fill="#0C4A6E">v2.1.0</text>

  <rect x="151" y="580" width="50" height="40" rx="4" fill="#7DD3FC" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="176" y="600" text-anchor="middle" font-size="9" fill="#0C4A6E" font-weight="600">Fixture</text>
  <text x="176" y="612" text-anchor="middle" font-size="8" fill="#0C4A6E">v2.1.0</text>

  <!-- Under Rules slice -->
  <line x1="222" y1="510" x2="222" y2="575" stroke="#0D9488" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <line x1="222" y1="510" x2="270" y2="575" stroke="#0D9488" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

  <rect x="197" y="580" width="50" height="40" rx="4" fill="#7DD3FC" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="222" y="600" text-anchor="middle" font-size="9" fill="#0C4A6E" font-weight="600">Rules</text>
  <text x="222" y="612" text-anchor="middle" font-size="8" fill="#0C4A6E">v1.4.0</text>

  <rect x="245" y="580" width="50" height="40" rx="4" fill="#7DD3FC" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="270" y="600" text-anchor="middle" font-size="9" fill="#0C4A6E" font-weight="600">Fixture</text>
  <text x="270" y="612" text-anchor="middle" font-size="8" fill="#0C4A6E">v1.4.0</text>

  <!-- Registry (cylinder) on the right side -->
  <ellipse cx="500" cy="660" rx="80" ry="15" fill="#374151" stroke="#1F2937" stroke-width="2"/>
  <rect x="420" y="660" width="160" height="50" fill="#374151" stroke="none"/>
  <line x1="420" y1="660" x2="420" y2="710" stroke="#1F2937" stroke-width="2"/>
  <line x1="580" y1="660" x2="580" y2="710" stroke="#1F2937" stroke-width="2"/>
  <ellipse cx="500" cy="710" rx="80" ry="15" fill="#4B5563" stroke="#1F2937" stroke-width="2"/>
  <text x="500" y="690" text-anchor="middle" font-size="13" fill="#FFF" font-weight="600">Registry</text>

  <!-- Registry connection lines -->
  <line x1="500" y1="645" x2="250" y2="580" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="500" y1="645" x2="500" y2="580" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="500" y1="645" x2="780" y2="580" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="500" y="640" text-anchor="middle" class="annotation">Tracks lifecycle of every reflection</text>

  <!-- Legend -->
  <rect x="640" y="580" width="330" height="130" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="660" y="600" font-size="12" fill="#374151" font-weight="bold">Hierarchy</text>
  <rect x="660" y="610" width="12" height="12" rx="3" fill="#2563EB"/>
  <text x="680" y="621" font-size="11" fill="#374151">Core (source of truth)</text>
  <rect x="660" y="630" width="12" height="12" rx="3" fill="#7C3AED"/>
  <text x="680" y="641" font-size="11" fill="#374151">Nucleus (control plane)</text>
  <rect x="660" y="650" width="12" height="12" rx="3" fill="#059669"/>
  <text x="680" y="661" font-size="11" fill="#374151">Mirror (projection)</text>
  <polygon points="660,670 672,670 678,680 672,690 660,690 654,680" fill="#0D9488"/>
  <text x="690" y="684" font-size="11" fill="#374151">Slice (capability unit)</text>
  <rect x="660" y="694" width="12" height="12" rx="3" fill="#7DD3FC"/>
  <text x="680" y="705" font-size="11" fill="#374151">Reflection (contract/schema/rule/fixture)</text>
</svg>
