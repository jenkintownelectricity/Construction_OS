<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <title>Mirror Architecture — Promotion vs Breakaway</title>
  <defs>
    <marker id="pbArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="pbArrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="pbArrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DC2626"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
      .title { font-size: 20px; font-weight: bold; fill: #1F2937; }
      .subtitle { font-size: 13px; fill: #6B7280; font-style: italic; }
      .label { font-size: 14px; fill: #FFFFFF; font-weight: 600; }
      .label-sm { font-size: 12px; fill: #FFFFFF; }
      .criteria { font-size: 11px; fill: #374151; }
    </style>
  </defs>

  <rect width="1000" height="800" fill="#F9FAFB" rx="8"/>

  <text x="500" y="35" text-anchor="middle" class="title">Promotion vs Breakaway — Two Paths</text>
  <text x="500" y="55" text-anchor="middle" class="subtitle">Stable reflections flow inward. Incompatible reflections detach outward. Both are governed.</text>

  <!-- Center: Active Mirror Reflection -->
  <rect x="370" y="150" width="260" height="80" rx="14" fill="#059669" stroke="#047857" stroke-width="2.5"/>
  <text x="500" y="185" text-anchor="middle" class="label">Active Mirror Reflection</text>
  <text x="500" y="205" text-anchor="middle" font-size="11" fill="#D1FAE5">Under continuous parity monitoring</text>

  <!-- Decision Diamond -->
  <polygon points="500,280 580,340 500,400 420,340" fill="#7C3AED" stroke="#6D28D9" stroke-width="2.5"/>
  <text x="500" y="335" text-anchor="middle" class="label">Parity</text>
  <text x="500" y="352" text-anchor="middle" font-size="11" fill="#DDD6FE">Review</text>

  <!-- Arrow from reflection to decision -->
  <line x1="500" y1="230" x2="500" y2="280" stroke="#374151" stroke-width="2.5" marker-end="url(#pbArrow)"/>

  <!-- ====== LEFT PATH: PROMOTION (inward, green) ====== -->
  <text x="200" y="310" text-anchor="middle" font-size="16" fill="#059669" font-weight="bold">PROMOTION PATH</text>
  <text x="200" y="328" text-anchor="middle" font-size="12" fill="#059669">Stable &amp; Reusable — Flows Inward</text>

  <!-- Arrow from decision to promotion -->
  <line x1="420" y1="340" x2="310" y2="340" stroke="#059669" stroke-width="3" marker-end="url(#pbArrowGreen)"/>
  <text x="365" y="330" font-size="11" fill="#059669" font-weight="600">Stable</text>

  <!-- Promotion steps -->
  <rect x="100" y="370" width="200" height="55" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="200" y="393" text-anchor="middle" font-size="13" fill="#065F46" font-weight="600">Candidate Identified</text>
  <text x="200" y="410" text-anchor="middle" font-size="10" fill="#065F46">Parity 100% for 3+ cycles</text>

  <line x1="200" y1="425" x2="200" y2="445" stroke="#059669" stroke-width="2" marker-end="url(#pbArrowGreen)"/>

  <rect x="100" y="450" width="200" height="55" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="200" y="473" text-anchor="middle" font-size="13" fill="#065F46" font-weight="600">Integration Review</text>
  <text x="200" y="490" text-anchor="middle" font-size="10" fill="#065F46">Kernel team evaluates fit</text>

  <line x1="200" y1="505" x2="200" y2="525" stroke="#059669" stroke-width="2" marker-end="url(#pbArrowGreen)"/>

  <rect x="100" y="530" width="200" height="55" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="200" y="553" text-anchor="middle" font-size="13" fill="#065F46" font-weight="600">Kernel Absorption</text>
  <text x="200" y="570" text-anchor="middle" font-size="10" fill="#065F46">Reflection becomes canonical</text>

  <line x1="200" y1="585" x2="200" y2="605" stroke="#059669" stroke-width="2" marker-end="url(#pbArrowGreen)"/>

  <!-- Final: Core -->
  <rect x="100" y="610" width="200" height="60" rx="14" fill="#2563EB" stroke="#1D4ED8" stroke-width="2.5"/>
  <text x="200" y="637" text-anchor="middle" class="label">Construction OS Core</text>
  <text x="200" y="655" text-anchor="middle" font-size="10" fill="#BFDBFE">Available to all mirrors</text>

  <!-- ====== RIGHT PATH: BREAKAWAY (outward, red) ====== -->
  <text x="800" y="310" text-anchor="middle" font-size="16" fill="#DC2626" font-weight="bold">BREAKAWAY PATH</text>
  <text x="800" y="328" text-anchor="middle" font-size="12" fill="#DC2626">Incompatible / Partner-Specific — Flows Outward</text>

  <!-- Arrow from decision to breakaway -->
  <line x1="580" y1="340" x2="690" y2="340" stroke="#DC2626" stroke-width="3" marker-end="url(#pbArrowRed)"/>
  <text x="635" y="330" font-size="11" fill="#DC2626" font-weight="600">Diverged</text>

  <!-- Breakaway steps -->
  <rect x="700" y="370" width="200" height="55" rx="10" fill="#FFF1F2" stroke="#DC2626" stroke-width="2"/>
  <text x="800" y="393" text-anchor="middle" font-size="13" fill="#9F1239" font-weight="600">Drift Threshold Exceeded</text>
  <text x="800" y="410" text-anchor="middle" font-size="10" fill="#9F1239">Parity below minimum 3+ cycles</text>

  <line x1="800" y1="425" x2="800" y2="445" stroke="#DC2626" stroke-width="2" marker-end="url(#pbArrowRed)"/>

  <rect x="700" y="450" width="200" height="55" rx="10" fill="#FFF1F2" stroke="#DC2626" stroke-width="2"/>
  <text x="800" y="473" text-anchor="middle" font-size="13" fill="#9F1239" font-weight="600">Breakaway Review</text>
  <text x="800" y="490" text-anchor="middle" font-size="10" fill="#9F1239">Confirm incompatibility</text>

  <line x1="800" y1="505" x2="800" y2="525" stroke="#DC2626" stroke-width="2" marker-end="url(#pbArrowRed)"/>

  <rect x="700" y="530" width="200" height="55" rx="10" fill="#FFF1F2" stroke="#DC2626" stroke-width="2"/>
  <text x="800" y="553" text-anchor="middle" font-size="13" fill="#9F1239" font-weight="600">Freeze &amp; Snapshot</text>
  <text x="800" y="570" text-anchor="middle" font-size="10" fill="#9F1239">Lock version, archive state</text>

  <line x1="800" y1="585" x2="800" y2="605" stroke="#DC2626" stroke-width="2" marker-end="url(#pbArrowRed)"/>

  <!-- Final: Detached -->
  <rect x="700" y="610" width="200" height="60" rx="14" fill="#F43F5E" stroke="#DC2626" stroke-width="2.5"/>
  <text x="800" y="637" text-anchor="middle" class="label">Detached / Frozen</text>
  <text x="800" y="655" text-anchor="middle" font-size="10" fill="#FFE4E6">Partner-owned, no kernel sync</text>

  <!-- Criteria boxes -->
  <rect x="30" y="710" width="440" height="70" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="250" y="732" text-anchor="middle" font-size="13" fill="#065F46" font-weight="bold">Promotion Criteria</text>
  <text x="250" y="750" text-anchor="middle" class="criteria">100% parity for 3+ cycles | Reusable across mirrors</text>
  <text x="250" y="765" text-anchor="middle" class="criteria">No partner-specific logic | Kernel team approves</text>

  <rect x="530" y="710" width="440" height="70" rx="8" fill="#FFF1F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="750" y="732" text-anchor="middle" font-size="13" fill="#9F1239" font-weight="bold">Breakaway Criteria</text>
  <text x="750" y="750" text-anchor="middle" class="criteria">Parity below threshold for 3+ cycles | Partner-specific logic</text>
  <text x="750" y="765" text-anchor="middle" class="criteria">Incompatible with kernel direction | Mutual agreement</text>
</svg>
