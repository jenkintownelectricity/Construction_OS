name: Runtime Bridge Boundary Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  enforce-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce runtime bridge boundary
        run: python scripts/enforce_runtime_bridge.py
