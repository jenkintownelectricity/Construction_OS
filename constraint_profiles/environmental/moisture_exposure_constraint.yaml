id: CLIMATE-CONSTR-CNS-MOISTURE-002-R1
name: Moisture Exposure Constraint
description: >
  Environmental constraint profile addressing moisture exposure
  requirements for roofing and waterproofing assemblies.  Governs
  waterproofing continuity, ponding water prevention, and freeze-thaw
  durability for assemblies in drainage, penetration, and expansion
  joint families.
schema_version: "1.0.0"
pattern_language_version: "1.0.0"
entity_revision: 1
created_at: "2026-03-22T00:00:00Z"
constraint_type: environmental
applies_to:
  - DNA-CONSTR-FAM-DRAIN-003-R1
  - DNA-CONSTR-FAM-PIPE-004-R1
  - DNA-CONSTR-FAM-JOINT-005-R1
parameters:
  waterproofing_required: true
  ponding_prevention: true
  freeze_thaw_rated: true
thresholds:
  max_ponding_depth_inches: 1
  max_ponding_duration_hours: 48
  min_freeze_thaw_cycles: 300
  min_waterproofing_perm_rating: 0.1
notes: >
  All assemblies within the listed families must maintain watertight
  integrity under hydrostatic and hydrodynamic loading conditions.
  Materials must be rated for freeze-thaw cycling per ASTM C666 or
  equivalent.  Positive drainage to prevent ponding water is
  mandatory per IBC Section 1502.
