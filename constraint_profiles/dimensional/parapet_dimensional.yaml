# Parapet Dimensional Constraints
# Height, clearance, and proportion limits for parapet wall assemblies

schema_version: "1.0.0"
pattern_language_version: "1.0.0"
entity_revision: 1
created_at: "2026-03-22T00:00:00Z"

id: "TEXTURE-CONSTR-CNS-PARAPETDIM-003-R1"
name: "Parapet Dimensional Constraints"
constraint_type: dimensional

description: >
  Dimensional constraints for parapet wall assemblies based on building code
  requirements and roofing industry best practices. Parapet height is governed
  by fall protection requirements (minimum height to serve as a guardrail),
  fire code setback rules (parapet height relative to property line distance),
  and practical waterproofing limits (taller parapets increase wind exposure
  and complicate capping details). The cap overhang dimension ensures that
  water dripping off the cap clears the wall face and does not run back
  underneath to the wall substrate.

applies_to:
  - id: "DNA-CONSTR-FAM-PARAPET-002-R1"
    name: "Parapet Wall Family"

parameters:
  min_height_inches: 30
  max_height_without_railing_inches: 42
  min_cap_overhang_inches: 1.5
  max_cap_overhang_inches: 3.0
  min_wall_thickness_inches: 8
  counterflashing_reglet_height_inches: 8

dimensional_rationale:
  min_height: >
    30 inches is the minimum height recognized by OSHA 1926.502(b) for a
    parapet to function as a guardrail system, eliminating the need for
    additional fall protection along the roof perimeter.
  max_height_without_railing: >
    42 inches represents the IBC-standard guardrail height. Parapets taller
    than 42 inches are uncommon and typically require structural analysis for
    wind loads on the extended wall surface.
  min_cap_overhang: >
    1.5 inches of overhang beyond the wall face ensures the drip hem throws
    water clear of the wall, preventing staining and moisture damage to the
    wall substrate below.

validation:
  - check: min_parapet_height
    min_inches: 30
    fail_action: reject
  - check: max_height_without_railing
    max_inches: 42
    fail_action: warn
  - check: cap_overhang_range
    min_inches: 1.5
    max_inches: 3.0
    fail_action: reject
