<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manufacturer Atlas Explorer — Domain OS</title>
  <style>
    :root { --bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--orange:#db6d28;--red:#f85149;--purple:#bc8cff; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace;background:var(--bg);color:var(--text);}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;}
    header h1{font-size:18px;color:var(--accent);} header p{font-size:12px;color:var(--muted);margin-top:4px;}
    .layout{display:flex;height:calc(100vh - 72px);}
    .sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:12px;}
    .main{flex:1;overflow-y:auto;padding:20px;}
    .lens-btn{display:block;width:100%;text-align:left;background:none;border:1px solid var(--border);color:var(--text);padding:8px 12px;margin-bottom:6px;border-radius:6px;cursor:pointer;font-size:13px;}
    .lens-btn:hover,.lens-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,0.08);}
    .section-title{font-size:11px;text-transform:uppercase;color:var(--muted);margin:12px 0 6px;letter-spacing:1px;}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;}
    .stat-card .value{font-size:24px;font-weight:bold;color:var(--accent);}
    .stat-card .label{font-size:11px;color:var(--muted);margin-top:2px;}
    .node-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;}
    .node-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:border-color 0.15s;}
    .node-card:hover{border-color:var(--accent);}
    .node-card .node-label{font-size:14px;font-weight:600;margin-bottom:4px;}
    .node-card .node-class{font-size:11px;color:var(--purple);text-transform:uppercase;}
    .node-card .node-id{font-size:10px;color:var(--muted);font-family:monospace;}
    .status-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;margin-left:6px;}
    .status-grounded{background:rgba(63,185,80,0.15);color:var(--green);}
    .status-scaffold{background:rgba(210,153,34,0.15);color:var(--yellow);}
    .status-derived{background:rgba(188,140,255,0.15);color:var(--purple);}
    .status-deferred{background:rgba(219,109,40,0.15);color:var(--orange);}
    .status-unverified{background:rgba(248,81,73,0.15);color:var(--red);}
    .detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-top:16px;}
    .detail-panel h3{color:var(--accent);margin-bottom:12px;font-size:16px;}
    .detail-row{display:flex;margin-bottom:6px;font-size:13px;}
    .detail-row .key{color:var(--muted);width:140px;flex-shrink:0;}
    .detail-row .val{color:var(--text);}
    .edge-list{margin-top:12px;}
    .edge-item{font-size:12px;padding:4px 8px;margin:3px 0;background:rgba(88,166,255,0.06);border-radius:4px;cursor:pointer;}
    .edge-item:hover{background:rgba(88,166,255,0.12);}
    .edge-arrow{color:var(--accent);}
    .coverage-bar{height:8px;border-radius:4px;background:var(--border);overflow:hidden;margin:6px 0;}
    .coverage-fill{height:100%;border-radius:4px;}
    .taxonomy-badge{font-size:10px;background:rgba(63,185,80,0.1);color:var(--green);padding:2px 8px;border-radius:4px;margin-left:8px;}
  </style>
</head>
<body>
  <header>
    <h1>Manufacturer Atlas Explorer <span class="taxonomy-badge">Domain OS v1.0</span></h1>
    <p>Building Envelope Knowledge Graph — 300-tools/310-manufacturer-atlas-ui</p>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div class="section-title">Lenses</div>
      <button class="lens-btn active" data-lens="all">All Nodes</button>
      <button class="lens-btn" data-lens="system">System View</button>
      <button class="lens-btn" data-lens="condition">Condition View</button>
      <button class="lens-btn" data-lens="product">Product View</button>
      <button class="lens-btn" data-lens="rule">Rule View</button>
      <button class="lens-btn" data-lens="coverage">Coverage View</button>
      <div class="section-title">Filter by Status</div>
      <button class="lens-btn" data-status="all">All Statuses</button>
      <button class="lens-btn" data-status="grounded">Grounded</button>
      <button class="lens-btn" data-status="scaffold">Scaffold</button>
      <div class="section-title">Taxonomy Layer</div>
      <div style="font-size:11px;color:var(--muted);padding:4px 0;">000: Governance (frozen)</div>
      <div style="font-size:11px;color:var(--muted);padding:4px 0;">100: Knowledge Graph</div>
      <div style="font-size:11px;color:var(--accent);padding:4px 0;">300: Tools (you are here)</div>
      <div class="section-title">Graph Stats</div>
      <div id="sidebar-stats"></div>
    </div>
    <div class="main">
      <div class="stats" id="stats-bar"></div>
      <div id="coverage-summary"></div>
      <div class="node-grid" id="node-grid"></div>
      <div id="detail-panel"></div>
    </div>
  </div>
  <script>
    const NODES=[{node_id:"MFR-MANUFACTURER-ENVSYS-001",domain:"building_envelope",class:"manufacturer",label:"Envelope Systems Manufacturer (Scaffold)",status:"scaffold",metadata:{note:"Placeholder for real manufacturer"}},{node_id:"MFR-SYSFAM-ROOF-001",domain:"building_envelope",class:"system_family",label:"Roofing System Family",status:"scaffold",metadata:{envelope_zone:"roof"}},{node_id:"MFR-SYSFAM-WALL-001",domain:"building_envelope",class:"system_family",label:"Wall System Family",status:"scaffold",metadata:{envelope_zone:"wall"}},{node_id:"MFR-SYSTEM-ADHERO-001",domain:"building_envelope",class:"system",label:"Adhered Roofing System",status:"scaffold",metadata:{system_type:"adhered"}},{node_id:"MFR-SYSTEM-MECHR-001",domain:"building_envelope",class:"system",label:"Mechanically Attached Roofing System",status:"scaffold",metadata:{system_type:"mechanically_attached"}},{node_id:"MFR-SYSTEM-CAVWALL-001",domain:"building_envelope",class:"system",label:"Cavity Wall System",status:"scaffold",metadata:{system_type:"cavity_wall"}},{node_id:"MFR-COND-HIGHWIND-001",domain:"building_envelope",class:"condition",label:"High Wind Uplift Condition",status:"grounded",metadata:{trigger:"wind_speed > 115 mph",code_reference:"ASCE 7"}},{node_id:"MFR-COND-MOISTURE-001",domain:"building_envelope",class:"condition",label:"High Moisture Exposure Condition",status:"grounded",metadata:{trigger:"substrate_moisture > 20%",code_reference:"ASTM D4263"}},{node_id:"MFR-COND-THERMAL-001",domain:"building_envelope",class:"condition",label:"Thermal Movement Condition",status:"grounded",metadata:{trigger:"temperature_differential > 100F",code_reference:"ASHRAE 90.1"}},{node_id:"MFR-COND-SUBSTRATE-001",domain:"building_envelope",class:"condition",label:"Concrete Substrate Condition",status:"grounded",metadata:{substrate_type:"concrete"}},{node_id:"MFR-COND-SUBSTRATE-002",domain:"building_envelope",class:"condition",label:"Steel Deck Substrate Condition",status:"grounded",metadata:{substrate_type:"steel_deck"}},{node_id:"MFR-ASSY-ADHERO-HW-001",domain:"building_envelope",class:"assembly",label:"Adhered Roof \u2014 High Wind Assembly",status:"scaffold",metadata:{system_ref:"MFR-SYSTEM-ADHERO-001"}},{node_id:"MFR-ASSY-MECHR-STD-001",domain:"building_envelope",class:"assembly",label:"Mechanically Attached Roof \u2014 Standard Assembly",status:"scaffold",metadata:{system_ref:"MFR-SYSTEM-MECHR-001"}},{node_id:"MFR-ASSY-CAVWALL-STD-001",domain:"building_envelope",class:"assembly",label:"Cavity Wall \u2014 Standard Assembly",status:"scaffold",metadata:{system_ref:"MFR-SYSTEM-CAVWALL-001"}},{node_id:"MFR-PROD-MEMBRANE-001",domain:"building_envelope",class:"product",label:"Roofing Membrane (Scaffold)",status:"scaffold",metadata:{product_category:"membrane"}},{node_id:"MFR-PROD-INSULATION-001",domain:"building_envelope",class:"product",label:"Roof Insulation Board (Scaffold)",status:"scaffold",metadata:{product_category:"insulation"}},{node_id:"MFR-PROD-FASTENER-001",domain:"building_envelope",class:"product",label:"Mechanical Fastener (Scaffold)",status:"scaffold",metadata:{product_category:"fastener"}},{node_id:"MFR-PROD-ADHESIVE-001",domain:"building_envelope",class:"product",label:"Bonding Adhesive (Scaffold)",status:"scaffold",metadata:{product_category:"adhesive"}},{node_id:"MFR-PROD-WRB-001",domain:"building_envelope",class:"product",label:"Weather Resistive Barrier (Scaffold)",status:"scaffold",metadata:{product_category:"weather_barrier"}},{node_id:"MFR-RULE-WINDUPLIFT-001",domain:"building_envelope",class:"rule",label:"Wind Uplift Attachment Rule",status:"grounded",metadata:{authority:"ASCE 7 / FM Global",fail_action:"BLOCK"}},{node_id:"MFR-RULE-MOISTURETEST-001",domain:"building_envelope",class:"rule",label:"Substrate Moisture Test Rule",status:"grounded",metadata:{authority:"ASTM D4263",fail_action:"BLOCK"}},{node_id:"MFR-RULE-COMPATIBILITY-001",domain:"building_envelope",class:"rule",label:"Product Compatibility Rule",status:"grounded",metadata:{authority:"manufacturer_warranty",fail_action:"BLOCK"}},{node_id:"MFR-RULE-THERMALMOVE-001",domain:"building_envelope",class:"rule",label:"Thermal Movement Accommodation Rule",status:"grounded",metadata:{authority:"manufacturer_technical_bulletin",fail_action:"WARN"}},{node_id:"MFR-DETAIL-BASEFLASH-001",domain:"building_envelope",class:"detail",label:"Base Flashing Detail",status:"scaffold",metadata:{detail_type:"base_flashing"}},{node_id:"MFR-DETAIL-PENETRATION-001",domain:"building_envelope",class:"detail",label:"Pipe Penetration Detail",status:"scaffold",metadata:{detail_type:"penetration"}},{node_id:"MFR-DETAIL-EDGETERMINATION-001",domain:"building_envelope",class:"detail",label:"Edge Termination Detail",status:"scaffold",metadata:{detail_type:"edge_termination"}},{node_id:"MFR-DETAIL-WALLFLASH-001",domain:"building_envelope",class:"detail",label:"Through-Wall Flashing Detail",status:"scaffold",metadata:{detail_type:"through_wall_flashing"}}];
    const EDGES=[{edge_id:"EDGE-CONTAINS-001",from_node:"MFR-MANUFACTURER-ENVSYS-001",to_node:"MFR-SYSFAM-ROOF-001",relationship:"contains",governance_tier:"scaffold"},{edge_id:"EDGE-CONTAINS-002",from_node:"MFR-MANUFACTURER-ENVSYS-001",to_node:"MFR-SYSFAM-WALL-001",relationship:"contains",governance_tier:"scaffold"},{edge_id:"EDGE-CONTAINS-003",from_node:"MFR-SYSFAM-ROOF-001",to_node:"MFR-SYSTEM-ADHERO-001",relationship:"contains",governance_tier:"scaffold"},{edge_id:"EDGE-CONTAINS-004",from_node:"MFR-SYSFAM-ROOF-001",to_node:"MFR-SYSTEM-MECHR-001",relationship:"contains",governance_tier:"scaffold"},{edge_id:"EDGE-CONTAINS-005",from_node:"MFR-SYSFAM-WALL-001",to_node:"MFR-SYSTEM-CAVWALL-001",relationship:"contains",governance_tier:"scaffold"},{edge_id:"EDGE-SUPPORTS-001",from_node:"MFR-SYSTEM-ADHERO-001",to_node:"MFR-COND-HIGHWIND-001",relationship:"supports",governance_tier:"derived_inference"},{edge_id:"EDGE-SUPPORTS-002",from_node:"MFR-SYSTEM-ADHERO-001",to_node:"MFR-COND-MOISTURE-001",relationship:"supports",governance_tier:"derived_inference"},{edge_id:"EDGE-SUPPORTS-003",from_node:"MFR-SYSTEM-MECHR-001",to_node:"MFR-COND-HIGHWIND-001",relationship:"supports",governance_tier:"derived_inference"},{edge_id:"EDGE-SUPPORTS-004",from_node:"MFR-SYSTEM-CAVWALL-001",to_node:"MFR-COND-MOISTURE-001",relationship:"supports",governance_tier:"derived_inference"},{edge_id:"EDGE-SUPPORTS-005",from_node:"MFR-SYSTEM-CAVWALL-001",to_node:"MFR-COND-THERMAL-001",relationship:"supports",governance_tier:"derived_inference"},{edge_id:"EDGE-SUPPORTS-006",from_node:"MFR-SYSTEM-MECHR-001",to_node:"MFR-COND-SUBSTRATE-002",relationship:"supports",governance_tier:"derived_inference"},{edge_id:"EDGE-RESOLVEDBY-001",from_node:"MFR-COND-HIGHWIND-001",to_node:"MFR-ASSY-ADHERO-HW-001",relationship:"resolved_by",governance_tier:"scaffold"},{edge_id:"EDGE-RESOLVEDBY-002",from_node:"MFR-SYSTEM-MECHR-001",to_node:"MFR-ASSY-MECHR-STD-001",relationship:"resolved_by",governance_tier:"scaffold"},{edge_id:"EDGE-RESOLVEDBY-003",from_node:"MFR-SYSTEM-CAVWALL-001",to_node:"MFR-ASSY-CAVWALL-STD-001",relationship:"resolved_by",governance_tier:"scaffold"},{edge_id:"EDGE-USES-001",from_node:"MFR-ASSY-ADHERO-HW-001",to_node:"MFR-PROD-MEMBRANE-001",relationship:"uses",governance_tier:"scaffold"},{edge_id:"EDGE-USES-002",from_node:"MFR-ASSY-ADHERO-HW-001",to_node:"MFR-PROD-INSULATION-001",relationship:"uses",governance_tier:"scaffold"},{edge_id:"EDGE-USES-003",from_node:"MFR-ASSY-ADHERO-HW-001",to_node:"MFR-PROD-ADHESIVE-001",relationship:"uses",governance_tier:"scaffold"},{edge_id:"EDGE-USES-004",from_node:"MFR-ASSY-MECHR-STD-001",to_node:"MFR-PROD-MEMBRANE-001",relationship:"uses",governance_tier:"scaffold"},{edge_id:"EDGE-USES-005",from_node:"MFR-ASSY-MECHR-STD-001",to_node:"MFR-PROD-INSULATION-001",relationship:"uses",governance_tier:"scaffold"},{edge_id:"EDGE-USES-006",from_node:"MFR-ASSY-MECHR-STD-001",to_node:"MFR-PROD-FASTENER-001",relationship:"uses",governance_tier:"scaffold"},{edge_id:"EDGE-USES-007",from_node:"MFR-ASSY-CAVWALL-STD-001",to_node:"MFR-PROD-WRB-001",relationship:"uses",governance_tier:"scaffold"},{edge_id:"EDGE-GOVERNEDBY-001",from_node:"MFR-ASSY-ADHERO-HW-001",to_node:"MFR-RULE-WINDUPLIFT-001",relationship:"governed_by",governance_tier:"code_required"},{edge_id:"EDGE-GOVERNEDBY-002",from_node:"MFR-ASSY-ADHERO-HW-001",to_node:"MFR-RULE-COMPATIBILITY-001",relationship:"governed_by",governance_tier:"manufacturer_published"},{edge_id:"EDGE-GOVERNEDBY-003",from_node:"MFR-ASSY-MECHR-STD-001",to_node:"MFR-RULE-WINDUPLIFT-001",relationship:"governed_by",governance_tier:"code_required"},{edge_id:"EDGE-GOVERNEDBY-004",from_node:"MFR-ASSY-MECHR-STD-001",to_node:"MFR-RULE-COMPATIBILITY-001",relationship:"governed_by",governance_tier:"manufacturer_published"},{edge_id:"EDGE-GOVERNEDBY-005",from_node:"MFR-COND-SUBSTRATE-001",to_node:"MFR-RULE-MOISTURETEST-001",relationship:"governed_by",governance_tier:"code_required"},{edge_id:"EDGE-GOVERNEDBY-006",from_node:"MFR-ASSY-CAVWALL-STD-001",to_node:"MFR-RULE-THERMALMOVE-001",relationship:"governed_by",governance_tier:"industry_standard"},{edge_id:"EDGE-OUTPUTS-001",from_node:"MFR-ASSY-ADHERO-HW-001",to_node:"MFR-DETAIL-BASEFLASH-001",relationship:"outputs",governance_tier:"scaffold"},{edge_id:"EDGE-OUTPUTS-002",from_node:"MFR-ASSY-ADHERO-HW-001",to_node:"MFR-DETAIL-PENETRATION-001",relationship:"outputs",governance_tier:"scaffold"},{edge_id:"EDGE-OUTPUTS-003",from_node:"MFR-ASSY-MECHR-STD-001",to_node:"MFR-DETAIL-EDGETERMINATION-001",relationship:"outputs",governance_tier:"scaffold"},{edge_id:"EDGE-OUTPUTS-004",from_node:"MFR-ASSY-CAVWALL-STD-001",to_node:"MFR-DETAIL-WALLFLASH-001",relationship:"outputs",governance_tier:"scaffold"},{edge_id:"EDGE-COMPATIBLE-001",from_node:"MFR-PROD-MEMBRANE-001",to_node:"MFR-PROD-ADHESIVE-001",relationship:"compatible_with",governance_tier:"scaffold"},{edge_id:"EDGE-COMPATIBLE-002",from_node:"MFR-PROD-MEMBRANE-001",to_node:"MFR-PROD-INSULATION-001",relationship:"compatible_with",governance_tier:"scaffold"},{edge_id:"EDGE-REFERENCES-001",from_node:"MFR-RULE-WINDUPLIFT-001",to_node:"MFR-COND-HIGHWIND-001",relationship:"references",governance_tier:"code_required"},{edge_id:"EDGE-REFERENCES-002",from_node:"MFR-RULE-MOISTURETEST-001",to_node:"MFR-COND-MOISTURE-001",relationship:"references",governance_tier:"code_required"},{edge_id:"EDGE-REFERENCES-003",from_node:"MFR-RULE-THERMALMOVE-001",to_node:"MFR-COND-THERMAL-001",relationship:"references",governance_tier:"industry_standard"}];
    const LENS_MAP={all:{classes:null,rels:null},system:{classes:["manufacturer","system_family","system","condition"],rels:["contains","supports"]},condition:{classes:["condition","system","assembly"],rels:["supports","resolved_by","governed_by"]},product:{classes:["product","assembly"],rels:["uses","compatible_with"]},rule:{classes:["rule","assembly","condition"],rels:["governed_by","references"]},coverage:{classes:null,rels:null}};
    let currentLens='all',currentStatus='all',selectedNode=null;
    function getFilteredNodes(){let n=NODES;const l=LENS_MAP[currentLens];if(l.classes)n=n.filter(x=>l.classes.includes(x.class));if(currentStatus!=='all')n=n.filter(x=>x.status===currentStatus);return n;}
    function getEdgesFor(id){const l=LENS_MAP[currentLens];let e=EDGES.filter(x=>x.from_node===id||x.to_node===id);if(l.rels)e=e.filter(x=>l.rels.includes(x.relationship));return e;}
    function renderStats(){const n=getFilteredNodes();const bc={},bs={};n.forEach(x=>{bc[x.class]=(bc[x.class]||0)+1;bs[x.status]=(bs[x.status]||0)+1;});document.getElementById('stats-bar').innerHTML=`<div class="stat-card"><div class="value">${n.length}</div><div class="label">Visible Nodes</div></div><div class="stat-card"><div class="value">${EDGES.length}</div><div class="label">Total Edges</div></div><div class="stat-card"><div class="value">${bs.grounded||0}</div><div class="label">Grounded</div></div><div class="stat-card"><div class="value">${bs.scaffold||0}</div><div class="label">Scaffold</div></div>`;document.getElementById('sidebar-stats').innerHTML=Object.entries(bc).map(([c,n])=>`<div style="font-size:12px;margin:2px 0"><span style="color:var(--purple)">${c}</span>: ${n}</div>`).join('');}
    function renderCoverage(){const el=document.getElementById('coverage-summary');if(currentLens!=='coverage'){el.innerHTML='';return;}const t=NODES.length,g=NODES.filter(n=>n.status==='grounded').length,s=NODES.filter(n=>n.status==='scaffold').length,p=Math.round((g/t)*100);const ids=new Set(NODES.map(n=>n.node_id));const br=EDGES.filter(e=>!ids.has(e.from_node)||!ids.has(e.to_node));el.innerHTML=`<div class="detail-panel"><h3>Coverage Summary</h3><div class="detail-row"><span class="key">Total Nodes</span><span class="val">${t}</span></div><div class="detail-row"><span class="key">Grounded</span><span class="val">${g} (${p}%)</span></div><div class="detail-row"><span class="key">Scaffold</span><span class="val">${s}</span></div><div class="coverage-bar"><div class="coverage-fill" style="width:${p}%;background:var(--green)"></div></div><div class="detail-row"><span class="key">Broken Edges</span><span class="val">${br.length}</span></div></div>`;}
    function renderNodes(){document.getElementById('node-grid').innerHTML=getFilteredNodes().map(n=>`<div class="node-card" onclick="selectNode('${n.node_id}')"><div class="node-class">${n.class}</div><div class="node-label">${n.label} <span class="status-badge status-${n.status}">${n.status}</span></div><div class="node-id">${n.node_id}</div></div>`).join('');}
    function selectNode(id){selectedNode=NODES.find(n=>n.node_id===id);if(!selectedNode)return;const edges=getEdgesFor(id),out=edges.filter(e=>e.from_node===id),inc=edges.filter(e=>e.to_node===id);const fl=i=>{const n=NODES.find(x=>x.node_id===i);return n?n.label:i;};const meta=Object.entries(selectedNode.metadata||{}).map(([k,v])=>`<div class="detail-row"><span class="key">${k}</span><span class="val">${typeof v==='object'?JSON.stringify(v):v}</span></div>`).join('');document.getElementById('detail-panel').innerHTML=`<div class="detail-panel"><h3>${selectedNode.label}</h3><div class="detail-row"><span class="key">Node ID</span><span class="val" style="font-family:monospace">${selectedNode.node_id}</span></div><div class="detail-row"><span class="key">Class</span><span class="val">${selectedNode.class}</span></div><div class="detail-row"><span class="key">Status</span><span class="val"><span class="status-badge status-${selectedNode.status}">${selectedNode.status}</span></span></div>${meta}${out.length?'<div class="edge-list"><div class="section-title">Outgoing</div>'+out.map(e=>`<div class="edge-item" onclick="selectNode('${e.to_node}')">${e.relationship} <span class="edge-arrow">&rarr;</span> ${fl(e.to_node)} <span style="color:var(--muted);font-size:10px">[${e.governance_tier}]</span></div>`).join('')+'</div>':''}${inc.length?'<div class="edge-list"><div class="section-title">Incoming</div>'+inc.map(e=>`<div class="edge-item" onclick="selectNode('${e.from_node}')">${fl(e.from_node)} <span class="edge-arrow">&rarr;</span> ${e.relationship} <span style="color:var(--muted);font-size:10px">[${e.governance_tier}]</span></div>`).join('')+'</div>':''}</div>`;}
    function render(){renderStats();renderNodes();renderCoverage();}
    document.querySelectorAll('[data-lens]').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('[data-lens]').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentLens=b.dataset.lens;document.getElementById('detail-panel').innerHTML='';render();});});
    document.querySelectorAll('[data-status]').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('[data-status]').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentStatus=b.dataset.status;document.getElementById('detail-panel').innerHTML='';render();});});
    render();
  </script>
</body>
</html>
