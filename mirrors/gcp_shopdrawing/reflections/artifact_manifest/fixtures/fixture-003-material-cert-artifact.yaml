  content_hash: "sha256:f0e1d2c3b4a596877869504132fabcde0123456789abcdef0123456789abcdef"
  detail_refs:
    - "DET-STRC-00000045"
    - "DET-STRC-00000046"
    - "DET-STRC-00000047"
    - "DET-STRC-00000048"
  submission_ref: "SUB-000000000201"
  version:
    version_number: 1
    revision_label: "R0"
  metadata:
    title: "Mill Test Report — ASTM A992 Heat X72491"
    description: "Certified mill test report for ASTM A992 Grade 50 structural steel, Heat Number X72491, Nucor-Yamato Steel Company."
    author: "Nucor-Yamato Steel Company"
    created_date: "2025-11-15"
