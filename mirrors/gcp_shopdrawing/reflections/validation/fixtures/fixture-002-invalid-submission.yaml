validation_context:
  project_id: "COS-PRJ-2026-0042"
  expected_schema_version: "2.3.0"
  strict_mode: false
  bypass_codes: []

expected_result:
  validation_id: "VALD-20260320093000-VL002A"
  submission_id: "SUB-20260316093000-XY99ZZ"
  validated_at: "2026-03-20T09:30:00Z"
  summary:
    total_records: 3
    records_valid: 0
    records_invalid: 3
    records_warning: 0
    disposition: "rejected"
    deficiency_count: 4
    blocking_deficiencies:
      - "VAL_E003"
      - "VR-FI-003"
      - "VAL_E002"
      - "VAL_E006"
    validation_duration_ms: 62
  record_results:
    - gcp_record_id: "GCP-SD-000000020001"
      status: "invalid"
      checks:
        - rule_id: "VR-FI-003"
          status: "failed"
          severity: "error"
          field_path: "$.dim_block.dims[0].dim_value_raw"
          message: "Dimension value 'TWENTY FOUR FEET' is not parseable as an imperial length."
          deficiency_code: "VR-FI-003"

    - gcp_record_id: "GCP-SD-000000020002"
      status: "invalid"
      checks:
        - rule_id: "VR-RC-003"
          status: "failed"
          severity: "error"
          field_path: "$.material_data.mat_code"
          message: "Required field material_data.mat_code is missing or empty."
          deficiency_code: "VAL_E002"

    - gcp_record_id: "GCP-SD-000000020003"
      status: "invalid"
      checks:
        - rule_id: "VR-XR-001"
          status: "failed"
          severity: "error"
          field_path: "$.connection_block[0].connects_to_mark"
          message: "Mark 'CL99' does not resolve to any record in this submission or the project registry."
          deficiency_code: "VAL_E006"

  cross_reference_results:
    total_references_checked: 1
    references_resolved: 0
    references_broken: 1
    broken_references:
      - source_record_id: "GCP-SD-000000020003"
        reference_field: "$.connection_block[0].connects_to_mark"
        referenced_mark: "CL99"
        resolution_status: "unresolved"

assertions:
  - assert: value_equals
    path: "$.summary.disposition"
    expected: "rejected"
    description: "Submission with blocking deficiencies must be rejected."

  - assert: value_equals
    path: "$.summary.records_invalid"
    expected: 3

  - assert: value_gte
    path: "$.summary.deficiency_count"
    expected: 4
    description: "At least 4 deficiencies: schema version, unparseable dim, missing mat_code, broken xref."

  - assert: value_equals
    path: "$.cross_reference_results.references_broken"
    expected: 1
