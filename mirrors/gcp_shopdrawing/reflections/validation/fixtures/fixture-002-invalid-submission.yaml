  name: "Invalid Submission — Multiple Deficiencies"
  description: >
    A deliberately malformed submission package that triggers multiple
    validation failures. Record 1 has an unparseable dimension value,
    Record 2 is missing the required material_data.mat_code field, and
    Record 3 references a mark number not present in the submission or
    project registry. The submission also declares an unsupported schema
    version. This fixture exercises rejection handling, per-record error
    isolation, and deficiency citation generation.
  slice: validation
  created: "2026-03-20"
  status: active

